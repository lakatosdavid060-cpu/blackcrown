<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ördög Voice</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#020617;
border-right:2px solid #1e293b;
padding:10px;
overflow:auto;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.panel{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:10px;
}

.user{
padding:6px;
background:#020617;
border-radius:6px;
margin-bottom:4px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin:3px;
}

.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}

#chatBox{
height:150px;
overflow:auto;
background:#020617;
padding:8px;
border-radius:8px;
margin-bottom:6px;
}

video{
max-width:600px;
width:100%;
border-radius:10px;
margin-top:5px;
background:black;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>👥 Online</h3>
<div id="onlineUsers"></div>
</div>

<div class="main">

<div class="panel">

<input id="roomId" placeholder="Szoba ID" value="ordog">

<button onclick="joinRoom()" class="green">🎤 Csatlakozás</button>
<button onclick="startCamera()">🎥 Kamera</button>
<button onclick="startScreen()">🖥️ Képernyő</button>
<button onclick="leaveRoom()" class="red">⛔ Kilépés</button>

</div>

<div class="panel">

<h3>💬 Chat</h3>
<div id="chatBox"></div>

<input id="chatInput" placeholder="Üzenet">
<button onclick="sendChat()">Küld</button>

</div>

<div class="panel">

<h3>🎥 Videók</h3>
<div id="videos"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
authDomain:"ordog-fizetes.firebaseapp.com",
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ordog-fizetes"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let userId="user_"+Math.floor(Math.random()*9999);
let room="";
let localStream=null;
let peers={};

let pcConfig={
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
};

function addVideo(id,stream){
let video=document.createElement("video");
video.autoplay=true;
video.playsInline=true;
video.srcObject=stream;
video.id="v_"+id;
document.getElementById("videos").appendChild(video);
}

window.joinRoom=async function(){

room=document.getElementById("roomId").value;

localStream=await navigator.mediaDevices.getUserMedia({audio:true});

addVideo(userId,localStream);

set(ref(db,"rooms/"+room+"/users/"+userId),true);

onValue(ref(db,"rooms/"+room+"/users"),snap=>{

let html="";
snap.forEach(u=>{
html+="<div class='user'>🟢 "+u.key+"</div>";
});
document.getElementById("onlineUsers").innerHTML=html;

});

onChildAdded(ref(db,"rooms/"+room+"/signals"),snap=>{
let data=snap.val();

if(data.to!==userId) return;

handleSignal(data);
});

};

async function createPeer(otherId){

let pc=new RTCPeerConnection(pcConfig);

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.ontrack=e=>{
addVideo(otherId,e.streams[0]);
};

pc.onicecandidate=e=>{
if(e.candidate){
push(ref(db,"rooms/"+room+"/signals"),{
type:"candidate",
to:otherId,
from:userId,
candidate:e.candidate
});
}
};

peers[otherId]=pc;

return pc;
}

async function handleSignal(data){

let pc=peers[data.from] || await createPeer(data.from);

if(data.type==="offer"){

await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);

push(ref(db,"rooms/"+room+"/signals"),{
type:"answer",
to:data.from,
from:userId,
answer:answer
});

}

if(data.type==="answer"){
await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
}

if(data.type==="candidate"){
pc.addIceCandidate(new RTCIceCandidate(data.candidate));
}

}

window.startCamera=async function(){

let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});

replaceStream(stream);

};

window.startScreen=async function(){

let stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});

replaceStream(stream);

};

function replaceStream(stream){

localStream=stream;

document.getElementById("videos").innerHTML="";
addVideo(userId,stream);

Object.values(peers).forEach(pc=>{
stream.getTracks().forEach(t=>pc.addTrack(t,stream));
});

}

window.leaveRoom=function(){

Object.values(peers).forEach(pc=>pc.close());

remove(ref(db,"rooms/"+room+"/users/"+userId));

location.reload();

};

window.sendChat=function(){

let msg=document.getElementById("chatInput").value;

if(!msg)return;

push(ref(db,"rooms/"+room+"/chat"),{
user:userId,
text:msg
});

document.getElementById("chatInput").value="";

};

onChildAdded(ref(db,"rooms/"+room+"/chat"),snap=>{
let d=snap.val();
document.getElementById("chatBox").innerHTML+="<b>"+d.user+":</b> "+d.text+"<br>";
});

</script>

</body>
</html>
