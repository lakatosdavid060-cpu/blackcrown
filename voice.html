<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ultimate Voice Platform</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

.channels{
padding:10px;
border-bottom:1px solid #1e293b;
}

.channel{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.channel:hover{
background:#1e293b;
}

.users{
flex:1;
overflow:auto;
padding:10px;
}

.user{
padding:6px;
background:#1e293b;
border-radius:6px;
margin-bottom:6px;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:10px;
border-bottom:1px solid #1e293b;
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

input{
padding:6px;
border-radius:6px;
border:none;
}

/* VIDEO GRID */

#videos{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
padding:10px;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.videoBox{
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

.label{
position:absolute;
bottom:5px;
left:5px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

.speaking{
outline:3px solid #22c55e;
}

/* CHAT */

.chat{
height:220px;
border-top:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#chatBox{
flex:1;
overflow:auto;
padding:10px;
}

.chatInput{
display:flex;
gap:6px;
padding:10px;
}

.chatInput input{
flex:1;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="channels">

<div class="channel" onclick="setChannel('general')">🎤 general</div>
<div class="channel" onclick="setChannel('gaming')">🎤 gaming</div>
<div class="channel" onclick="setChannel('music')">🎤 music</div>

</div>

<div id="users" class="users"></div>

</div>

<div class="main">

<div class="topbar">

<input id="name" placeholder="Neved">

<button onclick="join()">Join</button>
<button onclick="toggleMute()">Mute</button>
<button onclick="camera()">Camera</button>
<button onclick="screen()">Screen</button>
<button onclick="leave()">Leave</button>

<span id="count"></span>

</div>

<div id="videos"></div>

<div class="chat">

<div id="chatBox"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded, onValue, remove }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
authDomain:"ordog-fizetes.firebaseapp.com",
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ordog-fizetes"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let id="u"+Math.floor(Math.random()*999999);
let name="";
let channel="general";

let localStream;
let peers={};

const iceServers={
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

function addVideo(stream,label){

let box=document.createElement("div");
box.className="videoBox";

let video=document.createElement("video");
video.autoplay=true;
video.playsInline=true;
video.srcObject=stream;

let l=document.createElement("div");
l.className="label";
l.innerText=label;

box.appendChild(video);
box.appendChild(l);

document.getElementById("videos").appendChild(box);

detectSpeaking(stream,box);

}

function detectSpeaking(stream,box){

const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const src=ctx.createMediaStreamSource(stream);

src.connect(analyser);

const data=new Uint8Array(analyser.frequencyBinCount);

function loop(){

analyser.getByteFrequencyData(data);

let vol=data.reduce((a,b)=>a+b)/data.length;

if(vol>30) box.classList.add("speaking");
else box.classList.remove("speaking");

requestAnimationFrame(loop);

}

loop();

}

window.setChannel=c=>{
channel=c;
}

window.join=async()=>{

name=document.getElementById("name").value||"Guest";

localStream=await navigator.mediaDevices.getUserMedia({
audio:true,
video:false
});

addVideo(localStream,name);

set(ref(db,"channels/"+channel+"/users/"+id),{name});

onValue(ref(db,"channels/"+channel+"/users"),snap=>{

let html="";
let count=0;

snap.forEach(u=>{

count++;

let n=u.val().name;

html+=`<div class="user">${n}</div>`;

if(u.key!==id && !peers[u.key]) createPeer(u.key,true);

});

document.getElementById("users").innerHTML=html;
document.getElementById("count").innerText=count+" online";

});

onChildAdded(ref(db,"signals/"+channel+"/"+id),async snap=>{

let data=snap.val();

if(!peers[data.from]) createPeer(data.from,false);

let pc=peers[data.from];

if(data.sdp){

await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

if(data.sdp.type==="offer"){

let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);

push(ref(db,"signals/"+channel+"/"+data.from),{
from:id,
sdp:pc.localDescription
});

}

}

if(data.ice){
await pc.addIceCandidate(new RTCIceCandidate(data.ice));
}

});

};

async function createPeer(uid,init){

let pc=new RTCPeerConnection(iceServers);

peers[uid]=pc;

localStream.getTracks().forEach(t=>{
pc.addTrack(t,localStream);
});

pc.ontrack=e=>{
addVideo(e.streams[0],uid);
};

pc.onicecandidate=e=>{

if(e.candidate){

push(ref(db,"signals/"+channel+"/"+uid),{
from:id,
ice:e.candidate
});

}

};

if(init){

let offer=await pc.createOffer();
await pc.setLocalDescription(offer);

push(ref(db,"signals/"+channel+"/"+uid),{
from:id,
sdp:pc.localDescription
});

}

}

window.camera=async()=>{

let s=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

localStream=s;
addVideo(s,name);

}

window.screen=async()=>{

let s=await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:true
});

localStream=s;
addVideo(s,name+" screen");

}

window.toggleMute=()=>{

localStream.getAudioTracks().forEach(t=>{
t.enabled=!t.enabled;
});

}

window.leave=()=>{

remove(ref(db,"channels/"+channel+"/users/"+id));

Object.values(peers).forEach(p=>p.close());

localStream.getTracks().forEach(t=>t.stop());

location.reload();

}

window.send=()=>{

let text=document.getElementById("msg").value;

push(ref(db,"channels/"+channel+"/chat"),{
name,
text
});

document.getElementById("msg").value="";

}

onChildAdded(ref(db,"channels/"+channel+"/chat"),snap=>{

let d=snap.val();

document.getElementById("chatBox").innerHTML+=
"<div><b>"+d.name+"</b>: "+d.text+"</div>";

});

</script>

</body>
</html>
