<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ördög Voice</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.serverBar{
width:70px;
background:#020617;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
gap:10px;
}

.server{
width:50px;
height:50px;
border-radius:15px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:bold;
}

.channels{
width:200px;
background:#020617;
padding:10px;
border-right:2px solid #1e293b;
}

.channel{
padding:6px;
border-radius:6px;
cursor:pointer;
margin-bottom:4px;
}

.channel:hover{
background:#1e293b;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.panel{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:10px;
}

#videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.videoBox{
position:relative;
border:3px solid transparent;
border-radius:10px;
}

.videoBox.speaking{
border-color:#22c55e;
}

video{
width:100%;
border-radius:10px;
background:black;
}

.name{
position:absolute;
bottom:5px;
left:5px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
font-weight:bold;
}

.green{background:#16a34a}
.red{background:#dc2626}
.orange{background:#ea580c}

#chatBox{
height:150px;
overflow:auto;
background:#020617;
padding:8px;
border-radius:8px;
margin-bottom:6px;
}

</style>
</head>

<body>

<div class="serverBar">

<div class="server">Ö</div>

</div>

<div class="channels">

<h3>🎤 Voice</h3>

<div class="channel" onclick="joinChannel('general')"># general</div>
<div class="channel" onclick="joinChannel('gaming')"># gaming</div>
<div class="channel" onclick="joinChannel('music')"># music</div>

</div>

<div class="main">

<div class="panel">

<input id="name" placeholder="Neved">
<button onclick="start()">Belépés</button>

<button onclick="toggleMute()" class="orange">Mute</button>
<button onclick="startCamera()">Kamera</button>
<button onclick="startScreen()">Képernyő</button>

</div>

<div class="panel">

<h3>💬 Chat</h3>

<div id="chatBox"></div>

<input id="chatInput">
<button onclick="sendChat()">Küld</button>

</div>

<div class="panel">

<h3>📺 Videók</h3>

<div id="videos"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
authDomain:"ordog-fizetes.firebaseapp.com",
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ordog-fizetes"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let userId="user_"+Math.floor(Math.random()*999999);
let name="";
let channel="";
let localStream;
let muted=false;

function addVideo(stream,label){

let box=document.createElement("div");
box.className="videoBox";

let v=document.createElement("video");
v.autoplay=true;
v.playsInline=true;
v.srcObject=stream;

let n=document.createElement("div");
n.className="name";
n.innerText=label;

box.appendChild(v);
box.appendChild(n);

document.getElementById("videos").appendChild(box);

}

window.start=async function(){

name=document.getElementById("name").value || "Vendég";

localStream=await navigator.mediaDevices.getUserMedia({audio:true});

addVideo(localStream,name);

}

window.joinChannel=function(c){

channel=c;

set(ref(db,"channels/"+channel+"/users/"+userId),{
name:name
});

onChildAdded(ref(db,"channels/"+channel+"/chat"),snap=>{

let d=snap.val();

document.getElementById("chatBox").innerHTML+=
"<b>"+d.name+":</b> "+d.text+"<br>";

});

}

window.toggleMute=function(){

muted=!muted;

localStream.getAudioTracks().forEach(t=>t.enabled=!muted);

}

window.startCamera=async function(){

let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});

addVideo(stream,name);

}

window.startScreen=async function(){

let stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});

addVideo(stream,name+" (screen)");

}

window.sendChat=function(){

let msg=document.getElementById("chatInput").value;

if(!msg)return;

push(ref(db,"channels/"+channel+"/chat"),{
name:name,
text:msg
});

document.getElementById("chatInput").value="";

}

</script>

</body>
</html>
