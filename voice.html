<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Mega Voice</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#020617;
display:flex;
flex-direction:column;
}

.channels{
padding:10px;
border-bottom:1px solid #1e293b;
}

.channel{
padding:6px;
cursor:pointer;
border-radius:6px;
}

.channel:hover{
background:#1e293b;
}

.users{
flex:1;
overflow:auto;
padding:10px;
}

.user{
padding:6px;
background:#1e293b;
border-radius:6px;
margin-bottom:6px;
display:flex;
align-items:center;
gap:6px;
}

.avatar{
width:24px;
height:24px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.controls{
padding:10px;
border-bottom:1px solid #1e293b;
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

.green{background:#16a34a}
.red{background:#dc2626}
.orange{background:#ea580c}

#videos{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
padding:10px;
}

.videoBox{
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.label{
position:absolute;
bottom:5px;
left:5px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

.chat{
height:200px;
border-top:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#chatBox{
flex:1;
overflow:auto;
padding:10px;
}

.chatInput{
display:flex;
gap:6px;
padding:10px;
}

.chatInput input{
flex:1;
padding:6px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="channels">

<div class="channel" onclick="setChannel('general')">🎤 general</div>
<div class="channel" onclick="setChannel('gaming')">🎤 gaming</div>
<div class="channel" onclick="setChannel('music')">🎤 music</div>

</div>

<div id="users" class="users"></div>

</div>

<div class="main">

<div class="controls">

<input id="name" placeholder="Neved">

<button onclick="join()" class="green">Join</button>
<button onclick="mute()" class="orange">Mute</button>
<button onclick="camera()">Camera</button>
<button onclick="screen()">Screen</button>
<button onclick="leave()" class="red">Leave</button>

</div>

<div id="videos"></div>

<div class="chat">

<div id="chatBox"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
authDomain:"ordog-fizetes.firebaseapp.com",
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ordog-fizetes"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let id="u"+Math.floor(Math.random()*999999);
let name="";
let channel="general";
let localStream;
let peers={};

const rtcConfig={
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
};

function addVideo(stream,label){

let box=document.createElement("div");
box.className="videoBox";

let v=document.createElement("video");
v.autoplay=true;
v.playsInline=true;
v.srcObject=stream;

let l=document.createElement("div");
l.className="label";
l.innerText=label;

box.appendChild(v);
box.appendChild(l);

document.getElementById("videos").appendChild(box);

}

window.setChannel=c=>{
channel=c;
}

window.join=async()=>{

name=document.getElementById("name").value||"Guest";

localStream=await navigator.mediaDevices.getUserMedia({audio:true});

addVideo(localStream,name);

set(ref(db,"channels/"+channel+"/users/"+id),{name});

onValue(ref(db,"channels/"+channel+"/users"),snap=>{

let html="";

snap.forEach(u=>{

let uid=u.key;
let n=u.val().name;

let avatar=n.charAt(0).toUpperCase();

html+=`
<div class="user">
<div class="avatar">${avatar}</div>
${n}
</div>
`;

if(uid!==id && !peers[uid]){

createPeer(uid,true);

}

});

document.getElementById("users").innerHTML=html;

});

}

function createPeer(uid,init){

let pc=new RTCPeerConnection(rtcConfig);

localStream.getTracks().forEach(t=>{
pc.addTrack(t,localStream);
});

pc.ontrack=e=>{
addVideo(e.streams[0],uid);
};

peers[uid]=pc;

}

window.camera=async()=>{

let s=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
addVideo(s,name);

}

window.screen=async()=>{

let s=await navigator.mediaDevices.getDisplayMedia({video:true});
addVideo(s,name+" screen");

}

window.mute=()=>{

localStream.getAudioTracks().forEach(t=>{
t.enabled=!t.enabled;
});

}

window.leave=()=>{

remove(ref(db,"channels/"+channel+"/users/"+id));
location.reload();

}

window.send=()=>{

let text=document.getElementById("msg").value;

if(!text)return;

push(ref(db,"channels/"+channel+"/chat"),{name,text});

document.getElementById("msg").value="";

}

onChildAdded(ref(db,"channels/"+channel+"/chat"),snap=>{

let d=snap.val();

document.getElementById("chatBox").innerHTML+=
"<b>"+d.name+":</b> "+d.text+"<br>";

});

</script>

</body>
</html>
