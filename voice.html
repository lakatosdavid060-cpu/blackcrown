<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ultimate Voice Platform</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
display:flex;
flex-direction:column;
padding:10px;
}

.channel{
padding:8px;
background:#1e293b;
border-radius:6px;
margin-bottom:6px;
cursor:pointer;
}

.channel:hover{
background:#334155;
}

.user{
background:#1e293b;
padding:6px;
border-radius:6px;
margin-bottom:5px;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:10px;
border-bottom:1px solid #1e293b;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
margin-right:5px;
}

/* VIDEO GRID */

#videos{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
padding:10px;
}

.videoBox{
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.label{
position:absolute;
bottom:5px;
left:5px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

.speaking{
outline:3px solid #22c55e;
}

/* CHAT */

.chat{
height:240px;
border-top:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#chatBox{
flex:1;
overflow:auto;
padding:10px;
}

.chatInput{
display:flex;
gap:5px;
padding:10px;
}

.chatInput input{
flex:1;
padding:6px;
}

/* WATCH */

#watch{
height:200px;
border-top:1px solid #1e293b;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>Channels</h3>

<div class="channel" onclick="setRoom('general')">🎤 general</div>
<div class="channel" onclick="setRoom('gaming')">🎮 gaming</div>
<div class="channel" onclick="setRoom('music')">🎵 music</div>

<h3>Users</h3>
<div id="users"></div>

</div>

<div class="main">

<div class="topbar">

<input id="name" placeholder="Neved">

<button onclick="join()">Join</button>
<button onclick="camera()">Camera</button>
<button onclick="screenShare()">Screen</button>
<button onclick="toggleMute()">Mute</button>

<input id="yt" placeholder="YouTube link">
<button onclick="watch()">Watch</button>

</div>

<div id="videos"></div>

<div id="watch"></div>

<div class="chat">

<div id="chatBox"></div>

<div class="chatInput">
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="emoji('😀')">😀</button>
<button onclick="emoji('🔥')">🔥</button>
<input type="file" id="file">
<button onclick="sendFile()">File</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
authDomain:"ordog-fizetes.firebaseapp.com",
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ordog-fizetes"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let id="u"+Math.random().toString(36).substr(2,9);
let name="";
let room="general";

let peers={};
let localStream;

const servers={
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

/* VIDEO */

function addVideo(stream,label,uid){

let existing=document.getElementById("v_"+uid);

if(existing){
existing.querySelector("video").srcObject=stream;
return;
}

let box=document.createElement("div");
box.className="videoBox";
box.id="v_"+uid;

let v=document.createElement("video");
v.autoplay=true;
v.playsInline=true;
v.srcObject=stream;

let l=document.createElement("div");
l.className="label";
l.innerText=label;

box.appendChild(v);
box.appendChild(l);

document.getElementById("videos").appendChild(box);

detectVoice(stream,box);

}

/* SPEAK DETECT */

function detectVoice(stream,box){

const ctx=new AudioContext();
const analyser=ctx.createAnalyser();
const src=ctx.createMediaStreamSource(stream);

src.connect(analyser);

const data=new Uint8Array(analyser.frequencyBinCount);

function loop(){

analyser.getByteFrequencyData(data);

let vol=data.reduce((a,b)=>a+b)/data.length;

if(vol>30){
box.classList.add("speaking");
}else{
box.classList.remove("speaking");
}

requestAnimationFrame(loop);

}

loop();

}

/* JOIN */

window.join=async()=>{

name=document.getElementById("name").value || "Guest";

localStream=await navigator.mediaDevices.getUserMedia({
audio:true,
video:true
});

addVideo(localStream,name,id);

set(ref(db,"rooms/"+room+"/users/"+id),{name});

listenUsers();
listenSignals();
listenChat();

}

/* USERS */

function listenUsers(){

onValue(ref(db,"rooms/"+room+"/users"),snap=>{

let users=snap.val() || {};

let box=document.getElementById("users");
box.innerHTML="";

Object.values(users).forEach(u=>{
let d=document.createElement("div");
d.className="user";
d.innerText=u.name;
box.appendChild(d);
});

Object.keys(users).forEach(uid=>{

if(uid===id) return;

if(!peers[uid]) createPeer(uid,true);

});

});

}

/* PEER */

async function createPeer(uid,init){

let pc=new RTCPeerConnection(servers);

peers[uid]=pc;

localStream.getTracks().forEach(track=>{
pc.addTrack(track,localStream);
});

pc.ontrack=e=>{
addVideo(e.streams[0],uid,uid);
};

pc.onicecandidate=e=>{

if(e.candidate){

push(ref(db,"rooms/"+room+"/signals/"+uid),{
from:id,
ice:e.candidate
});

}

};

if(init){

let offer=await pc.createOffer();
await pc.setLocalDescription(offer);

push(ref(db,"rooms/"+room+"/signals/"+uid),{
from:id,
sdp:pc.localDescription
});

}

}

/* SIGNALS */

function listenSignals(){

onChildAdded(ref(db,"rooms/"+room+"/signals/"+id),async snap=>{

let data=snap.val();

if(!peers[data.from]){
createPeer(data.from,false);
}

let pc=peers[data.from];

if(data.sdp){

await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

if(data.sdp.type==="offer"){

let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);

push(ref(db,"rooms/"+room+"/signals/"+data.from),{
from:id,
sdp:pc.localDescription
});

}

}

if(data.ice){
await pc.addIceCandidate(new RTCIceCandidate(data.ice));
}

});

}

/* CHAT */

function listenChat(){

onChildAdded(ref(db,"rooms/"+room+"/chat"),snap=>{

let data=snap.val();

let div=document.createElement("div");

div.innerHTML="<b>"+data.name+"</b>: "+data.msg;

document.getElementById("chatBox").appendChild(div);

});

}

window.send=()=>{

let msg=document.getElementById("msg").value;

push(ref(db,"rooms/"+room+"/chat"),{
name,
msg
});

document.getElementById("msg").value="";

}

/* EMOJI */

window.emoji=e=>{
push(ref(db,"rooms/"+room+"/chat"),{
name,
msg:e
});
}

/* FILE */

window.sendFile=()=>{

let file=document.getElementById("file").files[0];

let reader=new FileReader();

reader.onload=e=>{

push(ref(db,"rooms/"+room+"/chat"),{
name,
msg:"<a href='"+e.target.result+"' download='"+file.name+"'>📂 "+file.name+"</a>"
});

};

reader.readAsDataURL(file);

}

/* YOUTUBE */

window.watch=()=>{

let url=document.getElementById("yt").value;

let id=url.split("v=")[1];

document.getElementById("watch").innerHTML=
"<iframe src='https://www.youtube.com/embed/"+id+"'></iframe>";

}

/* CAMERA */

window.camera=async()=>{

let stream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

localStream=stream;

addVideo(stream,name,id);

}

/* SCREEN */

window.screenShare=async()=>{

let stream=await navigator.mediaDevices.getDisplayMedia({
video:true
});

localStream=stream;

addVideo(stream,name+" screen",id);

}

/* MUTE */

window.toggleMute=()=>{

localStream.getAudioTracks().forEach(t=>{
t.enabled=!t.enabled;
});

}

/* ROOM */

window.setRoom=r=>{
room=r;
location.reload();
}

</script>

</body>
</html>
