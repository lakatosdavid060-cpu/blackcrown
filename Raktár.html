<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.box {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 450px;
    margin: auto;
    margin-top: 30px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

input {
    margin: 6px;
    padding: 8px;
    border-radius: 10px;
    border: none;
}

button {
    margin: 4px;
    padding: 6px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.add-btn { background: #00c853; }
.remove-btn { background: #d50000; }
.take-btn { background: #2962ff; }

li {
    margin: 10px 0;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
}

.dashboard {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár PRO</h2>

<input type="text" id="playerName" placeholder="Neved">
<br>

<input type="text" id="search" placeholder="🔍 Keresés">
<br>

<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<br>
<button class="add-btn" onclick="addItem()">Hozzáadás</button>

<ul id="inventory"></ul>

<div class="dashboard" id="dashboard"></div>
</div>

<script>
const ADMIN_NAME = "admin";

const firebaseConfig = {
    apiKey: "AIza...",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let inventory = {};
let logs = [];
let searchText = "";

const nameInput = document.getElementById("playerName");
nameInput.value = localStorage.getItem("playerName") || "";

nameInput.oninput = () => {
    localStorage.setItem("playerName", nameInput.value);
};

// ADD
function addItem() {
    let player = nameInput.value.trim();
    let name = itemName.value.trim().toLowerCase();
    let amount = parseInt(itemAmount.value);

    if (!player || !name || amount <= 0) return;

    db.ref("raktar/" + name).transaction(c => (c || 0) + amount);

    saveLog(player, "add", name, amount);
}

// TAKE
function takeItem(name) {
    let player = nameInput.value.trim();
    let amt = parseInt(prompt("Mennyit?"));
    if (!amt) return;

    db.ref("raktar/" + name).transaction(c => {
        if (!c || c < amt) return c;
        return c - amt;
    });

    saveLog(player, "take", name, amt);
}

// REMOVE (ADMIN ONLY)
function removeItem(name) {
    let player = nameInput.value.trim();
    if (player !== ADMIN_NAME) return alert("Nem vagy admin!");

    db.ref("raktar/" + name).remove();
    saveLog(player, "remove", name, 0);
}

// LOG
function saveLog(player, action, item, amount) {
    db.ref("logs").push({
        player, action, item, amount, time: Date.now()
    });
}

// RENDER
function render() {
    let list = inventoryEl;
    list.innerHTML = "";

    Object.keys(inventory)
        .filter(n => n.includes(searchText))
        .forEach(name => {
            let li = document.createElement("li");
            li.innerHTML = `
                <b>${name}</b> - ${inventory[name]}
                <button class="take-btn" onclick="takeItem('${name}')">Kivét</button>
                <button class="remove-btn" onclick="removeItem('${name}')">Törlés</button>
            `;
            list.appendChild(li);
        });

    renderDashboard();
}

// DASHBOARD
function renderDashboard() {
    let total = Object.values(inventory).reduce((a,b)=>a+b,0);
    let unique = Object.keys(inventory).length;

    let players = {};
    logs.forEach(l => {
        if (!players[l.player]) players[l.player]=0;
        if (l.action === "add") players[l.player]+=l.amount;
    });

    let top = Object.entries(players).sort((a,b)=>b[1]-a[1])[0];

    dashboard.innerHTML = `
        📊 Összes item: ${total} <br>
        📦 Különböző item: ${unique} <br>
        🏆 Top játékos: ${top ? top[0]+" ("+top[1]+")" : "-"}
    `;
}

// SEARCH
search.oninput = e => {
    searchText = e.target.value.toLowerCase();
    render();
};

// REALTIME
db.ref("raktar").on("value", snap => {
    inventory = snap.val() || {};
    render();
});

db.ref("logs").on("value", snap => {
    logs = Object.values(snap.val() || {});
    renderDashboard();
});

// ENTER
itemAmount.addEventListener("keypress", e => {
    if (e.key === "Enter") addItem();
});
</script>

</body>
</html>
