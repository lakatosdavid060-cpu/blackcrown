<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár-rendszer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a2a3a, #0b0f14);
    color: white;
    margin: 0;
    text-align: center;
}

/* GLASS PANEL */
.box {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    width: 95%;
    max-width: 460px;
    margin: 35px auto;
    padding: 25px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    animation: fadeIn 0.5s ease;
}

h2 {
    margin-bottom: 15px;
    letter-spacing: 1px;
}

/* INPUTS */
input, select {
    margin: 6px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    width: 92%;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus {
    transform: scale(1.02);
    background: rgba(255,255,255,0.14);
}

/* BUTTONS */
button {
    padding: 10px 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: translateY(-2px) scale(1.05);
}

button:active {
    transform: scale(0.95);
}

/* ripple effect */
button::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    transition: 0.4s;
}

button:active::after {
    transform: scale(2);
    opacity: 0;
}

/* MAIN BUTTON */
.main-btn {
    background: linear-gradient(45deg, #6c5ce7, #a29bfe);
    color: white;
    width: 95%;
}

/* ITEM */
.item {
    background: rgba(255,255,255,0.06);
    padding: 14px;
    border-radius: 16px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.08);
    animation: slideIn 0.25s ease;
    transition: 0.25s;
}

.item:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.12);
}

/* DELETE ANIMATION */
.item.remove {
    opacity: 0;
    transform: scale(0.8);
    transition: 0.3s;
}

.item-info {
    text-align: left;
}

.amount {
    background: linear-gradient(45deg, #00cec9, #81ecec);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    margin-left: 6px;
    transition: 0.2s;
}

.amount.bump {
    transform: scale(1.3);
}

/* BUTTONS */
.item-buttons {
    display: flex;
    gap: 6px;
}

.add-btn {
    background: linear-gradient(45deg, #00b894, #55efc4);
}

.take-btn {
    background: linear-gradient(45deg, #fdcb6e, #ffeaa7);
    color: black;
}

.delete-btn {
    background: linear-gradient(45deg, #d63031, #ff7675);
}

/* STATS */
#stats {
    margin-top: 15px;
    background: rgba(0,0,0,0.35);
    padding: 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
}

#inventory {
    margin-top: 15px;
    max-height: 330px;
    overflow-y: auto;
}

/* scrollbar */
#inventory::-webkit-scrollbar {
    width: 6px;
}
#inventory::-webkit-scrollbar-thumb {
    background: #6c5ce7;
    border-radius: 10px;
}

/* animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár rendszer</h2>

<select id="warehouse">
    <option value="1">Raktár 1</option>
    <option value="2">Raktár 2</option>
    <option value="3">Raktár 3</option>
</select>

<input type="text" id="playerName" placeholder="Neved">
<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="main-btn" onclick="addItem()">➕ Hozzáadás</button>

<div id="stats">
    <h3>📊 Statisztika</h3>
    <p>📦 Összes: <span id="totalItems">0</span></p>
    <p>📁 Itemek: <span id="uniqueItems">0</span></p>
    <p>🔝 Legtöbb: <span id="topItem">-</span></p>
</div>

<div id="inventory"></div>
</div>

<script>

// FIREBASE (NEM NYÚLTAM)
const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ordog-fizetes",
    storageBucket: "ordog-fizetes.firebasestorage.app",
    messagingSenderId: "672089263660",
    appId: "1:672089263660:web:70086de26402ceb3464b89"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const nameInput = document.getElementById("playerName");

if (localStorage.getItem("playerName")) {
    nameInput.value = localStorage.getItem("playerName");
}

nameInput.addEventListener("input", () => {
    localStorage.setItem("playerName", nameInput.value);
});

let inventory = {};
let currentRef = null;

const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1498132522926866563/Otd28hTR8OA8TJu-eLPVxkR51ER2Zj9ofB8t0EW-T2dx61qwOPzcZ1EgttiyZNyh_Tv0";

function sendDiscordEmbed(title, description, color) {
    fetch(DISCORD_WEBHOOK, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            embeds:[{
                title,
                description,
                color,
                timestamp:new Date().toISOString()
            }]
        })
    });
}

function getWarehouse() {
    return document.getElementById("warehouse").value;
}

function loadWarehouse() {
    if (currentRef) currentRef.off();

    currentRef = db.ref("raktar/" + getWarehouse());

    currentRef.on("value", snap => {
        inventory = snap.val() || {};
        render();
        updateStats();
    });
}

function addItem() {
    let player = nameInput.value;
    let name = document.getElementById("itemName").value;
    let amount = parseInt(document.getElementById("itemAmount").value);

    if (!player) return alert("Add meg a neved!");
    if (!name || amount <= 0) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name.toLowerCase());

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });

    sendDiscordEmbed("📦 Add", player, 0x00b894);
}

function addToExisting(name) {
    let amount = parseInt(prompt("Hány?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });
}

function takeItem(name) {
    let amount = parseInt(prompt("Mennyit?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;

        if (current < amount) return;

        let newVal = current - amount;

        if (newVal <= 0) ref.remove();
        else ref.set(newVal);
    });
}

function removeItem(name) {
    db.ref("raktar/" + getWarehouse() + "/" + name).remove();
}

/* ANIM VALUE */
function animateValue(el, start, end) {
    let cur = start;
    let step = Math.ceil(end / 30);

    let i = setInterval(() => {
        cur += step;
        if (cur >= end) {
            cur = end;
            clearInterval(i);
        }
        el.innerText = cur;
    }, 20);
}

function render() {
    let list = document.getElementById("inventory");
    list.innerHTML = "";

    Object.keys(inventory).forEach(name => {
        let amount = inventory[name];

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="item-info">
                <b>${name}</b>
                <span class="amount">${amount} db</span>
            </div>
            <div class="item-buttons">
                <button class="add-btn" onclick="addToExisting('${name}')">➕</button>
                <button class="take-btn" onclick="takeItem('${name}')">📦</button>
                <button class="delete-btn" onclick="removeItem('${name}')">❌</button>
            </div>
        `;

        list.appendChild(div);
    });

    setTimeout(() => {
        document.querySelectorAll(".amount").forEach(el => {
            el.classList.add("bump");
            setTimeout(() => el.classList.remove("bump"), 200);
        });
    }, 50);
}

function updateStats() {
    let total = 0;
    let unique = Object.keys(inventory).length;

    let topName = "-";
    let topAmount = 0;

    Object.keys(inventory).forEach(name => {
        let amount = inventory[name];
        total += amount;

        if (amount > topAmount) {
            topAmount = amount;
            topName = name;
        }
    });

    animateValue(document.getElementById("totalItems"), 0, total);
    animateValue(document.getElementById("uniqueItems"), 0, unique);

    document.getElementById("topItem").innerText =
        topName + (topAmount ? ` (${topAmount})` : "");
}

document.getElementById("warehouse").addEventListener("change", loadWarehouse);

loadWarehouse();

</script>

</body>
</html>
