<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár rendszer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    margin: 0;
}

.box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    padding: 25px;
    border-radius: 20px;
    width: 95%;
    max-width: 420px;
    margin: auto;
    margin-top: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

input, select {
    margin: 6px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: 90%;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus {
    background: rgba(255,255,255,0.15);
    transform: scale(1.02);
}

button {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.07);
}

button:active {
    transform: scale(0.95);
}

.main-btn {
    background: linear-gradient(45deg, #6c5ce7, #a29bfe);
    color: white;
    width: 95%;
}

.item {
    background: rgba(255,255,255,0.06);
    padding: 12px;
    border-radius: 15px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.08);
    animation: fadeSlideIn 0.3s ease;
}

.item:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.1);
}

.item-info { text-align: left; }

.amount {
    background: linear-gradient(45deg, #00cec9, #81ecec);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    margin-left: 6px;
    transition: transform 0.2s;
}

.amount.bump {
    transform: scale(1.3);
}

.item-buttons {
    display: flex;
    gap: 5px;
}

.add-btn { background: linear-gradient(45deg, #00b894, #55efc4); color: white; }
.take-btn { background: linear-gradient(45deg, #fdcb6e, #ffeaa7); color: black; }
.delete-btn { background: linear-gradient(45deg, #d63031, #ff7675); color: white; }

#stats {
    margin-top: 15px;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.08);
}

#inventory {
    margin-top: 15px;
    max-height: 320px;
    overflow-y: auto;
}

#inventory::-webkit-scrollbar {
    width: 6px;
}

#inventory::-webkit-scrollbar-thumb {
    background: #6c5ce7;
    border-radius: 10px;
}

/* animáció */
@keyframes fadeSlideIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár rendszer</h2>

<select id="warehouse">
    <option value="1">Raktár 1</option>
    <option value="2">Raktár 2</option>
    <option value="3">Raktár 3</option>
</select>

<input type="text" id="playerName" placeholder="Neved">
<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="main-btn" onclick="addItem()">➕ Hozzáadás</button>

<div id="stats">
    <h3>📊 Statisztika</h3>
    <p>📦 Összes: <span id="totalItems">0</span></p>
    <p>📁 Itemek: <span id="uniqueItems">0</span></p>
    <p>🔝 Legtöbb: <span id="topItem">-</span></p>
</div>

<div id="inventory"></div>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ordog-fizetes",
    storageBucket: "ordog-fizetes.firebasestorage.app",
    messagingSenderId: "672089263660",
    appId: "1:672089263660:web:70086de26402ceb3464b89"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const nameInput = document.getElementById("playerName");

if (localStorage.getItem("playerName")) {
    nameInput.value = localStorage.getItem("playerName");
}

nameInput.addEventListener("input", () => {
    localStorage.setItem("playerName", nameInput.value);
});

let inventory = {};
let currentRef = null;

const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1498132522926866563/Otd28hTR8OA8TJu-eLPVxkR51ER2Zj9ofB8t0EW-T2dx61qwOPzcZ1EgttiyZNyh_Tv0";

const COLOR_ADD = 0x00b894;
const COLOR_TAKE = 0xfdcb6e;
const COLOR_DELETE = 0xd63031;

function sendDiscordEmbed(title, description, color) {
    fetch(DISCORD_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            embeds: [{
                title,
                description,
                color,
                timestamp: new Date().toISOString(),
                footer: { text: "Raktár rendszer log" }
            }]
        })
    });
}

function getWarehouse() {
    return document.getElementById("warehouse").value;
}

function loadWarehouse() {
    if (currentRef) currentRef.off();

    currentRef = db.ref("raktar/" + getWarehouse());

    currentRef.on("value", snap => {
        inventory = snap.val() || {};
        render();
        updateStats();
    });
}

function addItem() {
    let player = nameInput.value;
    let name = document.getElementById("itemName").value;
    let amount = parseInt(document.getElementById("itemAmount").value);

    if (!player) return alert("Add meg a neved!");
    if (!name || amount <= 0) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name.toLowerCase());

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });

    sendDiscordEmbed(
        "📦 Hozzáadás",
        `👤 ${player}\n🏠 Raktár: ${getWarehouse()}\n📌 ${name}\n🔢 ${amount}`,
        COLOR_ADD
    );
}

function addToExisting(name) {
    let player = nameInput.value;
    let amount = parseInt(prompt("Hány darab?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });

    sendDiscordEmbed("➕ Berakás", `${player} ${name} ${amount}`, COLOR_ADD);
}

function takeItem(name) {
    let player = nameInput.value;
    let amount = parseInt(prompt("Mennyit veszel ki?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;

        if (current < amount) return alert("Nincs ennyi!");

        let newVal = current - amount;

        if (newVal <= 0) ref.remove();
        else ref.set(newVal);
    });

    sendDiscordEmbed("📤 Kivét", `${player} ${name} ${amount}`, COLOR_TAKE);
}

function removeItem(name) {
    let player = nameInput.value;

    db.ref("raktar/" + getWarehouse() + "/" + name).remove();

    sendDiscordEmbed("🗑️ Törlés", `${player} ${name}`, COLOR_DELETE);
}

/* anim szám */
function animateValue(el, start, end, duration = 500) {
    let startTime = null;
    function step(ts) {
        if (!startTime) startTime = ts;
        let progress = Math.min((ts - startTime) / duration, 1);
        el.innerText = Math.floor(progress * (end - start) + start);
        if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

function render() {
    let list = document.getElementById("inventory");
    list.innerHTML = "";

    Object.keys(inventory).forEach(name => {
        let amount = inventory[name];

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="item-info">
                <b>${name}</b>
                <span class="amount">${amount} db</span>
            </div>
            <div class="item-buttons">
                <button class="add-btn" onclick="addToExisting('${name}')">➕</button>
                <button class="take-btn" onclick="takeItem('${name}')">📦</button>
                <button class="delete-btn" onclick="removeItem('${name}')">❌</button>
            </div>
        `;

        list.appendChild(div);
    });

    setTimeout(() => {
        document.querySelectorAll(".amount").forEach(el => {
            el.classList.add("bump");
            setTimeout(() => el.classList.remove("bump"), 200);
        });
    }, 50);
}

function updateStats() {
    let total = 0;
    let unique = Object.keys(inventory).length;

    let topName = "-";
    let topAmount = 0;

    Object.keys(inventory).forEach(name => {
        let amount = inventory[name];
        total += amount;

        if (amount > topAmount) {
            topAmount = amount;
            topName = name;
        }
    });

    animateValue(document.getElementById("totalItems"), 0, total);
    animateValue(document.getElementById("uniqueItems"), 0, unique);

    document.getElementById("topItem").innerText =
        topName + (topAmount ? ` (${topAmount})` : "");
}

document.getElementById("warehouse").addEventListener("change", loadWarehouse);

loadWarehouse();

</script>

</body>
</html>
