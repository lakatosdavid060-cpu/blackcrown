<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.box {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 95%;
    max-width: 450px;
    margin: auto;
    margin-top: 30px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

input {
    margin: 6px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 90%;
}

button {
    margin: 5px;
    padding: 7px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.add-btn { background: #00c853; }
.remove-btn { background: #d50000; }
.take-btn { background: #2962ff; }

li {
    margin: 10px 0;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
}

.dashboard {
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár PRO</h2>

<input type="text" id="playerName" placeholder="Neved">
<input type="text" id="search" placeholder="🔍 Keresés">

<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="add-btn" onclick="addItem()">Hozzáadás</button>

<ul id="inventory"></ul>

<div class="dashboard" id="dashboard"></div>
</div>

<script>
// 🔒 ADMIN NÉV
const ADMIN_NAME = "admin";

// 🔥 FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let inventory = {};
let logs = [];
let searchText = "";

// 💾 NÉV MENTÉS
const nameInput = document.getElementById("playerName");
nameInput.value = localStorage.getItem("playerName") || "";

nameInput.oninput = () => {
    localStorage.setItem("playerName", nameInput.value);
};

// ➕ ADD
function addItem() {
    let player = nameInput.value.trim();
    let name = itemName.value.trim().toLowerCase();
    let amount = parseInt(itemAmount.value);

    if (!player || !name || amount <= 0) return;

    db.ref("raktar/" + name).transaction(c => (c || 0) + amount);

    saveLog(player, "add", name, amount);

    itemName.value = "";
    itemAmount.value = "";
}

// 📦 TAKE
function takeItem(name) {
    let player = nameInput.value.trim();
    let amt = parseInt(prompt("Mennyit?"));
    if (!amt || amt <= 0) return;

    db.ref("raktar/" + name).transaction(c => {
        if (!c || c < amt) {
            alert("Nincs ennyi!");
            return c;
        }
        return c - amt;
    });

    saveLog(player, "take", name, amt);
}

// ❌ REMOVE (ADMIN)
function removeItem(name) {
    let player = nameInput.value.trim();
    if (player !== ADMIN_NAME) return alert("Nem vagy admin!");

    db.ref("raktar/" + name).remove();
    saveLog(player, "remove", name, 0);
}

// 🧾 LOG
function saveLog(player, action, item, amount) {
    db.ref("logs").push({
        player, action, item, amount, time: Date.now()
    });
}

// 🎨 RENDER
function render() {
    inventoryEl.innerHTML = "";

    Object.keys(inventory)
        .filter(n => n.includes(searchText))
        .forEach(name => {
            let li = document.createElement("li");
            li.innerHTML = `
                <b>${name}</b> - ${inventory[name]} db
                <button class="take-btn" onclick="takeItem('${name}')">Kivét</button>
                <button class="remove-btn" onclick="removeItem('${name}')">Törlés</button>
            `;
            inventoryEl.appendChild(li);
        });

    renderDashboard();
}

// 📊 DASHBOARD
function renderDashboard() {
    let total = Object.values(inventory)
        .reduce((a,b)=>a+(Number(b)||0),0);

    let unique = Object.keys(inventory).length;

    let players = {};

    logs.forEach(l => {
        if (!l.player) return;

        if (!players[l.player]) players[l.player]=0;
        if (l.action === "add") {
            players[l.player]+=Number(l.amount)||0;
        }
    });

    let top = Object.entries(players)
        .sort((a,b)=>b[1]-a[1])[0];

    let topText = top ? `${top[0]} (${top[1]})` : "nincs adat";

    dashboard.innerHTML = `
        📊 Összes item: ${total} <br>
        📦 Különböző item: ${unique} <br>
        🏆 Top játékos: ${topText}
    `;
}

// 🔍 SEARCH
search.oninput = e => {
    searchText = e.target.value.toLowerCase();
    render();
};

// 🔄 REALTIME + AUTO FIX
db.ref("raktar").on("value", snapshot => {
    let data = snapshot.val() || {};
    let migrated = {};

    Object.keys(data).forEach(key => {
        let val = data[key];

        if (typeof val === "number") {
            migrated[key] = val;
        } else if (val && typeof val === "object") {
            migrated[key] = val.amount || 0;
        }
    });

    inventory = migrated;

    // automatikus adatjavítás
    db.ref("raktar").set(migrated);

    render();
});

// 📜 LOG LOAD
db.ref("logs").on("value", snap => {
    logs = Object.values(snap.val() || {});
    renderDashboard();
});

// ⌨️ ENTER
itemAmount.addEventListener("keypress", e => {
    if (e.key === "Enter") addItem();
});
</script>

</body>
</html>
