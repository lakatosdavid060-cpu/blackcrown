<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár rendszer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
    color: white;
    text-align: center;
}

.box {
    background: #2e2e2e;
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    margin: auto;
    margin-top: 50px;
}

input, select {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 90%;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.main-btn {
    background: #6c5ce7;
    color: white;
    width: 95%;
}

.item {
    background: #3a3a3a;
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.item-info { text-align: left; }

.amount {
    background: #6c5ce7;
    padding: 3px 8px;
    border-radius: 10px;
}

.item-buttons {
    display: flex;
    gap: 5px;
}

.add-btn { background: #00b894; color: white; }
.take-btn { background: #fdcb6e; color: black; }
.delete-btn { background: #d63031; color: white; }

#stats {
    margin-top: 15px;
    background: #1f1f1f;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár rendszer</h2>

<select id="warehouse">
    <option value="1">Raktár 1</option>
    <option value="2">Raktár 2</option>
    <option value="3">Raktár 3</option>
</select>

<input type="text" id="playerName" placeholder="Neved">
<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="main-btn" onclick="addItem()">➕ Hozzáadás</button>

<div id="stats">
<h3>📊 Statisztika</h3>
<p>📦 Összes: <span id="totalItems">0</span></p>
<p>📁 Itemek: <span id="uniqueItems">0</span></p>
<p>🔝 Legtöbb: <span id="topItem">-</span></p>
</div>

<div id="inventory"></div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();

const nameInput = document.getElementById("playerName");

if(localStorage.getItem("playerName")){
nameInput.value = localStorage.getItem("playerName");
}

nameInput.addEventListener("input",()=>{
localStorage.setItem("playerName",nameInput.value);
});

let inventory = {};
let currentRef = null;

// 🔥 LOG FIX (nem undefined)
function addLog(type, player, item, amount, warehouse){
db.ref("logs").push({
type: type || "UNKNOWN",
player: player || "?",
item: item || "-",
amount: (amount && !isNaN(amount)) ? amount : 0,
warehouse: warehouse || "?",
time: Date.now()
});
}

function getWarehouse(){
return document.getElementById("warehouse").value;
}

function loadWarehouse(){
if(currentRef) currentRef.off();

currentRef = db.ref("raktar/" + getWarehouse());

currentRef.on("value", snap=>{
inventory = snap.val() || {};
render();
updateStats();
});
}

// ➕ ADD
function addItem(){
let player = nameInput.value || "?";
let name = document.getElementById("itemName").value;
let amount = parseInt(document.getElementById("itemAmount").value);

if(!name || isNaN(amount) || amount <= 0) return;

let ref = db.ref("raktar/" + getWarehouse() + "/" + name.toLowerCase());

ref.once("value", snap=>{
let current = snap.val() || 0;
ref.set(current + amount);
});

addLog("ADD", player, name, amount, getWarehouse());
}

// ➕ EXISTING
function addToExisting(name){
let player = nameInput.value || "?";
let amount = parseInt(prompt("Hány?"));
if(isNaN(amount) || amount <= 0) return;

let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

ref.once("value", snap=>{
let current = snap.val() || 0;
ref.set(current + amount);
});

addLog("ADD_EXISTING", player, name, amount, getWarehouse());
}

// 📦 TAKE
function takeItem(name){
let player = nameInput.value || "?";
let amount = parseInt(prompt("Mennyit?"));
if(isNaN(amount) || amount <= 0) return;

let ref = db.ref("raktar/" + getWarehouse() + "/" + name);

ref.once("value", snap=>{
let current = snap.val() || 0;

if(current < amount) return;

let newVal = current - amount;

if(newVal <= 0) ref.remove();
else ref.set(newVal);
});

addLog("TAKE", player, name, amount, getWarehouse());
}

// ❌ DELETE
function removeItem(name){
let player = nameInput.value || "?";

db.ref("raktar/" + getWarehouse() + "/" + name).remove();

addLog("DELETE", player, name, 0, getWarehouse());
}

// 🎨 RENDER
function render(){
let list = document.getElementById("inventory");
list.innerHTML = "";

Object.keys(inventory).forEach(name=>{
let amount = inventory[name];

let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<div class="item-info">
<b>${name}</b>
<span class="amount">${amount}</span>
</div>
<div class="item-buttons">
<button class="add-btn" onclick="addToExisting('${name}')">➕</button>
<button class="take-btn" onclick="takeItem('${name}')">📦</button>
<button class="delete-btn" onclick="removeItem('${name}')">❌</button>
</div>
`;

list.appendChild(div);
});
}

// 📊 STATS FIX
function updateStats(){
let total = 0;
let unique = Object.keys(inventory).length;

let top = "-";
let max = 0;

Object.keys(inventory).forEach(k=>{
let v = inventory[k];
total += v;

if(v > max){
max = v;
top = k;
}
});

document.getElementById("totalItems").innerText = total;
document.getElementById("uniqueItems").innerText = unique;
document.getElementById("topItem").innerText = top + (max ? ` (${max})` : "");
}

document.getElementById("warehouse").addEventListener("change", loadWarehouse);

loadWarehouse();

</script>
</body>
</html>
