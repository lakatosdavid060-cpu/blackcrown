<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár rendszer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
    color: white;
    text-align: center;
}

/* KONTÉNER */
.box {
    background: #2e2e2e;
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    margin: auto;
    margin-top: 50px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* INPUTOK */
input {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 90%;
}

/* GOMBOK */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* FŐ GOMB */
.main-btn {
    background: #6c5ce7;
    color: white;
    width: 95%;
    margin-top: 10px;
}

/* ITEM KÁRTYA */
.item {
    background: #3a3a3a;
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BAL OLDAL */
.item-info {
    text-align: left;
}

/* MENNYISÉG BADGE */
.amount {
    background: #6c5ce7;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 12px;
    margin-left: 5px;
}

/* JOBB OLDAL */
.item-buttons {
    display: flex;
    gap: 5px;
}

/* GOMB SZÍNEK */
.add-btn { background: #00b894; color: white; }
.take-btn { background: #fdcb6e; color: black; }
.delete-btn { background: #d63031; color: white; }
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár</h2>

<input type="text" id="playerName" placeholder="Neved">

<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="main-btn" onclick="addItem()">➕ Hozzáadás</button>

<div id="inventory"></div>
</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
    apiKey: "API_KEY",
    authDomain: "PROJECT.firebaseapp.com",
    databaseURL: "https://PROJECT.firebaseio.com",
    projectId: "PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔔 WEBHOOK
const webhookURL = "WEBHOOK_URL";

// 👤 NÉV
const nameInput = document.getElementById("playerName");

if (localStorage.getItem("playerName")) {
    nameInput.value = localStorage.getItem("playerName");
}

nameInput.addEventListener("input", () => {
    localStorage.setItem("playerName", nameInput.value);
});

let inventory = [];

// 📊 STAT
function updateStats(player, type, amount) {
    let ref = db.ref("stats/" + player);

    ref.once("value", snap => {
        let data = snap.val() || { added: 0, taken: 0 };

        if (type === "add") data.added += amount;
        if (type === "take") data.taken += amount;

        ref.set(data);
    });
}

// 🎨 DISCORD
function sendEmbed(type, player, item, amount, totalAfter = null) {

    let titles = {
        add: "➕ Berakás",
        take: "📦 Kivét",
        delete: "❌ Törlés"
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: "Raktár Bot",
            embeds: [{
                title: titles[type],
                fields: [
                    { name: "Játékos", value: player },
                    { name: "Tárgy", value: item },
                    { name: "Mennyiség", value: amount ? amount.toString() : "-" }
                ],
                timestamp: new Date()
            }]
        })
    });
}

// ➕ ÚJ ITEM
function addItem() {
    let player = nameInput.value;
    let name = document.getElementById("itemName").value;
    let amount = parseInt(document.getElementById("itemAmount").value);

    if (!player) return alert("Add meg a neved!");
    if (!name || amount <= 0) return;

    let existing = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());

    if (existing) {
        existing.amount += amount;
    } else {
        inventory.push({ name, amount });
    }

    sendEmbed("add", player, name, amount);
    updateStats(player, "add", amount);

    document.getElementById("itemName").value = "";
    document.getElementById("itemAmount").value = "";

    save();
    render();
}

// ➕ BERAKÁS
function addToExisting(index) {
    let player = nameInput.value;
    if (!player) return alert("Add meg a neved!");

    let input = prompt("Hány darabot szeretnél berakni?");
    if (input === null) return;

    let amount = parseInt(input);
    if (isNaN(amount) || amount <= 0) return alert("Hibás szám!");

    inventory[index].amount += amount;

    sendEmbed("add", player, inventory[index].name, amount, inventory[index].amount);
    updateStats(player, "add", amount);

    save();
    render();
}

// 📦 KIVÉT
function takeItem(index) {
    let player = nameInput.value;
    if (!player) return alert("Add meg a neved!");

    let amount = parseInt(prompt("Mennyit veszel ki?"));
    if (!amount || amount <= 0) return;

    if (inventory[index].amount < amount) {
        return alert("Nincs ennyi!");
    }

    inventory[index].amount -= amount;

    sendEmbed("take", player, inventory[index].name, amount, inventory[index].amount);
    updateStats(player, "take", amount);

    if (inventory[index].amount === 0) {
        inventory.splice(index, 1);
    }

    save();
    render();
}

// ❌ TÖRLÉS
function removeItem(index) {
    let player = nameInput.value;
    if (!player) return alert("Add meg a neved!");

    sendEmbed("delete", player, inventory[index].name);

    inventory.splice(index, 1);
    save();
    render();
}

// 💾 SAVE
function save() {
    db.ref("raktar").set(inventory);
}

// 🎨 RENDER
function render() {
    let list = document.getElementById("inventory");
    list.innerHTML = "";

    inventory.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="item-info">
                <b>${item.name}</b>
                <span class="amount">${item.amount} db</span>
            </div>

            <div class="item-buttons">
                <button class="add-btn" onclick="addToExisting(${i})">➕</button>
                <button class="take-btn" onclick="takeItem(${i})">📦</button>
                <button class="delete-btn" onclick="removeItem(${i})">❌</button>
            </div>
        `;

        list.appendChild(div);
    });
}

// 🔄 AUTO LOAD
db.ref("raktar").on("value", snapshot => {
    if (snapshot.exists()) {
        inventory = snapshot.val();
        render();
    }
});
</script>

</body>
</html>
