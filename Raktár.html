<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár rendszer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
    color: white;
    text-align: center;
}

.box {
    background: #2e2e2e;
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    margin: auto;
    margin-top: 50px;
}

input {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 90%;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.main-btn {
    background: #6c5ce7;
    color: white;
    width: 95%;
}

.item {
    background: #3a3a3a;
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.item-info {
    text-align: left;
}

.amount {
    background: #6c5ce7;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 12px;
    margin-left: 5px;
}

.item-buttons {
    display: flex;
    gap: 5px;
}

.add-btn { background: #00b894; color: white; }
.take-btn { background: #fdcb6e; color: black; }
.delete-btn { background: #d63031; color: white; }
</style>
</head>

<body>

<div class="box">
<h2>📦 Raktár</h2>

<input type="text" id="playerName" placeholder="Neved">

<input type="text" id="itemName" placeholder="Tárgy">
<input type="number" id="itemAmount" placeholder="Mennyiség">

<button class="main-btn" onclick="addItem()">➕ Hozzáadás</button>

<div id="inventory"></div>
</div>

<script>

// 🔥 FIREBASE CONFIG (a tiéd)
const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ordog-fizetes",
    storageBucket: "ordog-fizetes.firebasestorage.app",
    messagingSenderId: "672089263660",
    appId: "1:672089263660:web:70086de26402ceb3464b89"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 név mentés
const nameInput = document.getElementById("playerName");

if (localStorage.getItem("playerName")) {
    nameInput.value = localStorage.getItem("playerName");
}

nameInput.addEventListener("input", () => {
    localStorage.setItem("playerName", nameInput.value);
});

// 📦 inventory
let inventory = {};

// 🎨 DISCORD WEBHOOK
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1488436818239160350/jWmCU94AoTmJ1GLrxpVZQTTqM03Ibh4oGtXxqMxOkt2COj5nCXZwiIzoWB0Tmu1Pwm_l";

const COLOR_ADD = 0x00b894;
const COLOR_TAKE = 0xfdcb6e;
const COLOR_DELETE = 0xd63031;

// 📡 Discord embed
function sendDiscordEmbed(title, description, color) {
    fetch(DISCORD_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            embeds: [{
                title: title,
                description: description,
                color: color,
                timestamp: new Date().toISOString(),
                footer: { text: "Raktár rendszer log" }
            }]
        })
    });
}

// ➕ HOZZÁADÁS
function addItem() {
    let player = nameInput.value;
    let name = document.getElementById("itemName").value;
    let amount = parseInt(document.getElementById("itemAmount").value);

    if (!player) return alert("Add meg a neved!");
    if (!name || amount <= 0) return;

    let ref = db.ref("raktar/" + name.toLowerCase());

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });

    sendDiscordEmbed(
        "📦 Hozzáadás",
        `👤 ${player}\n📌 ${name}\n🔢 ${amount}`,
        COLOR_ADD
    );

    document.getElementById("itemName").value = "";
    document.getElementById("itemAmount").value = "";
}

// ➕ BERAKÁS
function addToExisting(name) {
    let player = nameInput.value;
    if (!player) return;

    let amount = parseInt(prompt("Hány darabot raksz be?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;
        ref.set(current + amount);
    });

    sendDiscordEmbed(
        "➕ Berakás",
        `👤 ${player}\n📌 ${name}\n🔢 ${amount}`,
        COLOR_ADD
    );
}

// 📦 KIVÉT
function takeItem(name) {
    let player = nameInput.value;
    if (!player) return;

    let amount = parseInt(prompt("Mennyit veszel ki?"));
    if (!amount) return;

    let ref = db.ref("raktar/" + name);

    ref.once("value", snap => {
        let current = snap.val() || 0;

        if (current < amount) return alert("Nincs ennyi!");

        let newVal = current - amount;

        if (newVal <= 0) ref.remove();
        else ref.set(newVal);
    });

    sendDiscordEmbed(
        "📤 Kivét",
        `👤 ${player}\n📌 ${name}\n🔢 ${amount}`,
        COLOR_TAKE
    );
}

// ❌ TÖRLÉS
function removeItem(name) {
    let player = nameInput.value;
    if (!player) return;

    db.ref("raktar/" + name).remove();

    sendDiscordEmbed(
        "🗑️ Törlés",
        `👤 ${player}\n📌 ${name}`,
        COLOR_DELETE
    );
}

// 🎨 RENDER
function render() {
    let list = document.getElementById("inventory");
    list.innerHTML = "";

    Object.keys(inventory).forEach(name => {
        let amount = inventory[name];

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="item-info">
                <b>${name}</b>
                <span class="amount">${amount} db</span>
            </div>

            <div class="item-buttons">
                <button class="add-btn" onclick="addToExisting('${name}')">➕</button>
                <button class="take-btn" onclick="takeItem('${name}')">📦</button>
                <button class="delete-btn" onclick="removeItem('${name}')">❌</button>
            </div>
        `;

        list.appendChild(div);
    });
}

// 🔄 LIVE
db.ref("raktar").on("value", snap => {
    inventory = snap.val() || {};
    render();
});

</script>

</body>
</html>
