<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Raktár rendszer</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
            text-align: center;
        }

        .box {
            background: #2e2e2e;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            margin-top: 50px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }

        button {
            margin: 3px;
            cursor: pointer;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📦 Raktár</h2>

    <!-- 👤 NÉV -->
    <input type="text" id="playerName" placeholder="Neved">

    <br>

    <!-- 📦 ITEM -->
    <input type="text" id="itemName" placeholder="Tárgy (pl. ak47)">
    <input type="number" id="itemAmount" placeholder="Mennyiség">

    <br>
    <button onclick="addItem()">Hozzáadás</button>

    <ul id="inventory"></ul>
</div>

<script>
    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
        authDomain: "ordog-fizetes.firebaseapp.com",
        databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ordog-fizetes",
        storageBucket: "ordog-fizetes.firebasestorage.app",
        messagingSenderId: "672089263660",
        appId: "1:672089263660:web:70086de26402ceb3464b89"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 🔔 DISCORD WEBHOOK
    const webhookURL = "https://discord.com/api/webhooks/1488436818239160350/jWmCU94AoTmJ1GLrxpVZQTTqM03Ibh4oGtXxqMxOkt2COj5nCXZwiIzoWB0Tmu1Pwm_l";

    let inventory = [];

    function sendToDiscord(message) {
        fetch(webhookURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: message
            })
        });
    }

    function saveLog(message) {
        db.ref("logs").push({
            text: message,
            time: new Date().toLocaleString()
        });
    }

    function addItem() {
        let player = document.getElementById("playerName").value;
        let name = document.getElementById("itemName").value;
        let amount = parseInt(document.getElementById("itemAmount").value);

        if (!player) return alert("Add meg a neved!");
        if (!name || amount <= 0) return;

        let existing = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());

        if (existing) {
            existing.amount += amount;
        } else {
            inventory.push({ name: name, amount: amount });
        }

        let msg = `➕ ${player} berakott ${amount} db ${name}`;
        sendToDiscord(msg);
        saveLog(msg);

        document.getElementById("itemName").value = "";
        document.getElementById("itemAmount").value = "";

        save();
        render();
    }

    function takeItem(index) {
        let player = document.getElementById("playerName").value;
        if (!player) return alert("Add meg a neved!");

        let takeAmount = parseInt(prompt("Mennyit veszel ki?"));
        if (!takeAmount || takeAmount <= 0) return;

        if (inventory[index].amount < takeAmount) {
            alert("Nincs ennyi a raktárban!");
            return;
        }

        inventory[index].amount -= takeAmount;

        let msg = `📦 ${player} kivett ${takeAmount} db ${inventory[index].name}`;
        sendToDiscord(msg);
        saveLog(msg);

        if (inventory[index].amount === 0) {
            inventory.splice(index, 1);
        }

        save();
        render();
    }

    function removeItem(index) {
        let player = document.getElementById("playerName").value;
        if (!player) return alert("Add meg a neved!");

        let msg = `❌ ${player} törölte: ${inventory[index].name}`;
        sendToDiscord(msg);
        saveLog(msg);

        inventory.splice(index, 1);
        save();
        render();
    }

    function save() {
        db.ref("raktar").set(inventory);
    }

    function render() {
        let list = document.getElementById("inventory");
        list.innerHTML = "";

        inventory.forEach((item, i) => {
            let li = document.createElement("li");
            li.innerHTML = `
                <b>${item.name}</b> - ${item.amount} db
                <button onclick="takeItem(${i})">Kivét</button>
                <button onclick="removeItem(${i})">Törlés</button>
            `;
            list.appendChild(li);
        });
    }

    // 🔄 AUTOMATIKUS BETÖLTÉS
    db.ref("raktar").on("value", snapshot => {
        if (snapshot.exists()) {
            inventory = snapshot.val();
            render();
        }
    });
</script>

</body>
</html>
