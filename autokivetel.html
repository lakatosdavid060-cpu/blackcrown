<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Autó rendszer (online)</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin-top:5px; cursor:pointer; }
.red { color:red; font-weight:bold; }
</style>
</head>
<body>

<h1>Autó rendszer (ONLINE)</h1>

<div class="card">
<h3>Új autó</h3>
<input id="brand" placeholder="Márka">
<input id="model" placeholder="Típus">
<button onclick="addCar()">Hozzáadás</button>

<h3>Új név</h3>
<input id="name" placeholder="Név">
<button onclick="addPerson()">Hozzáadás</button>
</div>

<div class="card">
<h2>Autók</h2>
<div id="cars"></div>
</div>

<div class="card">
<h2>Emberek</h2>
<div id="people"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const carsRef = ref(db, "cars");
const peopleRef = ref(db, "people");

// --- ADD ---
window.addCar = function() {
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  if (!brand || !model) return;

  const newRef = push(carsRef);
  set(newRef, {
    brand,
    model,
    takenBy: null,
    takenAt: null,
    returned: true,
    penaltyGiven: false
  });
};

window.addPerson = function() {
  const name = document.getElementById("name").value;
  if (!name) return;

  const newRef = push(peopleRef);
  set(newRef, {
    name,
    red: 0
  });
};

// --- TAKE ---
window.takeCar = function(carId, personId) {
  update(ref(db, "cars/" + carId), {
    takenBy: personId,
    takenAt: Date.now(),
    returned: false,
    penaltyGiven: false
  });
};

// --- RETURN ---
window.returnCar = function(carId) {
  update(ref(db, "cars/" + carId), {
    returned: true,
    takenBy: null,
    takenAt: null
  });
};

// --- AUTO PENALTY ---
function checkPenalty(cars, people) {
  const now = Date.now();

  Object.entries(cars || {}).forEach(([carId, car]) => {
    if (!car.returned && car.takenAt) {
      if (now - car.takenAt > 86400000 && !car.penaltyGiven) {

        const person = people[car.takenBy];
        if (person) {
          update(ref(db, "people/" + car.takenBy), {
            red: (person.red || 0) + 1
          });

          update(ref(db, "cars/" + carId), {
            penaltyGiven: true
          });
        }
      }
    }
  });
}

// --- RENDER ---
let carsData = {};
let peopleData = {};

onValue(carsRef, (snap) => {
  carsData = snap.val() || {};
  render();
});

onValue(peopleRef, (snap) => {
  peopleData = snap.val() || {};
  render();
});

function render() {
  checkPenalty(carsData, peopleData);

  const carsDiv = document.getElementById("cars");
  carsDiv.innerHTML = "";

  Object.entries(carsData).forEach(([id, car]) => {
    const person = peopleData[car.takenBy];

    carsDiv.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <b>${car.brand} ${car.model}</b><br>

        ${car.returned ? `
          <select id="p${id}">
            ${Object.entries(peopleData).map(([pid, p]) => 
              `<option value="${pid}">${p.name}</option>`).join("")}
          </select>
          <button onclick="takeCar('${id}', document.getElementById('p${id}').value)">
            Kivette
          </button>
        ` : `
          Kivette: <b>${person ? person.name : ""}</b><br>
          <button onclick="returnCar('${id}')">Visszarakta</button>
        `}
      </div>
    `;
  });

  const peopleDiv = document.getElementById("people");
  peopleDiv.innerHTML = "";

  Object.values(peopleData).forEach(p => {
    peopleDiv.innerHTML += `
      <div>${p.name} - <span class="red">${p.red} piros pont</span></div>
    `;
  });
}

</script>
</body>
</html>
