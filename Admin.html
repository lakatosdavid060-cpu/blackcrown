<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Crown Maffia Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;text-align:center;padding:20px;}
h1,h2{color:#ff0000;margin-bottom:20px;}
table{margin:0 auto;border-collapse:collapse;width:100%;max-width:900px;}
th,td{border:1px solid #ff0000;padding:10px;}
th{background:#111;}
tr:nth-child(even){background:#111;}
tr:nth-child(odd){background:#222;}
button{padding:5px 10px;margin:2px;background:#ff0000;color:#fff;border:none;cursor:pointer;}
button:hover{background:#ff5555;}
.status-fuggo{color:yellow;font-weight:bold;}
.status-elfogadva{color:lime;font-weight:bold;}
.status-elutasitva{color:red;font-weight:bold;}
</style>
</head>
<body>

<h1>Black Crown Maffia - Admin Panel</h1>

<h2>Bejelentkezés</h2>
<p>Felhasználónév: Boss vagy UnderBoss</p>
<p>Jelszó: BlackCrown2026</p>

<script>
let felhasznalo = prompt("Felhasználónév (Boss / UnderBoss):");
let jelszo = prompt("Jelszó:");
if(jelszo !== "BlackCrown2026" || (felhasznalo !== "Boss" && felhasznalo !== "UnderBoss")){
  alert("❌ Helytelen felhasználónév vagy jelszó!");
  window.location.href="index.html";
} else {
  alert("✅ Beléptél mint " + felhasznalo);
}
</script>

<h2>Jelentkezések</h2>
<table id="applications">
<tr>
<th>#</th>
<th>Karakter Név</th>
<th>Discord Név</th>
<th>Üzenet</th>
<th>Dátum</th>
<th>Státusz</th>
<th>Művelet</th>
</tr>
</table>

<script>
// Backend link
const backendURL = "https://script.google.com/macros/s/AKfycbyRuFKlG0jvp2V6qSXgsg0QvcqSAjulVPEQxDSIv0L5_SU0wYKRquNcV0Tkmmec1JMucw/exec";

// Betöltjük a jelentkezéseket
fetch(backendURL)
.then(res => res.json())
.then(data => {
  const table = document.getElementById("applications");
  for(let i=1; i<data.length; i++){ // első sor = fejléc
    const rowData = data[i];
    const r = table.insertRow();
    r.insertCell(0).innerText = i;
    r.insertCell(1).innerText = rowData[0];
    r.insertCell(2).innerText = rowData[1];
    r.insertCell(3).innerText = rowData[2];
    r.insertCell(4).innerText = rowData[3];
    
    // Státusz
    const statusCell = r.insertCell(5);
    const status = rowData[4] || "Függőben";
    statusCell.innerText = status;
    statusCell.className = status === "Elfogadva" ? "status-elfogadva" : status === "Elutasítva" ? "status-elutasitva" : "status-fuggo";
    
    // Gombok csak Boss-nak
    const actionCell = r.insertCell(6);
    if(felhasznalo === "Boss"){
      const elfogadBtn = document.createElement("button");
      elfogadBtn.innerText = "✅ Elfogad";
      elfogadBtn.onclick = () => updateStatus(i+1,"Elfogadva",statusCell);
      actionCell.appendChild(elfogadBtn);

      const elutasitBtn = document.createElement("button");
      elutasitBtn.innerText = "❌ Elutasít";
      elutasitBtn.onclick = () => updateStatus(i+1,"Elutasítva",statusCell);
      actionCell.appendChild(elutasitBtn);
    } else {
      actionCell.innerText = "-";
    }
  }
})
.catch(err => console.log("Hiba a backend betöltésénél:", err));

// Status frissítése Google Sheetben
function updateStatus(row,status,cell){
  const url = backendURL + "?row="+row+"&status="+encodeURIComponent(status);
  fetch(url)
  .then(r=>r.text())
  .then(res=>{
    cell.innerText = status;
    cell.className = status === "Elfogadva" ? "status-elfogadva" : "status-elutasitva";
    alert("✅ Státusz frissítve: "+status);
  })
  .catch(e=>alert("Hiba a státusz frissítésnél"));
}
</script>

</body>
</html>
