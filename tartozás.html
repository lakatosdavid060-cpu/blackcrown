<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tartozás Nyilvántartó</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px;
            background-color: #2e86de;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #1b4f72;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tartozás hozzáadása</h2>

    <label>Név:</label>
    <input type="text" id="nev">

    <label>Összeg (Ft):</label>
    <input type="number" id="osszeg">

    <label>Megjegyzés:</label>
    <textarea id="megjegyzes"></textarea>

    <button onclick="pdfGeneralas()">PDF generálása</button>
</div>

<script>
    async function pdfGeneralas() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const nev = document.getElementById("nev").value;
        const osszeg = document.getElementById("osszeg").value;
        const megjegyzes = document.getElementById("megjegyzes").value;

        doc.text("TARTOZÁSI NYILVÁNTARTÁS", 20, 20);
        doc.text("Név: " + nev, 20, 40);
        doc.text("Összeg: " + osszeg + " Ft", 20, 50);
        doc.text("Megjegyzés: " + megjegyzes, 20, 60);

        doc.save("tartozas.pdf");
    }
</script>

</body>
</html>
