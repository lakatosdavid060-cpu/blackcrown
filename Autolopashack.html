<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szám Hack</title>
<style>
  body {
    margin: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
  }

  .box {
    background: #111;
    padding: 28px;
    border-radius: 14px;
    border: 1px solid #2b2b2b;
    text-align: center;
    min-width: 470px;
  }

  .title {
    color: #facc15;
    margin-bottom: 12px;
    font-size: 22px;
    font-weight: bold;
  }

  .timer {
    margin-bottom: 8px;
    font-size: 28px;
    font-weight: bold;
    color: #facc15;
  }

  .next {
    margin-bottom: 18px;
    font-size: 18px;
    color: #d4d4d4;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 82px);
    gap: 12px;
    justify-content: center;
    margin: 18px 0;
  }

  .cell {
    width: 82px;
    height: 82px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid #333;
    font-weight: bold;
    font-size: 24px;
  }

  .cell:hover {
    background: #2a2a2a;
  }

  .correct {
    background: #22c55e !important;
  }

  .wrong {
    background: #ef4444 !important;
  }

  .status {
    margin-top: 12px;
    font-weight: bold;
    font-size: 20px;
  }

  .restart-btn {
    margin-top: 14px;
    padding: 12px 22px;
    font-size: 16px;
    font-weight: bold;
    background: #e8db58;
    color: #111;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="box">
  <div class="title">Szám rendezés hack</div>
  <div class="timer" id="timer">30</div>
  <div class="next" id="next">Következő szám: 1</div>
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>
  <button class="restart-btn" onclick="start()">Újraindítás</button>
</div>

<script>
let numbers = [];
let current = 1;
let time = 30;
let timer;
let gameOver = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  numbers = shuffle([...Array(25).keys()].map(x => x + 1));

  numbers.forEach(num => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = num;

    div.onclick = () => {
      if (gameOver) return;

      if (num === current) {
        div.classList.add("correct");
        div.style.pointerEvents = "none";
        current++;
        updateNext();

        if (current > 25) {
          end(true);
        }
      } else {
        div.classList.add("wrong");
        end(false);
      }
    };

    grid.appendChild(div);
  });
}

function updateNext() {
  document.getElementById("next").textContent =
    current <= 25 ? "Következő szám: " + current : "Kész";
}

function end(win) {
  gameOver = true;
  clearInterval(timer);

  document.getElementById("status").textContent =
    win ? "SIKERES HACK!" : "ELBUKTAD!";
}

function start() {
  current = 1;
  time = 30;
  gameOver = false;

  document.getElementById("status").textContent = "";
  document.getElementById("timer").textContent = time;

  updateNext();
  createGrid();

  clearInterval(timer);
  timer = setInterval(() => {
    if (gameOver) return;

    time--;
    document.getElementById("timer").textContent = time;

    if (time <= 0) {
      end(false);
    }
  }, 1000);
}

start();
</script>

</body>
</html>
