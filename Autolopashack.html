<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Szám Hack</title>
<style>
  body {
    margin:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    color:white;
  }

  .box {
    background:#111;
    padding:20px;
    border-radius:10px;
    border:1px solid #2b2b2b;
    text-align:center;
  }

  .title {
    color:#facc15;
    margin-bottom:10px;
  }

  .timer {
    margin-bottom:10px;
    font-size:18px;
  }

  .grid {
    display:grid;
    grid-template-columns: repeat(5, 60px);
    gap:8px;
    justify-content:center;
    margin:15px 0;
  }

  .cell {
    width:60px;
    height:60px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:6px;
    border:1px solid #333;
    font-weight:bold;
  }

  .cell:hover {
    background:#2a2a2a;
  }

  .correct {
    background:#22c55e !important;
  }

  .wrong {
    background:#ef4444 !important;
  }

  .status {
    margin-top:10px;
    font-weight:bold;
  }
</style>
</head>
<body>

<div class="box">
  <div class="title">Szám rendezés hack</div>
  <div class="timer" id="timer">20</div>
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>
</div>

<script>
let numbers = [];
let current = 1;
let time = 20;
let timer;
let gameOver = false;

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function beep(type){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = type==="good" ? 900 : 200;
  gain.gain.value = 0.05;

  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

function createGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  numbers = shuffle([...Array(25).keys()].map(x=>x+1));

  numbers.forEach(num=>{
    const div = document.createElement("div");
    div.className="cell";
    div.textContent=num;

    div.onclick = ()=>{
      if(gameOver) return;

      if(num === current){
        div.classList.add("correct");
        beep("good");
        current++;

        if(current > 25){
          end(true);
        }

      } else {
        div.classList.add("wrong");
        end(false);
      }
    };

    grid.appendChild(div);
  });
}

function end(win){
  gameOver = true;
  clearInterval(timer);

  if(win){
    document.getElementById("status").textContent="SIKERES HACK!";
  } else {
    document.getElementById("status").textContent="ELBUKTAD!";
    beep("bad");
  }
}

function start(){
  current = 1;
  time = 20;
  gameOver = false;

  document.getElementById("status").textContent="";
  document.getElementById("timer").textContent=time;

  createGrid();

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").textContent=time;

    if(time<=0){
      end(false);
    }
  },1000);
}

start();
</script>

</body>
</html>
