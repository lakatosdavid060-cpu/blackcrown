<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szám Hack</title>
<style>
  body {
    margin: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
  }

  .box {
    background: #111;
    padding: 28px;
    border-radius: 14px;
    border: 1px solid #2b2b2b;
    text-align: center;
    min-width: 470px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  }

  .title {
    color: #facc15;
    margin-bottom: 12px;
    font-size: 22px;
    font-weight: bold;
  }

  .timer {
    margin-bottom: 8px;
    font-size: 28px;
    font-weight: bold;
    color: #facc15;
  }

  .next {
    margin-bottom: 18px;
    font-size: 18px;
    color: #d4d4d4;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 82px);
    gap: 12px;
    justify-content: center;
    margin: 18px 0;
  }

  .cell {
    width: 82px;
    height: 82px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid #333;
    font-weight: bold;
    font-size: 24px;
    transition: 0.15s ease;
    user-select: none;
  }

  .cell:hover {
    background: #2a2a2a;
    transform: scale(1.03);
  }

  .correct {
    background: #22c55e !important;
    color: white;
  }

  .wrong {
    background: #ef4444 !important;
    color: white;
  }

  .status {
    margin-top: 12px;
    font-weight: bold;
    font-size: 20px;
    min-height: 26px;
  }

  .restart-btn {
    margin-top: 14px;
    padding: 12px 22px;
    font-size: 16px;
    font-weight: bold;
    background: #e8db58;
    color: #111;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .restart-btn:hover {
    filter: brightness(0.96);
  }
</style>
</head>
<body>

<div class="box">
  <div class="title">Szám rendezés hack</div>
  <div class="timer" id="timer">25</div>
  <div class="next" id="next">Következő szám: 1</div>
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>
  <button class="restart-btn" onclick="start()">Újraindítás</button>
</div>

<script>
let numbers = [];
let current = 1;
let time = 30;
let timer;
let gameOver = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function beep(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  if (type === "good") {
    osc.frequency.value = 900;
    gain.gain.value = 0.05;
    osc.start();
    osc.stop(ctx.currentTime + 0.08);
  } else if (type === "bad") {
    osc.frequency.value = 220;
    gain.gain.value = 0.07;
    osc.start();
    osc.stop(ctx.currentTime + 0.16);
  }

  if (type === "tick") {
    osc.frequency.value = 600;
    gain.gain.value = 0.03;
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  }
}

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  numbers = shuffle([...Array(25).keys()].map(x => x + 1));

  numbers.forEach(num => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = num;

    div.onclick = () => {
      if (gameOver) return;

      if (num === current) {
        div.classList.add("correct");
        div.style.pointerEvents = "none";
        beep("good");
        current++;
        updateNext();

        if (current > 25) {
          end(true);
        }
      } else {
        div.classList.add("wrong");
        end(false);
      }
    };

    grid.appendChild(div);
  });
}

function updateNext() {
  const nextEl = document.getElementById("next");
  if (current <= 25) {
    nextEl.textContent = "Következő szám: " + current;
  } else {
    nextEl.textContent = "Következő szám: kész";
  }
}

function end(win) {
  gameOver = true;
  clearInterval(timer);

  if (win) {
    document.getElementById("status").textContent = "SIKERES HACK!";
    beep("good");
  } else {
    document.getElementById("status").textContent = "ELBUKTAD!";
    beep("bad");
  }
}

function start() {
  current = 1;
  time = 25;
  gameOver = false;

  document.getElementById("status").textContent = "";
  document.getElementById("timer").textContent = time;
  updateNext();
  createGrid();

  clearInterval(timer);
  timer = setInterval(() => {
    if (gameOver) return;

    time--;
    document.getElementById("timer").textContent = time;

    if (time > 0 && time <= 5) {
      beep("tick");
    }

    if (time <= 0) {
      end(false);
    }
  }, 1000);
}

start();
</script>

</body>
</html>
