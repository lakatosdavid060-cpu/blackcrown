<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti PDF – Összesítés</title>
<style>
body{font-family:Arial;background:white;color:black;padding:15px;margin:0;}
h2{color:#111;margin-bottom:15px;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
th, td{border:1px solid #000;padding:6px;text-align:center;font-size:14px;}
th{background:#eee;}
button{padding:6px 12px;margin:10px 0;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>

<h2>💰 Heti Összesítés</h2>

<button onclick="let opt={margin:0.5, filename:'heti_osszesites.pdf', html2canvas:{scale:2}, jsPDF:{unit:'in', format:'letter', orientation:'landscape'}}; html2pdf().set(opt).from(document.body).save();">📄 PDF Letöltés</button>

<table>
<thead>
<tr>
<th>Tag</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th><th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th>
</tr>
</thead>
<tbody id="hetiTable"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// Betöltés
let hetiOsszesites = JSON.parse(localStorage.getItem("hetiLogPDF")) || {};
let tbody = document.getElementById("hetiTable");

for(let nev in hetiOsszesites){
  const t = hetiOsszesites[nev];
  let row = `<tr>
<td>${t.nev}</td>
<td>${t.rablas.paleto? "✅" : ""}</td>
<td>${t.rablas.allami? "✅" : ""}</td>
<td>${t.rablas.muzeum? "✅" : ""}</td>
<td>${t.rablas.bobcat? "✅" : ""}</td>
<td>${t.moso}</td>
<td>${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td>${t.fizetett? "✅":"❌"}</td>
</tr>`;
  tbody.innerHTML += row;
}
</script>

</body>
</html>
