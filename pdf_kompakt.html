<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti PDF – A2 Fekvő</title>
<style>
body{font-family:Arial, sans-serif;background:white;color:black;padding:5px;margin:0;}
h2{text-align:center;margin:5px 0;}
table{border-collapse:collapse;width:100%;table-layout:fixed;}
th, td{border:1px solid #000;padding:3px;text-align:center;white-space:nowrap;}
th{background:#eee;}
.summaryBox{border:1px solid #000;padding:5px;margin:5px 0;font-size:12px;}
#printBtn{padding:6px 12px;margin:10px 0;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>

<h2>💰 Heti Összesítés – Kompakt (A2)</h2>

<div class="summaryBox" id="summaryBox">
<h3>📊 Statisztika</h3>
<ul id="summaryUl"></ul>
</div>

<table id="hetiTable">
<thead>
<tr>
<th style="width:160px;">Tag</th>
<th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
<th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th>
</tr>
</thead>
<tbody id="hetiTbody"></tbody>
</table>

<button id="printBtn" onclick="generatePDF()">📄 PDF Letöltés</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
let hetiOsszesites = JSON.parse(localStorage.getItem("hetiLogPDF")) || {};
let tbody = document.getElementById("hetiTbody");
let summaryUl = document.getElementById("summaryUl");

let totalOsszeg=0, totalMoso=0, totalCraft=0, totalRabl={paleto:0,allami:0,muzeum:0,bobcat:0};
let tagCount = Object.keys(hetiOsszesites).length;

// Dinamikus betűméret – nagyon sok név esetén is olvasható
let fontSize = 11;
if(tagCount>50) fontSize = 10;
if(tagCount>80) fontSize = 9;

for(let nev in hetiOsszesites){
  const t = hetiOsszesites[nev];
  totalOsszeg += t.osszeg;
  totalMoso += t.moso;
  totalCraft += t.craft;
  if(t.rablas.paleto) totalRabl.paleto++;
  if(t.rablas.allami) totalRabl.allami++;
  if(t.rablas.muzeum) totalRabl.muzeum++;
  if(t.rablas.bobcat) totalRabl.bobcat++;

  let row = document.createElement("tr");
  row.style.fontSize = fontSize + "px";
  row.innerHTML = `<td>${t.nev}</td>
<td>${t.rablas.paleto?"✅":""}</td>
<td>${t.rablas.allami?"✅":""}</td>
<td>${t.rablas.muzeum?"✅":""}</td>
<td>${t.rablas.bobcat?"✅":""}</td>
<td>${t.moso}</td>
<td>${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td>${t.fizetett?"✅":"❌"}</td>`;
  tbody.appendChild(row);
}

summaryUl.innerHTML = `
<li>Összes Paleto rablás: ${totalRabl.paleto}</li>
<li>Összes Állami rablás: ${totalRabl.allami}</li>
<li>Összes Múzeum rablás: ${totalRabl.muzeum}</li>
<li>Összes Bobcat rablás: ${totalRabl.bobcat}</li>
<li>Összes Mosó: ${totalMoso}</li>
<li>Összes Craft: ${totalCraft}</li>
<li>Összes kiosztott pénz: ${totalOsszeg.toFixed(2)}$</li>
<li>Átlagos fizetés tagonként: ${(tagCount? totalOsszeg/tagCount:0).toFixed(2)}$</li>
`;

function generatePDF(){
  let btn = document.getElementById("printBtn");
  btn.style.display = "none"; // Gomb ne legyen a PDF-ben

  html2pdf().set({
    margin:0.15,
    filename:'heti_osszesites_A2.pdf',
    html2canvas:{scale:3},
    jsPDF:{unit:'in', format:'a2', orientation:'landscape'}
  }).from(document.body).save().then(()=>{
    btn.style.display = "inline-block";
  });
}
</script>

</body>
</html>
