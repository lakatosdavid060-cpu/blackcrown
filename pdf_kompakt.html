<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Összesítés</title>

<style>
body{font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;margin:5px 0;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:10px;}
table{border-collapse:collapse;width:100%;margin-bottom:20px;}
th, td{border:1px solid #000;padding:4px;text-align:center;font-size:13px;}
th{background:#eee;}
.top1{background:#ffe066;}
.top2{background:#e5e7eb;}
.top3{background:#fcd34d;}
</style>
</head>
<body>

<h2>Heti Összesítés</h2>
<button onclick="generatePDF()">📄 PDF Letöltés</button>

<table id="hetiTable">
<thead>
<tr>
<th>Tag</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 id="topLista"></h3>
<h3 id="totalSummary"></h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hetiRef = ref(db,"hetiOsszesites");

const tbody = document.querySelector("#hetiTable tbody");

onValue(hetiRef, snapshot => {

  tbody.innerHTML="";
  let lista=[];

  if(snapshot.exists()){
    const data=snapshot.val();

    for(let nev in data){
      const t=data[nev];
      const osszeg=Number(t.osszeg||0);

      lista.push({
        nev:t.nev,
        moso:t.moso||0,
        craft:t.craft||0,
        osszeg:osszeg,
        fizetett:t.fizetett
      });
    }

    // Rendezés TOP szerint
    lista.sort((a,b)=>b.osszeg-a.osszeg);

    lista.forEach((t,i)=>{
      let rowClass="";
      if(i===0) rowClass="top1";
      else if(i===1) rowClass="top2";
      else if(i===2) rowClass="top3";

      tbody.innerHTML+=`
      <tr class="${rowClass}">
        <td>${t.nev}</td>
        <td>${t.moso}</td>
        <td>${t.craft}</td>
        <td>${t.osszeg.toLocaleString('hu-HU',{minimumFractionDigits:2})} $</td>
        <td>${t.fizetett?"✔":"X"}</td>
      </tr>`;
    });

    // TOP 3 szöveges
    let topText="🏆 TOP 3: ";
    lista.slice(0,3).forEach((t,i)=>{
      topText += `${i+1}. ${t.nev} (${t.osszeg.toLocaleString('hu-HU')} $)  `;
    });
    document.getElementById("topLista").innerText=topText;

    // Összesítés
    let total=lista.reduce((s,t)=>s+t.osszeg,0);
    let kifizetve=lista.filter(t=>t.fizetett).reduce((s,t)=>s+t.osszeg,0);
    let kint=total-kifizetve;

    document.getElementById("totalSummary").innerText=
      `💵 Teljes kiosztás: ${total.toLocaleString('hu-HU')} $   |   `+
      `✅ Kifizetve: ${kifizetve.toLocaleString('hu-HU')} $   |   `+
      `❌ Kintlévőség: ${kint.toLocaleString('hu-HU')} $`;
  }
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
  const pageWidth = doc.internal.pageSize.getWidth();

  doc.setFontSize(14);
  doc.text("Heti Összesítés", pageWidth/2, 30, {align:'center'});

  const today = new Date();
  doc.setFontSize(10);
  doc.text(`Generálva: ${today.toLocaleDateString('hu-HU')}`, pageWidth/2, 45, {align:'center'});

  const rows=document.querySelectorAll("#hetiTable tbody tr");
  let bodyData=[];
  let total=0;
  let kifizetve=0;

  rows.forEach(row=>{
    const cells=row.querySelectorAll("td");
    let osszeg=parseFloat(cells[3].textContent.replace(/[^\d.-]/g,''))||0;
    total+=osszeg;
    if(cells[4].textContent.includes("✔")) kifizetve+=osszeg;

    bodyData.push([
      cells[0].textContent,
      cells[1].textContent,
      cells[2].textContent,
      cells[3].textContent,
      cells[4].textContent
    ]);
  });

  doc.autoTable({
    head:[["Tag","Mosó","Craft","Összeg","Kifizetve"]],
    body:bodyData,
    startY:60,
    theme:'grid',
    styles:{fontSize:9}
  });

  let kint=total-kifizetve;
  let finalY=doc.lastAutoTable.finalY+25;

  doc.setFontSize(12);
  doc.text(`Teljes kiosztás: ${total.toLocaleString('hu-HU')} $`,40,finalY);
  doc.text(`Kifizetve: ${kifizetve.toLocaleString('hu-HU')} $`,40,finalY+20);
  doc.text(`Kintlévőség: ${kint.toLocaleString('hu-HU')} $`,40,finalY+40);

  doc.save("heti_osszesites.pdf");
}
</script>

</body>
</html>
