<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti PDF – Több lapos</title>
<style>
body{font-family:Arial, sans-serif;background:white;color:black;padding:5px;margin:0;}
h2{text-align:center;margin:5px 0;}
#printBtn{padding:6px 12px;margin:10px 0;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>

<h2>💰 Heti Összesítés – Több lapos PDF</h2>

<button id="printBtn" onclick="generatePDF()">📄 PDF Letöltés</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

// Betöltés a lokális heti összesítésből
let hetiOsszesites = JSON.parse(localStorage.getItem("hetiLogPDF")) || {};

// Táblázat adatok
let columns = [
  {header:"Tag", dataKey:"nev"},
  {header:"Paleto", dataKey:"paleto"},
  {header:"Állami", dataKey:"allami"},
  {header:"Múzeum", dataKey:"muzeum"},
  {header:"Bobcat", dataKey:"bobcat"},
  {header:"Mosó", dataKey:"moso"},
  {header:"Craft", dataKey:"craft"},
  {header:"Összeg", dataKey:"osszeg"},
  {header:"Kifizetve", dataKey:"fizetett"}
];

let rows = [];

for(let nev in hetiOsszesites){
  const t = hetiOsszesites[nev];
  rows.push({
    nev: t.nev,
    paleto: t.rablas.paleto?"✅":"",
    allami: t.rablas.allami?"✅":"",
    muzeum: t.rablas.muzeum?"✅":"",
    bobcat: t.rablas.bobcat?"✅":"",
    moso: t.moso,
    craft: t.craft,
    osszeg: t.osszeg.toFixed(2),
    fizetett: t.fizetett?"✅":"❌"
  });
}

function generatePDF(){
  let btn = document.getElementById("printBtn");
  btn.style.display = "none";

  const doc = new jsPDF({orientation:'landscape', unit:'pt', format:'a2'});
  
  doc.setFontSize(14);
  doc.text("💰 Heti Összesítés – Több lapos PDF", doc.internal.pageSize.getWidth()/2, 30, {align:'center'});

  doc.autoTable({
    startY: 50,
    head: [columns.map(c=>c.header)],
    body: rows.map(r => columns.map(c=>r[c.dataKey])),
    styles: {fontSize:10, cellPadding:4},
    headStyles: {fillColor:[220,220,220], textColor:0, halign:'center'},
    bodyStyles: {halign:'center'},
    margin: {top:50, left:20, right:20, bottom:20},
    pageBreak: 'auto', // automatikusan több lapra osztja
  });

  doc.save('heti_osszesites_tobb_lapos.pdf');
  btn.style.display = "inline-block";
}
</script>

</body>
</html>
