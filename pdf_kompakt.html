<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Összesítés</title>

<style>
body{font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;margin:5px 0;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:10px;}
table{border-collapse:collapse;width:100%;margin-bottom:20px;}
th, td{border:1px solid #000;padding:4px;text-align:center;font-size:13px;}
th{background:#eee;}
.top1{background:#ffe066;}
.top2{background:#e5e7eb;}
.top3{background:#fcd34d;}

/* ===== HÁTTÉR DESIGN ===== */

body{
font-family:Arial;
margin:0;
padding:10px;
color:#111;

/* háttér szín + neon fény */
background:#020617;
background-image:
radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
radial-gradient(circle at 80% 80%, #0ea5e9 0%, transparent 40%);

min-height:100vh;
}

/* vízjel cím */

body::before{
content:"ÖRDÖGÖK";
position:fixed;

top:40px;
left:50%;
transform:translateX(-50%);

font-size:110px;
font-weight:900;
letter-spacing:15px;

color:white;
opacity:0.06;

pointer-events:none;
z-index:0;
}

/* táblák kártya kinézet */

table{
border-collapse:collapse;
width:100%;
margin-bottom:20px;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* fejlécek */

th{
background:#111827;
color:white;
}

/* gomb design */

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;

background:#2563eb;
color:white;

box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#1d4ed8;
}

/* TOP sorok */

.top1{
background:#ffe066;
font-weight:bold;
}

.top2{
background:#e5e7eb;
font-weight:bold;
}

.top3{
background:#fcd34d;
font-weight:bold;
}

/* összeg box */

#totalSummary{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
font-size:16px;
}

/* ===== DEVIL INTRO ===== */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
z-index:9999;
overflow:hidden;
transition:1s;
}

#devilText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
font-weight:900;
color:white;
letter-spacing:10px;
opacity:0;

animation:textFire 3s forwards;

text-shadow:
0 0 10px red,
0 0 20px orange,
0 0 40px red;
}

.devil{
position:absolute;
top:-100px;
font-size:60px;

animation:fall 2s linear forwards,
fire 0.5s infinite alternate;
}

.devil:nth-child(2){left:10%;animation-delay:0.2s;}
.devil:nth-child(3){left:25%;animation-delay:0.5s;}
.devil:nth-child(4){left:40%;animation-delay:0.8s;}
.devil:nth-child(5){left:60%;animation-delay:1s;}
.devil:nth-child(6){left:75%;animation-delay:1.2s;}
.devil:nth-child(7){left:90%;animation-delay:1.5s;}

@keyframes fall{
0%{top:-100px;transform:rotate(-20deg);}
100%{top:100vh;transform:rotate(360deg);}
}

@keyframes fire{
0%{text-shadow:0 0 10px red,0 0 20px orange;}
100%{text-shadow:0 0 20px orange,0 0 40px red;}
}

@keyframes textFire{
0%{
opacity:0;
transform:translate(-50%,-50%) scale(0.5);
}
50%{
opacity:1;
transform:translate(-50%,-50%) scale(1.2);
}
100%{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}
} 
</style>
</head>
<script>

window.onload = function(){

setTimeout(()=>{

document.getElementById("intro").style.opacity="0";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},1000);

},3500);

}

</script>
<body>

<div id="intro">

<div id="devilText">ÖRDÖGÖK</div>

<div class="devil">😈</div>
<div class="devil">😈</div>
<div class="devil">😈</div>
<div class="devil">😈</div>
<div class="devil">😈</div>
<div class="devil">😈</div>

</div>  
  
<h2 style="color:white;">Heti Összesítés</h2>
<button onclick="generatePDF()">📄 PDF Letöltés</button>

<table id="hetiTable">
<thead>
<tr>
<th>Tag</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 style="color:white;">🏆 Top Keresők</h2>

<table id="topTable">
<thead>
<tr>
<th>Helyezés</th>
<th>Tag</th>
<th>Összeg</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 id="totalSummary"></h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hetiRef = ref(db,"hetiOsszesites");

const tbody = document.querySelector("#hetiTable tbody");
const topBody = document.querySelector("#topTable tbody");
const totalSummary = document.getElementById("totalSummary");

onValue(hetiRef, snapshot => {

  tbody.innerHTML="";
  topBody.innerHTML="";
  totalSummary.innerHTML="";

  if(snapshot.exists()){

    const data=snapshot.val();
    let lista=[];
    let teljesOsszeg=0;
    let kifizetve=0;

    for(let nev in data){

      const t=data[nev];
      const osszeg=Number(t.osszeg||0);
      teljesOsszeg+=osszeg;
      if(t.fizetett) kifizetve+=osszeg;

      lista.push({nev:t.nev,osszeg:osszeg});

      tbody.innerHTML+=`
      <tr>
        <td>${t.nev}</td>
        <td>${t.moso||0}</td>
        <td>${t.craft||0}</td>
        <td>${osszeg.toLocaleString('hu-HU',{minimumFractionDigits:2})} $</td>
        <td>${t.fizetett?"✔":"X"}</td>
      </tr>`;
    }

    lista.sort((a,b)=>b.osszeg-a.osszeg);

    lista.forEach((t,index)=>{
      let medal="";
      let rowClass="";
      if(index===0){ medal="🥇"; rowClass="top1"; }
      else if(index===1){ medal="🥈"; rowClass="top2"; }
      else if(index===2){ medal="🥉"; rowClass="top3"; }

      topBody.innerHTML+=`
      <tr class="${rowClass}">
        <td>${medal || (index+1)}</td>
        <td>${t.nev}</td>
        <td>${t.osszeg.toLocaleString('hu-HU',{minimumFractionDigits:2})} $</td>
      </tr>`;
    });

    let kint = teljesOsszeg - kifizetve;

    totalSummary.innerHTML=
      `💰 Teljes kiosztás: <b>${teljesOsszeg.toLocaleString('hu-HU')} $</b> |
       ✅ Kifizetve: <b>${kifizetve.toLocaleString('hu-HU')} $</b> |
       ❌ Kintlévőség: <b>${kint.toLocaleString('hu-HU')} $</b>`;
  }
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
function generatePDF(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation:'landscape',
    unit:'pt',
    format:'a4'
  });

  const pageWidth = doc.internal.pageSize.getWidth();

  doc.setFontSize(14);
  doc.text("Heti Összesítés", pageWidth/2, 30, {align:'center'});

  doc.setFontSize(10);
  doc.text(`Generálva: ${new Date().toLocaleDateString('hu-HU')}`, pageWidth/2, 45, {align:'center'});

  const rows=document.querySelectorAll("#hetiTable tbody tr");
  let bodyData=[];
  let lista=[];
  let total=0;
  let kifizetve=0;

  rows.forEach(row=>{
    const cells=row.querySelectorAll("td");

    let osszeg=parseFloat(cells[3].textContent.replace(/[^\d.-]/g,''))||0;
    total+=osszeg;

    if(cells[4].textContent.includes("✔")) kifizetve+=osszeg;

    bodyData.push([
      cells[0].textContent,
      cells[1].textContent,
      cells[2].textContent,
      cells[3].textContent,
      cells[4].textContent
    ]);

    lista.push({nev:cells[0].textContent,osszeg:osszeg});
  });

  doc.autoTable({
    head:[["Tag","Mosó","Craft","Összeg","Kifizetve"]],
    body:bodyData,
    startY:60,
    theme:'grid',
    styles:{ fontSize:9 }
  });

  let afterMain=doc.lastAutoTable.finalY+25;

  lista.sort((a,b)=>b.osszeg-a.osszeg);

  let topData=[];
  lista.slice(0,3).forEach((t,index)=>{
    let medal=index===0?"🥇":index===1?"🥈":index===2?"🥉":"";
    topData.push([
      medal || (index+1),
      t.nev,
      t.osszeg.toLocaleString('hu-HU',{minimumFractionDigits:2})+" $"
    ]);
  });

  doc.setFontSize(13);
  doc.text("TOP 3 Keresők",40,afterMain);

  doc.autoTable({
    head:[["Helyezés","Tag","Összeg"]],
    body:topData,
    startY:afterMain+10,
    theme:'grid',
    styles:{ fontSize:10 }
  });

  let afterTop=doc.lastAutoTable.finalY+25;
  let kint=total-kifizetve;

  doc.setFontSize(12);
  doc.text(`Teljes kiosztás: ${total.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`,40,afterTop);
  doc.text(`Kifizetve: ${kifizetve.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`,40,afterTop+20);
  doc.text(`Kintlévőség: ${kint.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`,40,afterTop+40);

  doc.save("heti_osszesites.pdf");
}
</script>
</body>
</html>
