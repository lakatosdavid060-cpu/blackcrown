<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Összesítés PDF</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:white;
  color:black;
  margin:0;
  padding:10px;
}

h2{
  text-align:center;
  margin:5px 0;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  margin-bottom:10px;
}

table{
  border-collapse:collapse;
  width:100%;
}

th, td{
  border:1px solid #000;
  padding:4px;
  text-align:center;
  font-size:11px;
}

th{
  background:#eee;
}
</style>
</head>
<body>

<h2>Heti Összesítés</h2>

<button onclick="generatePDF()">📄 PDF Letöltés</button>

<div id="pdfContent">
<table id="hetiTable">
<thead>
<tr>
<th>Tag</th>
<th>Paleto</th>
<th>Állami</th>
<th>Múzeum</th>
<th>Bobcat</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>

// Adatok betöltése
let hetiOsszesites = JSON.parse(localStorage.getItem("hetiLogPDF")) || {};
let tbody = document.querySelector("#hetiTable tbody");

for(let nev in hetiOsszesites){
  const t = hetiOsszesites[nev];

  let row = `
  <tr>
    <td>${t.nev}</td>
    <td>${t.rablas.paleto ? "✔" : ""}</td>
    <td>${t.rablas.allami ? "✔" : ""}</td>
    <td>${t.rablas.muzeum ? "✔" : ""}</td>
    <td>${t.rablas.bobcat ? "✔" : ""}</td>
    <td>${t.moso}</td>
    <td>${t.craft}</td>
    <td>${t.osszeg.toFixed(2)}$</td>
    <td>${t.fizetett ? "✔" : "X"}</td>
  </tr>
  `;

  tbody.innerHTML += row;
}

function generatePDF(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation:'landscape',
    unit:'pt',
    format:'a4'   // <<< NORMÁL A4
  });

  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();

  doc.setFontSize(14);
  doc.text("Heti Összesítés", pageWidth/2, 30, {align:'center'});

  doc.autoTable({
    html:'#hetiTable',
    startY:50,
    theme:'grid',
    pageBreak:'avoid',   // mindig 1 oldal
    styles:{
      fontSize:8,        // automatikusan kisebb
      cellPadding:2,
      overflow:'linebreak'
    },
    margin:{top:50,bottom:20}
  });

  doc.save("heti_osszesites.pdf");
}

</script>

</body>
</html>
