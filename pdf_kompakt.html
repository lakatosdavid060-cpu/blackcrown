<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Összesítés</title>

<style>
body{font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;margin:5px 0;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:10px;}
table{border-collapse:collapse;width:100%;margin-bottom:20px;}
th, td{border:1px solid #000;padding:4px;text-align:center;font-size:13px;}
th{background:#eee;}
.top1{background:#ffe066;}
.top2{background:#e5e7eb;}
.top3{background:#fcd34d;}
</style>
</head>
<body>

<h2>Heti Összesítés</h2>

<button onclick="generatePDF()">📄 PDF Letöltés</button>

<table id="hetiTable">
<thead>
<tr>
<th>Tag</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>🏆 Top Keresők</h2>

<table id="topTable">
<thead>
<tr>
<th>Helyezés</th>
<th>Tag</th>
<th>Összeg</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3 id="totalSummary"></h3>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hetiRef = ref(db,"hetiOsszesites");

const tbody = document.querySelector("#hetiTable tbody");
const topBody = document.querySelector("#topTable tbody");
const totalSummary = document.getElementById("totalSummary");

onValue(hetiRef, snapshot => {

  tbody.innerHTML="";
  topBody.innerHTML="";
  totalSummary.innerHTML="";

  if(snapshot.exists()){

    const data=snapshot.val();
    let lista=[];
    let teljesOsszeg=0;

    for(let nev in data){

      const t=data[nev];
      const osszeg=Number(t.osszeg||0);
      teljesOsszeg+=osszeg;

      lista.push({nev:t.nev,osszeg:osszeg});

      tbody.innerHTML+=`
      <tr>
        <td>${t.nev}</td>
        <td>${t.moso||0}</td>
        <td>${t.craft||0}</td>
        <td>${osszeg.toFixed(2)}$</td>
        <td>${t.fizetett?"✔":"X"}</td>
      </tr>`;
    }

    lista.sort((a,b)=>b.osszeg-a.osszeg);

    lista.forEach((t,index)=>{
      let medal="";
      let rowClass="";
      if(index===0){ medal="🥇"; rowClass="top1"; }
      else if(index===1){ medal="🥈"; rowClass="top2"; }
      else if(index===2){ medal="🥉"; rowClass="top3"; }

      topBody.innerHTML+=`
      <tr class="${rowClass}">
        <td>${medal || (index+1)}</td>
        <td>${t.nev}</td>
        <td>${t.osszeg.toFixed(2)}$</td>
      </tr>`;
    });

    totalSummary.innerHTML=
      "💰 Heti teljes kiosztás: <b>"+teljesOsszeg.toFixed(2)+"$</b>";
  }
});

</script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>

function generatePDF(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation:'landscape',
    unit:'pt',
    format:'a4'
  });

  const pageWidth = doc.internal.pageSize.getWidth();

  // Cím
  doc.setFontSize(14);
  doc.text("Heti Összesítés", pageWidth/2, 30, {align:'center'});

  // 📅 DÁTUM
  const today = new Date();
  const nap = today.getDate().toString().padStart(2,'0');
  const honap = (today.getMonth()+1).toString().padStart(2,'0');
  const ev = today.getFullYear();

  doc.setFontSize(10);
  doc.text(`Generálva: ${ev}.${honap}.${nap}`, pageWidth/2, 45, {align:'center'});

  const table=document.querySelectorAll("#hetiTable tbody tr");
  let bodyData=[];

  table.forEach(row=>{
    const cells=row.querySelectorAll("td");
    bodyData.push([
      cells[0].textContent,
      cells[1].textContent,
      cells[2].textContent,
      cells[3].textContent,
      cells[4].textContent
    ]);
  });

  doc.autoTable({
    head:[["Tag","Mosó","Craft","Összeg","Kifizetve"]],
    body:bodyData,
    startY:60,
    theme:'grid',
    styles:{ fontSize:9 }
  });

  // 💰 ÖSSZESÍTÉS SZÁMOLÁS
let total = 0;
let kifizetve = 0;

bodyData.forEach(row=>{
  let osszeg = parseFloat(row[3].replace(/[^\d.-]/g,'')) || 0;
  total += osszeg;
  if(row[4] === "✔") kifizetve += osszeg;
});

let kintlevoseg = total - kifizetve;

// Pozíció a táblázat után
let finalY = doc.lastAutoTable.finalY + 20;

doc.setFontSize(12);
doc.text(`Teljes kiosztás: ${total.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`, 40, finalY);
doc.text(`Kifizetve: ${kifizetve.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`, 40, finalY + 18);
doc.text(`Kintlévőség: ${kintlevoseg.toLocaleString('hu-HU',{minimumFractionDigits:2})} $`, 40, finalY + 36);

  doc.save("heti_osszesites.pdf");
}

</script>

</body>
</html>
