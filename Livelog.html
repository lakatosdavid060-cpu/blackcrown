<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Live Raktár Log</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

.log {
    width: 90%;
    max-width: 700px;
    margin: auto;
    margin-top: 20px;
}

.entry {
    background: #222;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    text-align: left;
    border-left: 5px solid #6c5ce7;
}

.ADD { border-left-color: #00b894; }
.ADD_EXISTING { border-left-color: #55efc4; }
.TAKE { border-left-color: #fdcb6e; }
.DELETE { border-left-color: #d63031; }

.time {
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<h2>📡 LIVE Raktár Log</h2>
<div class="log" id="log"></div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ordog-fizetes",
    storageBucket: "ordog-fizetes.firebasestorage.app",
    messagingSenderId: "672089263660",
    appId: "1:672089263660:web:70086de26402ceb3464b89"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const logDiv = document.getElementById("log");

db.ref("logs").limitToLast(50).on("value", snap => {

    let data = snap.val() || {};
    logDiv.innerHTML = "";

    Object.keys(data).reverse().forEach(id => {
        let d = data[id];

        let div = document.createElement("div");
        div.className = "entry " + d.type;

        div.innerHTML = `
            <b>${d.type}</b><br>
            👤 ${d.player}<br>
            📦 ${d.item} (${d.amount})<br>
            🏠 Raktár: ${d.warehouse}<br>
            <span class="time">${new Date(d.time).toLocaleString()}</span>
        `;

        logDiv.appendChild(div);
    });
});

</script>

</body>
</html>
