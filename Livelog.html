<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár Log</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    max-width:700px;
    margin:auto;
    margin-top:20px;
}

.log {
    text-align:left;
}

.item {
    background:#222;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border-left:4px solid #6c5ce7;
}

.ADD { border-left-color:#00b894; }
.ADD_EXISTING { border-left-color:#55efc4; }
.TAKE { border-left-color:#fdcb6e; }
.DELETE { border-left-color:#d63031; }

.small {
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<h2>📡 LIVE Raktár Log</h2>

<div class="box">
<div id="log" class="log"></div>
</div>

<script>

firebase.initializeApp({
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();

const logDiv = document.getElementById("log");

db.ref("logs").limitToLast(50).on("value", snap => {

let data = snap.val() || {};
logDiv.innerHTML = "";

// legfrissebb felül
Object.keys(data).reverse().forEach(id => {
let d = data[id];

let div = document.createElement("div");
div.className = "item " + (d.type || "");

div.innerHTML = `
<b>${d.type || "?"}</b><br>
👤 ${d.player || "?"}<br>
📦 ${d.item || "-"} (${d.amount || 0})<br>
🏠 Raktár: ${d.warehouse || "?"}<br>
<span class="small">${new Date(d.time).toLocaleString()}</span>
`;

logDiv.appendChild(div);
});

});

</script>

</body>
</html>
