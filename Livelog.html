<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár Log</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    max-width:900px;
    margin:auto;
    margin-top:20px;
}

.item {
    background:#222;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border-left:4px solid #6c5ce7;
}

.ADD { border-left-color:#00b894; }
.ADD_EXISTING { border-left-color:#55efc4; }
.TAKE { border-left-color:#fdcb6e; }
.DELETE { border-left-color:#d63031; }

.small {
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<h2>📡 LIVE Raktár Log + Discord</h2>

<div class="box">
<div id="log"></div>
</div>

<script>

// 🔥 WEBHOOK
const WEBHOOK_URL = "https://discord.com/api/webhooks/1498489222452215841/oFvtIytRbCkkcWUmshJsaBLS79K8WDoDjrJKDGVUGGzMqFjcDGWVlh9rfvdpQZHF9cdP";

firebase.initializeApp({
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();
const logDiv = document.getElementById("log");

// --------------------
// DISCORD KÜLDÉS
// --------------------

let lastSent = 0;

function sendToDiscord(d){

  let now = Date.now();
  if(now - lastSent < 1000) return; // rate limit (1/sec)

  lastSent = now;

  const colorMap = {
    ADD: 5763719,
    ADD_EXISTING: 3447003,
    TAKE: 16776960,
    DELETE: 15548997
  };

  let embed = {
    username: "📡 Raktár Log",
    embeds: [{
      title: d.type || "?",
      color: colorMap[d.type] || 9807270,
      fields: [
        { name: "👤 Játékos", value: d.player || "?", inline: true },
        { name: "📦 Item", value: `${d.item || "-"} (${d.amount || 0})`, inline: true },
        { name: "🏠 Raktár", value: d.warehouse || "?", inline: true }
      ],
      footer: {
        text: new Date(d.time).toLocaleString()
      }
    }]
  };

  // 🚨 suspicious
  if(d.amount > 100){
    embed.embeds[0].title = "🚨 GYANÚS AKTIVITÁS!";
    embed.embeds[0].color = 16711680;
  }

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(embed)
  }).catch(()=>{});
}

// --------------------
// 🔥 FONTOS FIX
// csak új logokra küld
// --------------------

let initialized = false;

db.ref("logs").limitToLast(100).on("child_added", snap => {

  let d = snap.val();

  // első betöltés = NE küldj Discordra
  if(!initialized) return;

  sendToDiscord(d);
});

// amikor az első betöltés kész
db.ref("logs").limitToLast(100).once("value", () => {
  initialized = true;
});

// --------------------
// UI RENDER (külön!)
// --------------------

db.ref("logs").limitToLast(100).on("value", snap => {

  let data = snap.val() || {};
  logDiv.innerHTML = "";

  Object.keys(data).reverse().forEach(id => {

    let d = data[id];

    let div = document.createElement("div");
    div.className = "item " + (d.type || "");

    // suspicious UI
    if(d.amount > 100){
      div.style.borderLeftColor = "red";
    }

    div.innerHTML = `
    <b>${d.type || "?"}</b><br>
    👤 ${d.player || "?"}<br>
    📦 ${d.item || "-"} (${d.amount || 0})<br>
    🏠 ${d.warehouse || "?"}<br>
    <span class="small">${new Date(d.time).toLocaleString()}</span>
    `;

    logDiv.appendChild(div);
  });

});

</script>

</body>
</html>
