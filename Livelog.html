<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Raktár Log - LIVE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    max-width:900px;
    margin:auto;
}

.item {
    background:#1e1e1e;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border-left:4px solid #6c5ce7;
    text-align:left;
}

.ADD { border-left-color:#00b894; }
.ADD_EXISTING { border-left-color:#55efc4; }
.TAKE { border-left-color:#fdcb6e; }
.DELETE { border-left-color:#d63031; }

.error { border-left-color:red !important; }

.small {
    font-size:12px;
    opacity:0.7;
}

input {
    padding:8px;
    width:80%;
    margin:10px;
    border-radius:6px;
    border:none;
}

#status {
    margin:10px;
    font-size:13px;
    opacity:0.8;
}
</style>
</head>

<body>

<h2>📡 Raktár Log (LIVE)</h2>

<input id="search" placeholder="🔎 Keresés játékos / item / raktár...">

<div id="status">Betöltés...</div>

<div class="box">
<div id="log"></div>
</div>

<script>

// 🔥 DISCORD WEBHOOK (FIGYELEM: NEM BIZTONSÁGOS FRONTENDBEN)
const WEBHOOK_URL = "https://discord.com/api/webhooks/1498489222452215841/oFvtIytRbCkkcWUmshJsaBLS79K8WDoDjrJKDGVUGGzMqFjcDGWVlh9rfvdpQZHF9cdP";

// 🇭🇺 TÍPUS FORDÍTÁS
const typeHU = {
  ADD: "➕ Hozzáadás",
  ADD_EXISTING: "♻️ Meglévőhöz hozzáadás",
  TAKE: "📤 Kivétel",
  DELETE: "🗑️ Törlés"
};

// 🔥 FIREBASE INIT
firebase.initializeApp({
databaseURL:"https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();
const logDiv = document.getElementById("log");
const status = document.getElementById("status");
const search = document.getElementById("search");

let cache = {};
let initialized = false;

// --------------------
// DISCORD KÜLDÉS
// --------------------
let lastSent = 0;

async function sendToDiscord(d){
  try {
    if(Date.now() - lastSent < 1000) return;
    lastSent = Date.now();

    const colorMap = {
      ADD: 5763719,
      ADD_EXISTING: 3447003,
      TAKE: 16776960,
      DELETE: 15548997
    };

    const title = typeHU[d.type] || d.type || "LOG";

    let payload = {
      embeds: [{
        title: d.amount > 100 ? "🚨 GYANÚS AKTIVITÁS!" : title,
        color: d.amount > 100 ? 16711680 : (colorMap[d.type] || 9807270),
        fields: [
          { name: "👤 Játékos", value: d.player || "?", inline: true },
          { name: "📦 Item", value: `${d.item || "-"} (${d.amount || 0})`, inline: true },
          { name: "🏠 Raktár", value: d.warehouse || "?", inline: true }
        ],
        footer: { text: new Date(d.time).toLocaleString("hu-HU") }
      }]
    };

    await fetch(WEBHOOK_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

  } catch(e){
    console.log("Discord hiba:", e);
  }
}

// --------------------
// RENDER
// --------------------
function render(){
  let q = search.value.toLowerCase();
  logDiv.innerHTML = "";

  Object.keys(cache).reverse().forEach(id => {
    let d = cache[id];

    if(q &&
      !(d.player||"").toLowerCase().includes(q) &&
      !(d.item||"").toLowerCase().includes(q) &&
      !(d.warehouse||"").toLowerCase().includes(q)
    ) return;

    const div = document.createElement("div");
    div.className = "item " + (d.type || "");

    if(d.amount > 100) div.classList.add("error");

    div.innerHTML = `
      <b>${typeHU[d.type] || d.type || "Ismeretlen"}</b><br>
      👤 ${d.player || "?"}<br>
      📦 ${d.item || "-"} (${d.amount || 0})<br>
      🏠 ${d.warehouse || "?"}<br>
      <span class="small">${new Date(d.time).toLocaleString("hu-HU")}</span>
    `;

    logDiv.appendChild(div);
  });
}

// --------------------
// FIREBASE LISTENER
// --------------------
db.ref("logs").limitToLast(100).on("child_added", snap => {
  let d = snap.val();
  cache[snap.key] = d;

  if(initialized){
    sendToDiscord(d);
  }

  render();
});

// első betöltés
db.ref("logs").limitToLast(100).once("value", () => {
  initialized = true;
  status.innerText = "🟢 ONLINE (LIVE)";
});

// hibakezelés
db.ref("logs").on("value", () => {
  status.innerText = "🟢 ONLINE (LIVE)";
}, err => {
  status.innerText = "🔴 Firebase hiba";
});

// kereső
search.addEventListener("input", render);

</script>

</body>
</html>
