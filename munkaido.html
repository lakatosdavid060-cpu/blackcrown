<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Munkaidő Követő PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const WEBHOOK = "https://discord.com/api/webhooks/1498948555254136863/cylpJM9pG0dB5XALUcRqspygDucdu6vyfLuFDCgM57XUK0bW194VvyI1u2KPqn4ZrIp0";

const jobs = {
  Boss: 500,
  UnderBoss: 400,
  Capo: 300,
  Soldier: 200
};

let startTime = null;
let timer = null;
let pausedTime = 0;
let paused = false;
let chartInstance = null;

/* ---------- FORMAT ---------- */
function format(sec){
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return `${h} óra ${m} perc`;
}

/* ---------- DISCORD ---------- */
function sendDiscord(title, desc){
  if(!WEBHOOK) return;
  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      embeds:[{ title, description:desc, color:3447003 }]
    })
  });
}

/* ---------- TIMER ---------- */
function getPay(){
  return jobs[document.getElementById("rang").value] || 300;
}

function startTimer(){
  timer = setInterval(()=>{
    if(paused) return;

    const diff = Math.floor((Date.now()-startTime)/1000) + pausedTime;
    const money = Math.floor((diff/3600)*getPay());

    document.getElementById("elo").innerText =
      `⏱ ${format(diff)} | 💰 ${money}$`;
  },1000);
}

/* ---------- ACTIONS ---------- */
window.munkaInditas = function(){
  const nev = document.getElementById("nev").value;
  if(!nev) return alert("Adj meg nevet!");

  startTime = Date.now();
  pausedTime = 0;
  paused = false;

  startTimer();
  sendDiscord("Munka kezdés", nev);
}

window.szünet = function(){ paused = true; }
window.folytatas = function(){ paused = false; }

window.munkaVege = async function(){
  const nev = document.getElementById("nev").value;

  clearInterval(timer);

  const diff = Math.floor((Date.now()-startTime)/1000) + pausedTime;
  const money = Math.floor((diff/3600)*getPay());

  const day = new Date().toISOString().split("T")[0];

  const r = ref(db, `logs/${day}/${nev}`);
  const snap = await get(r);

  let data = snap.exists()?snap.val():{time:0,money:0};

  data.time += diff;
  data.money += money;

  await set(r,data);

  document.getElementById("status").innerText =
    `${format(diff)} | ${money}$`;

  sendDiscord("Munka vége", `${nev} → ${money}$`);
}

/* ---------- LEADERBOARD ---------- */
window.ranglista = async function(){
  const snap = await get(ref(db,"logs"));
  if(!snap.exists()) return;

  const data = snap.val();
  let total = {};

  for(let d in data){
    for(let p in data[d]){
      if(!total[p]) total[p]=0;
      total[p]+=data[d][p].money;
    }
  }

  const sorted = Object.entries(total).sort((a,b)=>b[1]-a[1]);

  let out="🏆 Ranglista\n\n";
  sorted.forEach((p,i)=>{
    out += `${i+1}. ${p[0]} – ${p[1]}$\n`;
  });

  document.getElementById("statisztika").innerText = out;
}

/* ---------- DASHBOARD ---------- */
window.dashboard = async function(){
  const nev = document.getElementById("nev").value;
  const today = new Date().toISOString().split("T")[0];

  const snap = await get(ref(db,`logs/${today}`));
  if(!snap.exists()) return;

  const d = snap.val();
  const t = d[nev] || {time:0,money:0};

  document.getElementById("kartyak").innerHTML = `
    <div class="kartya">💰 Mai kereset: <b>${t.money}$</b></div>
    <div class="kartya">⏱ Mai idő: <b>${format(t.time)}</b></div>
  `;
}

/* ---------- CHART ---------- */
window.diagram = async function(){
  const nev = document.getElementById("nev").value;
  const snap = await get(ref(db,"logs"));
  if(!snap.exists()) return;

  const data = snap.val();

  let labels=[], values=[];

  for(let d in data){
    if(data[d][nev]){
      labels.push(d);
      values.push(data[d][nev].money);
    }
  }

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[{label:"Bevétel ($)", data:values}]
    }
  });
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0b1220;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  padding:30px;
}

.app{
  width:100%;
  max-width:1000px;
}

/* HEADER */
h1{
  font-size:20px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:20px;
}

/* SIDEBAR */
.panel{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.secondary{background:#334155}
.danger{background:#dc2626}

/* CARDS */
.kartya{
  background:#111827;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* LIVE */
#elo{
  margin-top:10px;
  color:#93c5fd;
}

pre{
  margin-top:10px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="app">

<h1>Munkaidő Követő Rendszer</h1>

<div class="grid">

<!-- BAL -->
<div class="panel">

<input id="nev" placeholder="Név">

<select id="rang">
<option>Főnök</option>
<option>Alfőnök</option>
<option>Capo</option>
<option>Közkatona</option>
</select>

<button onclick="munkaInditas()">Munka indítása</button>
<button class="secondary" onclick="szünet()">Szünet</button>
<button class="secondary" onclick="folytatas()">Folytatás</button>
<button class="danger" onclick="munkaVege()">Befejezés</button>

<button onclick="ranglista()">Ranglista</button>
<button onclick="dashboard()">Dashboard</button>
<button onclick="diagram()">Grafikon</button>

<div id="elo"></div>
<h3 id="status"></h3>

</div>

<!-- JOBB -->
<div>

<div id="kartyak"></div>

<pre id="statisztika"></pre>

<canvas id="chart"></canvas>

</div>

</div>

</div>

</body>
</html>
