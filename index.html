<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés</title>

<style>
body { font-family:Arial; background:#111827; color:white; padding:15px; }
.card { background:#1f2937; padding:15px; border-radius:10px; margin-bottom:15px; }
button { padding:5px 8px; margin:2px; border:none; border-radius:6px; cursor:pointer; }
input { width:100px; padding:4px; border-radius:6px; border:none; }
.green { background:#16a34a; }
.red { background:#dc2626; }
.bank { background:#2563eb; color:white; }
.moso { background:#9333ea; color:white; }
.craft { background:#f59e0b; color:black; }
</style>
</head>
<body>

<h2>💰 Heti Fizetés Számoló</h2>

<div class="card">
Paletói $ <input type="number" id="paleto"><br><br>
Állami $ <input type="number" id="allami"><br><br>
Múzeum $ <input type="number" id="muzeum"><br><br>
Bobcat $ <input type="number" id="bobcat"><br><br>
Résztvevők száma: <input type="number" id="resztvevok" value="1"><br><br>
<button onclick="szamol()">Számol</button>
</div>

<div id="tagok"></div>

<script>

const nevek = [
"Ugaros Turul (Bobi)",
"Yukito Osano (Neon)",
"Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)",
"Todor Zsombor (Recsi)",
"Daryl Dixon (Oroszlán)",
"Julian Alvarez (Szecska)",
"Adam Taylor (Young)",
"Nemeth Andras (arpi)",
"Enrico Martello (Apu)",
"Ádám Benjamin (Cowboy)",
"Mateo Tavares Valesco (Kolbi)",
"Carl Jesus (Faszos)",
"Noah Knight (Roberts)",
"David Smith (Szike)",
"Nico Alvarez (Milka)",
"Miguel Alvarez (Raszta)",
"Wells Jordan (Stone)",
"Williams Jackson (Easy)",
"Jackson West (Kalap)",
"David Jackson (Kabát)"
];

let adatok = nevek.map(n=>({
nev:n,
moso:0,
craft:0,
fizetett:false,
osszeg:0
}));

function szamol(){

let paleto = parseFloat(document.getElementById("paleto").value)||0;
let allami = parseFloat(document.getElementById("allami").value)||0;
let muzeum = parseFloat(document.getElementById("muzeum").value)||0;
let bobcat = parseFloat(document.getElementById("bobcat").value)||0;
let resztvevok = parseInt(document.getElementById("resztvevok").value)||1;

let osszesRablas = paleto + allami + muzeum + bobcat;

let alap = ((osszesRablas/2)/resztvevok)*0.82;

adatok.forEach(t=>{
t.osszeg = alap + (t.moso*250) + (t.craft*250);
});

render();
}

function addMoso(i){ adatok[i].moso++; render(); }
function addCraft(i){ adatok[i].craft++; render(); }
function toggleFizetett(i){ adatok[i].fizetett=!adatok[i].fizetett; render(); }

function render(){

let html="";

adatok.forEach((t,i)=>{
html+=`
<div class="card">
<b>${t.nev}</b><br><br>

<button class="moso" onclick="addMoso(${i})">Mosó (+250)</button> ${t.moso}
<button class="craft" onclick="addCraft(${i})">Craft (+250)</button> ${t.craft}

<br><br>
Összeg: <b>${t.osszeg.toFixed(2)} $</b><br><br>

<button class="${t.fizetett?'green':'red'}" onclick="toggleFizetett(${i})">
${t.fizetett?'✅ Kifizetve':'❌ Nincs kifizetve'}
</button>

</div>
`;
});

document.getElementById("tagok").innerHTML = html;

}

render();

</script>
</body>
</html>
