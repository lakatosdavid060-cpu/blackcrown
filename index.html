</div>

<script>

allami:false,
muzeum:false,
bobcat:false
}
}));

function toggleRablas(i, tipus){
adatok[i].rablas[tipus] = !adatok[i].rablas[tipus];
render();
}

function szamol(){

let paleto = parseFloat(document.getElementById("paleto").value)||0;
let allami = parseFloat(document.getElementById("allami").value)||0;
let muzeum = parseFloat(document.getElementById("muzeum").value)||0;
let bobcat = parseFloat(document.getElementById("bobcat").value)||0;

const countAllami = adatok.filter(x=>x.rablas.allami).length || 1;
const countMuzeum = adatok.filter(x=>x.rablas.muzeum).length || 1;
const countBobcat = adatok.filter(x=>x.rablas.bobcat).length || 1;

adatok.forEach(t=>{

let reszesedes = 0;

if(t.rablas.paleto){
reszesedes += ((paleto/2)/countPaleto)*0.82;
}

if(t.rablas.allami){
reszesedes += ((allami/2)/countAllami)*0.82;
}

if(t.rablas.muzeum){
reszesedes += ((muzeum/2)/countMuzeum)*0.82;
}

if(t.rablas.bobcat){
reszesedes += ((bobcat/2)/countBobcat)*0.82;
}

t.osszeg = reszesedes + (t.moso*250) + (t.craft*250);

});

render();
}

function addMoso(i){ adatok[i].moso++; render(); }
function addCraft(i){ adatok[i].craft++; render(); }
function toggleFizetett(i){ adatok[i].fizetett=!adatok[i].fizetett; render(); }
