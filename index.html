<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Crown Maffia</title>
<style>
body{background:#000;color:white;font-family:sans-serif;text-align:center;padding:20px;}
button,input{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#ff0000;color:black;font-weight:bold;cursor:pointer;}
button:hover,input:hover{background:#00ffff;color:black;}
#discordBtn{display:none;}
table{width:90%;margin:20px auto;border-collapse:collapse;}
th,td{border:1px solid #ff0000;padding:8px;}
th{background:#111;}
td{background:#222;}
.status-Függőben{color:#ffff00;font-weight:bold;}
.status-Elfogadva{color:#00ff00;font-weight:bold;}
.status-Elutasítva{color:#ff0000;font-weight:bold;}
</style>
</head>
<body>

<h1>Black Crown Maffia</h1>

<!-- Gombok -->
<button onclick="window.location.href='jelentkezes.html'">Jelentkezés</button>
<button onclick="window.location.href='admin.html'">Staff / Admin Panel</button>

<!-- Bejelentkezés Discord névvel -->
<div id="loginDiv">
  <p>Írd be a Discord neved a Discord gomb engedélyezéséhez:</p>
  <input type="text" id="userName" placeholder="Discord Név">
  <button onclick="loginUser()">Bejelentkezés</button>
</div>

<!-- Discord gomb csak Elfogadott státusz esetén -->
<button id="discordBtn" onclick="window.open('https://discord.gg/4nspFjYC','_blank')">Discord Csatlakozás</button>
<p id="statusMsg"></p>

<!-- Jelentkezők listája -->
<h2>Jelentkezők</h2>
<table id="jelentkezokTable">
<tr>
<th>Karakter Név</th>
<th>Discord Név</th>
<th>Kor</th>
<th>Üzenet</th>
<th>Status</th>
</tr>
</table>

<script>
// Discord név mentése localStorage-be
function loginUser(){
    const name = document.getElementById("userName").value.trim();
    if(!name){ alert("Kérlek, add meg a Discord neved!"); return; }
    localStorage.setItem("bc_user", name);
    checkDiscord();
}

// Ellenőrzés státusz alapján
function checkDiscord(){
    const name = localStorage.getItem("bc_user");
    const adatok = JSON.parse(localStorage.getItem("jelentkezok") || "[]");
    const user = adatok.find(j => j.discord === name);
    
    if(!user){
        document.getElementById("statusMsg").innerText = "⏳ Még nem töltötted ki a jelentkezést!";
        document.getElementById("discordBtn").style.display = "none";
        document.getElementById("loginDiv").style.display = "block";
    } else {
        document.getElementById("loginDiv").style.display = "none";
        if(user.status === "Elfogadva"){
            document.getElementById("discordBtn").style.display = "inline-block";
            document.getElementById("statusMsg").innerText = "✅ Elfogadva! Most már csatlakozhatsz a Discordhoz!";
        } else if(user.status === "Elutasítva"){
            alert("⛔ Elutasították a jelentkezésedet!");
            window.location.href = "index.html";
        } else {
            document.getElementById("statusMsg").innerText = "⏳ Még nem fogadták el a jelentkezésedet!";
            document.getElementById("discordBtn").style.display = "none";
        }
    }
}

// Jelentkezők táblázat betöltése
function loadJelentkezok(){
    const table = document.getElementById("jelentkezokTable");
    table.innerHTML = `<tr>
<th>Karakter Név</th><th>Discord Név</th><th>Kor</th><th>Üzenet</th><th>Status</th>
</tr>`;
    const adatok = JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    adatok.forEach(j=>{
        const tr = document.createElement("tr");
        const discordDisplay = j.status === "Elfogadva" ? j.discord : "—";
        tr.innerHTML = `
        <td>${j.name}</td>
        <td>${discordDisplay}</td>
        <td>${j.age}</td>
        <td>${j.message}</td>
        <td class="status-${j.status}">${j.status}</td>
        `;
        table.appendChild(tr);
    });
}

document.addEventListener("DOMContentLoaded", ()=>{
    checkDiscord();
    loadJelentkezok();
});
</script>

</body>
</html>
