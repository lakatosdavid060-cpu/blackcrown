<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés – Kompakt</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;margin:0;}
h2{color:#38bdf8;}
button{padding:4px 8px;margin:2px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
.blue{background:#2563eb;color:white;}
.orange{background:#ea580c;color:white;}
table{border-collapse:collapse;width:100%;color:white;margin-top:10px;}
th, td{border:1px solid #fff;padding:4px;text-align:center;font-size:14px;}
.icon-panel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.icon-panel button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;}
input[type="number"], input[type="text"]{width:120px;padding:4px;border-radius:6px;border:none;}
</style>
</head>
<body>

<h2>💰 Heti Fizetés – Kompakt</h2>

<div class="icon-panel">
  <button onclick="szamol()">🧮 Számol</button>
  <button onclick="mentNap()">💾 Naplóz</button>
  <button onclick="openPDF()">📄 PDF</button>
  <button onclick="nullazHetiLog()">♻️ Heti nullázás</button>
</div>

<!-- TAG KEZELÉS -->
<div style="margin-top:10px;">
<input type="text" id="ujTagNev" placeholder="Új tag neve">
<button class="blue" onclick="ujTag()">➕ Hozzáadás</button>

<input type="text" id="regiNev" placeholder="Régi név">
<input type="text" id="ujNev" placeholder="Új név">
<button class="orange" onclick="frissitTag()">✏️ Frissítés</button>

<input type="text" id="torolNev" placeholder="Törlendő név">
<button class="red" onclick="torolTag()">❌ Törlés</button>
</div>

<br>

Paletói $ <input type="number" id="paleto">
Állami $ <input type="number" id="allami">
Múzeum $ <input type="number" id="muzeum">
Bobcat $ <input type="number" id="bobcat">

<div id="summary"></div>

<table>
<thead>
<tr>
<th>Tag</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
<th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th>
</tr>
</thead>
<tbody id="tagokTable"></tbody>
</table>

<script>

// ===== TAGOK =====
let adatok = JSON.parse(localStorage.getItem("tagLista")) || [
{nev:"Ugaros Turul (Bobi)"},
{nev:"Yukito Osano (Neon)"},
{nev:"Emily Mitsuko (Biskota)"}
];

adatok = adatok.map(t=>({
nev:t.nev,
moso:0, craft:0, fizetett:false, osszeg:0,
rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
}));

let hetiOsszesites = JSON.parse(localStorage.getItem("hetiOsszesites")) || {};
let pdfWindow=null;

// ===== TAG HOZZÁADÁS =====
function ujTag(){
let nev=document.getElementById("ujTagNev").value.trim();
if(!nev) return alert("Adj meg nevet!");
if(adatok.some(t=>t.nev===nev)) return alert("Már létezik!");

adatok.push({
nev:nev,moso:0,craft:0,fizetett:false,osszeg:0,
rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
});

mentTagLista();
render();
}

// ===== TAG TÖRLÉS =====
function torolTag(){
let nev=document.getElementById("torolNev").value.trim();
if(!nev) return alert("Adj meg nevet!");

adatok=adatok.filter(t=>t.nev!==nev);

delete hetiOsszesites[nev];

mentTagLista();
localStorage.setItem("hetiOsszesites",JSON.stringify(hetiOsszesites));
render();
}

// ===== TAG FRISSÍTÉS =====
function frissitTag(){
let regi=document.getElementById("regiNev").value.trim();
let uj=document.getElementById("ujNev").value.trim();
if(!regi||!uj) return alert("Töltsd ki mindkét mezőt!");

let tag=adatok.find(t=>t.nev===regi);
if(!tag) return alert("Nincs ilyen név!");

tag.nev=uj;

if(hetiOsszesites[regi]){
hetiOsszesites[uj]=hetiOsszesites[regi];
delete hetiOsszesites[regi];
}

mentTagLista();
localStorage.setItem("hetiOsszesites",JSON.stringify(hetiOsszesites));
render();
}

// ===== TAG LISTA MENTÉS =====
function mentTagLista(){
localStorage.setItem("tagLista",JSON.stringify(adatok.map(t=>({nev:t.nev}))));
}

// ===== SZÁMOLÁS =====
function szamol(){
let paleto=+document.getElementById("paleto").value||0;
let allami=+document.getElementById("allami").value||0;
let muzeum=+document.getElementById("muzeum").value||0;
let bobcat=+document.getElementById("bobcat").value||0;

const cP=adatok.filter(x=>x.rablas.paleto).length||1;
const cA=adatok.filter(x=>x.rablas.allami).length||1;
const cM=adatok.filter(x=>x.rablas.muzeum).length||1;
const cB=adatok.filter(x=>x.rablas.bobcat).length||1;

adatok.forEach(t=>{
let resz=0;
if(t.rablas.paleto) resz+=((paleto/2)/cP)*0.82;
if(t.rablas.allami) resz+=((allami/2)/cA)*0.82;
if(t.rablas.muzeum) resz+=((muzeum/2)/cM)*0.82;
if(t.rablas.bobcat) resz+=((bobcat/2)/cB)*0.82;
t.osszeg=resz+t.moso*250+t.craft*250;
});

render();
}

// ===== RENDER =====
function render(){
let total=adatok.reduce((sum,t)=>sum+t.osszeg,0);
document.getElementById("summary").innerHTML="💵 Összes kiosztva: "+total.toFixed(2)+" $";

let html="";
adatok.forEach((t,i)=>{
html+=`<tr>
<td>${t.nev}</td>
<td><input type="checkbox" onclick="t.rablas.paleto=!t.rablas.paleto;render()"></td>
<td><input type="checkbox" onclick="t.rablas.allami=!t.rablas.allami;render()"></td>
<td><input type="checkbox" onclick="t.rablas.muzeum=!t.rablas.muzeum;render()"></td>
<td><input type="checkbox" onclick="t.rablas.bobcat=!t.rablas.bobcat;render()"></td>
<td>${t.moso}</td>
<td>${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td><button class="${t.fizetett?'green':'red'}" onclick="t.fizetett=!t.fizetett;render()">${t.fizetett?'✅':'❌'}</button></td>
</tr>`;
});
document.getElementById("tagokTable").innerHTML=html;
}

function mentNap(){
adatok.forEach(t=>{
if(!hetiOsszesites[t.nev]){
hetiOsszesites[t.nev]={...t};
}else{
hetiOsszesites[t.nev].osszeg+=t.osszeg;
}
});
localStorage.setItem("hetiOsszesites",JSON.stringify(hetiOsszesites));
alert("Heti összesítés frissítve!");
}

function openPDF(){
localStorage.setItem("hetiLogPDF",JSON.stringify(hetiOsszesites));
window.open("pdf_kompakt.html","_blank");
}

function nullazHetiLog(){
if(confirm("Törlöd a heti adatokat?")){
localStorage.removeItem("hetiOsszesites");
hetiOsszesites={};
alert("Nullázva!");
}
}

render();
</script>
</body>
</html>
