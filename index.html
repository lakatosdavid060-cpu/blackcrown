<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés Dashboard</title>

<style>
body { margin:0; font-family:Arial,sans-serif; background: linear-gradient(135deg,#141e30,#243b55); color:white; padding:20px; }
.container { max-width:1200px; margin:auto; }
.card { background: rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px; }
.member { border-top:1px solid rgba(255,255,255,0.1); padding-top:10px; margin-top:10px; }
button { padding:5px 10px; border-radius:6px; border:none; cursor:pointer; }
.paid { background:#00c853; color:white; }
.unpaid { background:#c62828; color:white; }
.stats { background: rgba(0,0,0,0.3); padding:15px; border-radius:10px; margin-top:20px; }
canvas { background:white; border-radius:10px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

<h1>💵 Heti Fizetés Dashboard</h1>

<div class="card">
Rablás végösszeg ($): <input type="number" id="rablas">
Résztvevők: <input type="number" id="resztvevok">
<button onclick="mentesGlobal()">Mentés</button>
<div class="small" id="hetInfo"></div>
</div>

<div class="card">
<h3>Tagok</h3>
<div id="tagok"></div>
</div>

<div class="stats" id="statisztika"></div>

<div class="card">
<h3>📊 Heti Grafikon</h3>
<canvas id="grafikon" width="400" height="200"></canvas>
<button onclick="exportPDF()">📥 PDF Export</button>
</div>

<div class="card">
<h3>📁 Heti Archívum</h3>
<div id="archivum"></div>
</div>

</div>

<script>

const alapNevek = [
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)",
"Daryl Dixon (Oroszlán)","Julian Alvarez (Szecska)",
"Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)",
"Mateo Tavares Valesco (Kolbi)","Carl Jesus (Faszos)",
"Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)",
"Wells Jordan (Stone)","Williams Jackson (Easy)",
"Jackson West (Kalap)","David Jackson (Kabát)"
];

let adatok = JSON.parse(localStorage.getItem("hetiFizetesGraf")) || {
    rablas:0,
    resztvevok:1,
    hetKezdete: Date.now(),
    archivum: [],
    tagok: alapNevek.map(n=>({nev:n, mosas:0, sajat:0, rad:0, masra:0, fizetett:false}))
};

let chart;

function ellenorizHet(){
    let most = Date.now();
    let napok = (most - adatok.hetKezdete)/(1000*60*60*24);
    if(napok >= 7){ hetiLezaras(); }
}

function hetiLezaras(){
    let osszes = 0;
    adatok.tagok.forEach(tag=>{ osszes+=szamol(tag); });
    adatok.archivum.push({datum:new Date(adatok.hetKezdete).toLocaleDateString(), osszeg:osszes.toFixed(2)});
    adatok.rablas=0; adatok.resztvevok=1;
    adatok.hetKezdete=Date.now();
    adatok.tagok.forEach(tag=>{ tag.mosas=0; tag.sajat=0; tag.rad=0; tag.masra=0; tag.fizetett=false; });
    mentes();
}

function mentesGlobal(){
    adatok.rablas=parseFloat(document.getElementById("rablas").value)||0;
    adatok.resztvevok=parseInt(document.getElementById("resztvevok").value)||1;
    mentes();
}

function mentes(){ localStorage.setItem("hetiFizetesGraf",JSON.stringify(adatok)); render(); }

function szamol(tag){
    let rablasResz = ((adatok.rablas/2)/adatok.resztvevok)*0.82;
    let mosas = tag.mosas*250;
    return rablasResz+mosas+tag.sajat-tag.rad+tag.masra;
}

function toggle(i){ adatok.tagok[i].fizetett=!adatok.tagok[i].fizetett; mentes(); }

function render(){

    document.getElementById("rablas").value = adatok.rablas;
    document.getElementById("resztvevok").value = adatok.resztvevok;

    document.getElementById("hetInfo").innerHTML =
        "Következő nullázás: "+new Date(adatok.hetKezdete + 7*24*60*60*1000).toLocaleDateString();

    let tagDiv=document.getElementById("tagok"); tagDiv.innerHTML="";
    let osszes=0, kint=0;
    let grafLabels=[], grafData=[];
    adatok.tagok.forEach((tag,i)=>{
        let fizu=szamol(tag); osszes+=fizu; if(!tag.fizetett) kint+=fizu;
        grafLabels.push(tag.nev); grafData.push(fizu);
        tagDiv.innerHTML+=`
        <div class="member">
        <b>${tag.nev}</b><br>
        $${fizu.toFixed(2)}<br>
        <button class="${tag.fizetett?'paid':'unpaid'}" onclick="toggle(${i})">
        ${tag.fizetett?'✅ Kifizetve':'❌ Nincs kifizetve'}</button>
        </div>`;
    });

    document.getElementById("statisztika").innerHTML=
        `<h3>📊 Aktuális hét</h3>Teljes összeg: $${osszes.toFixed(2)}<br>Kintlévőség: $${kint.toFixed(2)}`;

    // Chart
    if(chart) chart.destroy();
    let ctx = document.getElementById("grafikon").getContext("2d");
    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:grafLabels,
            datasets:[{
                label:'Fizetés ($)',
                data:grafData,
                backgroundColor:'rgba(0,200,83,0.7)',
                borderColor:'rgba(0,200,83,1)',
                borderWidth:1
            }]
        },
        options:{responsive:true, scales:{y:{beginAtZero:true}}}
    });

    // Archívum
    let arch=""; adatok.archivum.forEach(h=>{arch+=`<div>${h.datum} — $${h.osszeg}</div>`;});
    document.getElementById("archivum").innerHTML=arch;
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF('l','pt','a4');
    pdf.setFontSize(16); pdf.text("Heti Fizetés Grafikon", 40, 30);
    pdf.addImage(chart.toBase64Image(), 'PNG', 40, 50, 700, 400);
    pdf.save(`heti_fizetes_${new Date().toLocaleDateString()}.pdf`);
}

ellenorizHet();
render();

</script>
</body>
</html>
