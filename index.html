<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Crown Maffia</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;text-align:center;overflow-x:hidden;}

/* NAV */
nav{position:fixed;width:100%;background:rgba(0,0,0,0.85);padding:15px;text-align:center;z-index:1000;backdrop-filter:blur(5px);border-bottom:1px solid #ff0000;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;transition:0.3s;text-shadow:0 0 5px #ff0000;animation:pulse 2s infinite;}
nav a:hover{text-shadow:0 0 25px #00ffff;}
@keyframes pulse{0%,100%{text-shadow:0 0 5px #ff0000;}50%{text-shadow:0 0 20px #ff0000;}}

/* HERO */
.hero{position:relative;height:90vh;display:flex;justify-content:center;align-items:center;text-align:center;overflow:hidden;background:url('https://thumbs.dreamstime.com/b/golden-light-crown-black-background-golden-glowing-crown-centered-against-black-background-made-lines-radiating-376295377.jpg') center/cover no-repeat;}
.hero::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1;}
.hero > div{position:relative;z-index:2;}
.hero h1{font-size:3em;color:#ff0000;text-shadow:0 0 15px #ff0000,0 0 35px #00ffff;}
.hero p{font-size:1.5em;color:#fff;text-shadow:0 0 10px #ff0000;}

/* BUTTON */
button{padding:12px 25px;border:none;border-radius:30px;background:#ff0000;color:black;font-weight:bold;cursor:pointer;transition:0.3s;margin-top:10px;box-shadow:0 0 10px #ff0000;}
button:hover{box-shadow:0 0 35px #00ffff,0 0 60px #00ffff;transform:scale(1.05);}

/* SZEKCIÓK */
section{padding:60px 20px;}

/* TAGOK ÉS RANGOK */
#members h2{color:#ff0000;text-shadow:0 0 10px #ff0000;margin-bottom:30px;}
.ranks-container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.rank-card{
  background:#111;border:2px solid #ff0000;border-radius:15px;padding:20px 40px;font-weight:bold;color:white;transition:0.3s, transform 0.5s;box-shadow:0 0 10px #ff0000;cursor:pointer;position:relative;
}
.rank-card:hover{transform:translateY(-5px);box-shadow:0 0 35px #00ffff;}

/* PROGRESS BAR */
.progress-bar{width:100%;background:#222;border-radius:10px;height:12px;margin-top:10px;overflow:hidden;}
.progress{height:100%;width:0%;background:#00ffff;border-radius:10px;transition:width 1s ease-in-out;animation:pulseProgress 2s infinite alternate;}
@keyframes pulseProgress{0%{box-shadow:0 0 5px #00ffff;}100%{box-shadow:0 0 20px #00ffff;}}

/* VIP */
#vip{padding:60px 20px;}
.card{display:inline-block;margin:10px;padding:20px;border-radius:15px;background:#111;border:2px solid #ff0000;color:white;font-weight:bold;transition:0.3s, transform 0.5s; opacity:0; transform:scale(0.8);}
.card.show{opacity:1; transform:scale(1);}
.card:hover{border-color:#00ffff;box-shadow:0 0 25px #00ffff;transform:translateY(-5px);}

/* FOOTER */
footer{background:#000;padding:20px;text-align:center;font-size:14px;}
audio{position:fixed;bottom:10px;right:10px;width:200px;border-radius:10px;}

/* MEDIA */
@media(max-width:768px){
.hero h1{font-size:2.2em;}
.hero p{font-size:1.2em;}
nav{display:flex;flex-direction:column;}
nav a{margin:5px 0;}
.rank-card,.card{width:80%;margin:10px auto;text-align:center;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
<a href="#home">Főoldal</a>
<a href="#members">Tagok / Rangok</a>
<a href="#apply">Jelentkezés</a>
<a href="#" onclick="adminLogin()">Admin Panel</a>
<a href="https://lakatosdavid060-cpu.github.io/blackcrown/Staff.html" target="_blank">Staff Panel</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
<div>
<h1>Black Crown Maffia</h1>
<p>GTA / FiveM Roleplay</p>
<button onclick="window.location.href='https://discord.gg/4nspFjYC'">Discord Csatlakozás</button>
</div>
</div>

<!-- TAGOK ÉS RANGOK -->
<section id="members">
<h2>Aktuális Tagok: <span id="member-count">3</span></h2>
<div class="ranks-container">
  <div class="rank-card">
    Boss
    <div class="progress-bar"><div class="progress" style="width:80%"></div></div>
  </div>
  <div class="rank-card">
    UnderBoss
    <div class="progress-bar"><div class="progress" style="width:60%"></div></div>
  </div>
  <div class="rank-card">
    Capo
    <div class="progress-bar"><div class="progress" style="width:40%"></div></div>
  </div>
  <div class="rank-card">
    Soldier
    <div class="progress-bar"><div class="progress" style="width:20%"></div></div>
  </div>
</div>
</section>

<!-- JELENTKEZÉS -->
<section id="apply">
<h2>Jelentkezés</h2>
<p>Kattints a gombra, hogy a jelentkezési űrlaphoz juss:</p>
<button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd00Zm7beEEmrtdGXKdVcnDM13e0Nb6w4Sl5o-hYEU0X4OrZg/viewform?usp=publish-editor','_blank')">Jelentkezés</button>
</section>

<!-- VIP / Rangok -->
<section id="vip">
<h2>VIP / Rangok</h2>
<div class="card">Bronz VIP</div>
<div class="card">Ezüst VIP</div>
<div class="card">Arany VIP</div>
</section>

<!-- ZENE -->
<audio autoplay loop controls id="bgMusic">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>
<button onclick="toggleMusic()">Zene ki/be</button>

<footer>© 2026 Black Crown Maffia</footer>

<script>
// ZENE KI/BE
function toggleMusic(){let audio=document.getElementById("bgMusic");if(audio.paused)audio.play();else audio.pause();}

// VIP KÁRTYÁK BELÉPŐ ANIMÁCIÓ
window.addEventListener('load', ()=>{
  const cards=document.querySelectorAll('.card');
  cards.forEach((card,i)=>{
    setTimeout(()=>{card.classList.add('show');}, i*300);

    // Progress bar animáció
    const progresses = document.querySelectorAll('.progress');
    progresses.forEach(progress => {
      const width = progress.style.width;
      progress.style.width = '0%';
      setTimeout(()=>{progress.style.width = width;}, 100);
    });
  });
});

// ADMIN BELÉPÉS
function adminLogin(){
  let felhasznalo = prompt("Felhasználónév (Boss / UnderBoss):");
  let jelszo = prompt("Jelszó:");
  if(jelszo !== "BlackCrown2026" || (felhasznalo !== "Boss" && felhasznalo !== "UnderBoss")){
      alert("❌ Helytelen felhasználónév vagy jelszó!");
  } else {
      alert("✅ Beléptél mint " + felhasznalo);
      window.location.href = "admin.html"; // ide viszi az admin panelhez
  }
}
</script>

</body>
</html>
