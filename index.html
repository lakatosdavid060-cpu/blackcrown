<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés – Kompakt</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;margin:0;}
h2{color:#38bdf8;}
button{padding:4px 8px;margin:2px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
table{border-collapse:collapse;width:100%;color:white;margin-top:10px;}
th, td{border:1px solid #fff;padding:4px;text-align:center;font-size:14px;}
.helpContent{display:none;background:#334155;color:white;padding:10px;border-radius:6px;margin-top:5px;}
.icon-panel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.icon-panel button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;}
.icon-panel span{font-size:18px;margin-bottom:3px;}
input[type="number"]{width:80px;padding:4px;border-radius:6px;border:none;}
</style>
</head>
<body>

<h2>💰 Heti Fizetés – Kompakt</h2>

<div class="icon-panel">
  <button onclick="szamol()"><span>🧮</span>Számol</button>
  <button onclick="mentNap()"><span>💾</span>Naplóz</button>
  <button onclick="openPDF()"><span>📄</span>PDF</button>
  <button onclick="toggleHelp()"><span>ℹ️</span>Segítség</button>
  <button onclick="nullazHetiLog()"><span>♻️</span>Heti nullázás</button>
  <button onclick="ujTagHozzaadas()"><span>➕</span>Új tag</button>
</div>

<div id="helpContent" class="helpContent">
((Teljes rablás összeg ÷ 2) ÷ Résztvevők száma) × 0.82 + Mosó*250 + Craft*250
</div>

<div style="margin-bottom:10px;">
Paletói $ <input type="number" id="paleto">
Állami $ <input type="number" id="allami">
Múzeum $ <input type="number" id="muzeum">
Bobcat $ <input type="number" id="bobcat">
</div>

<div class="summary" id="summary"></div>

<table>
<thead>
<tr>
<th>Tag</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
<th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th><th>Törlés</th>
</tr>
</thead>
<tbody id="tagokTable"></tbody>
</table>

<script>

// ===== EREDETI NEVEK =====
const alapNevek=[
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)","Daryl Dixon (Oroszlán)",
"Julian Alvarez (Szecska)","Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)","Mateo Tavares Valesco (Kolbi)",
"Carl Jesus (Faszos)","Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)","Wells Jordan (Stone)",
"Williams Jackson (Easy)","Jackson West (Kalap)","David Jackson (Kabát)",
"Henry Parker (Pufi)"
];

// ===== CSAK NEVEK BETÖLTÉSE =====
let mentettNevek = JSON.parse(localStorage.getItem("tagLista"));
let nevek = mentettNevek || alapNevek;

let adatok = nevek.map(n=>({
nev:n,
moso:0,
craft:0,
fizetett:false,
osszeg:0,
rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
}));

function mentesTagLista(){
const csakNevek = adatok.map(t=>t.nev);
localStorage.setItem("tagLista", JSON.stringify(csakNevek));
}

let hetiLog = JSON.parse(localStorage.getItem("hetiLog")) || [];
let hetiOsszesites = JSON.parse(localStorage.getItem("hetiOsszesites")) || {};
let pdfWindow = null;

// ===== MOSÓ / CRAFT =====
function addMoso(i){adatok[i].moso++; render();}
function minusMoso(i){if(adatok[i].moso>0)adatok[i].moso--; render();}
function addCraft(i){adatok[i].craft++; render();}
function minusCraft(i){if(adatok[i].craft>0)adatok[i].craft--; render();}

// ===== TOGGLE =====
function toggleRablas(i,t){adatok[i].rablas[t]=!adatok[i].rablas[t]; render();}
function toggleFizetett(i){adatok[i].fizetett=!adatok[i].fizetett; render();}

// ===== SZÁMOLÁS =====
function szamol(){
let paleto=+document.getElementById("paleto").value||0;
let allami=+document.getElementById("allami").value||0;
let muzeum=+document.getElementById("muzeum").value||0;
let bobcat=+document.getElementById("bobcat").value||0;

const cP=adatok.filter(x=>x.rablas.paleto).length||1;
const cA=adatok.filter(x=>x.rablas.allami).length||1;
const cM=adatok.filter(x=>x.rablas.muzeum).length||1;
const cB=adatok.filter(x=>x.rablas.bobcat).length||1;

adatok.forEach(t=>{
let resz=0;
if(t.rablas.paleto) resz+=((paleto/2)/cP)*0.82;
if(t.rablas.allami) resz+=((allami/2)/cA)*0.82;
if(t.rablas.muzeum) resz+=((muzeum/2)/cM)*0.82;
if(t.rablas.bobcat) resz+=((bobcat/2)/cB)*0.82;
t.osszeg = resz + t.moso*250 + t.craft*250;
});
render();
}

// ===== RENDER =====
function render(){
let total=adatok.reduce((sum,t)=>sum+t.osszeg,0);
document.getElementById("summary").innerHTML="💵 Összes kiosztva: "+total.toFixed(2)+" $";

let html="";
adatok.forEach((t,i)=>{
html+=`<tr>
<td>${t.nev}</td>
<td><input type="checkbox" ${t.rablas.paleto?'checked':''} onclick="toggleRablas(${i},'paleto')"></td>
<td><input type="checkbox" ${t.rablas.allami?'checked':''} onclick="toggleRablas(${i},'allami')"></td>
<td><input type="checkbox" ${t.rablas.muzeum?'checked':''} onclick="toggleRablas(${i},'muzeum')"></td>
<td><input type="checkbox" ${t.rablas.bobcat?'checked':''} onclick="toggleRablas(${i},'bobcat')"></td>
<td><button onclick="minusMoso(${i})">−</button><button onclick="addMoso(${i})">+250</button> ${t.moso}</td>
<td><button onclick="minusCraft(${i})">−</button><button onclick="addCraft(${i})">+250</button> ${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td><button class="${t.fizetett?'green':'red'}" onclick="toggleFizetett(${i})">${t.fizetett?'✅':'❌'}</button></td>
<td><button onclick="tagTorles(${i})">❌</button></td>
</tr>`;
});
document.getElementById("tagokTable").innerHTML=html;
}

// ===== ÚJ TAG =====
function ujTagHozzaadas(){
const nev=prompt("Add meg az új tag nevét:");
if(!nev) return;
adatok.push({
nev:nev, moso:0, craft:0, fizetett:false, osszeg:0,
rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
});
mentesTagLista();
render();
}

// ===== TÖRLÉS =====
function tagTorles(index){
if(confirm("Biztosan törlöd ezt a tagot?")){
adatok.splice(index,1);
mentesTagLista();
render();
}
}

// ===== EREDETI FUNKCIÓK =====
function mentNap(){
const datum=new Date().toISOString().slice(0,10);
adatok.forEach(t=>{
if(!hetiOsszesites[t.nev]){
hetiOsszesites[t.nev]={nev:t.nev,moso:t.moso,craft:t.craft,osszeg:t.osszeg,fizetett:t.fizetett,rablas:{...t.rablas}};
}else{
hetiOsszesites[t.nev].moso+=t.moso;
hetiOsszesites[t.nev].craft+=t.craft;
hetiOsszesites[t.nev].osszeg+=t.osszeg;
hetiOsszesites[t.nev].fizetett=hetiOsszesites[t.nev].fizetett||t.fizetett;
Object.keys(t.rablas).forEach(k=>{
hetiOsszesites[t.nev].rablas[k]=hetiOsszesites[t.nev].rablas[k]||t.rablas[k];
});
}
});
hetiLog.push({datum,tagok:JSON.parse(JSON.stringify(adatok))});
localStorage.setItem("hetiLog",JSON.stringify(hetiLog));
localStorage.setItem("hetiOsszesites",JSON.stringify(hetiOsszesites));
alert("Rablás naplózva és heti összesítés frissítve: "+datum);
if(pdfWindow&&!pdfWindow.closed){pdfWindow.location.reload();}
}

function openPDF(){
localStorage.setItem("hetiLogPDF",JSON.stringify(hetiOsszesites));
pdfWindow=window.open("pdf_kompakt.html","_blank");
}

function toggleHelp(){
const help=document.getElementById("helpContent");
help.style.display=help.style.display==="none"?"block":"none";
}

function nullazHetiLog(){
if(confirm("Biztosan törlöd a heti PDF logot?")){
localStorage.removeItem("hetiLog");
localStorage.removeItem("hetiLogPDF");
localStorage.removeItem("hetiOsszesites");
hetiLog=[];
hetiOsszesites={};
alert("A heti log törölve lett.");
}
}

render();
</script>

</body>
</html>
