<script>

const helyszinekLista = ["paleto","allami","muzeum","bobcat","moso","craft"];

let adatok = JSON.parse(localStorage.getItem("hetiFizetesTrend")) || {
    hetKezdete: Date.now(),
    archivum: [],
    osszegek:{
        paleto:0,
        allami:0,
        muzeum:0,
        bobcat:0,
        moso:0,
        craft:0
    },
    tagok: [
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)",
"Daryl Dixon (Oroszlán)","Julian Alvarez (Szecska)",
"Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)",
"Mateo Tavares Valesco (Kolbi)","Carl Jesus (Faszos)",
"Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)",
"Wells Jordan (Stone)","Williams Jackson (Easy)",
"Jackson West (Kalap)","David Jackson (Kabát)"
    ].map(n=>({
        nev:n,
        fizetett:false,
        rablasok:{
            paleto:0,
            allami:0,
            muzeum:0,
            bobcat:0,
            moso:0,
            craft:0
        }
    }))
};

let chart;

function szamol(tag){

    let osszes = 0;

    helyszinekLista.forEach(hely=>{

        let darab = tag.rablasok[hely];
        if(darab > 0){

            let resztvevok = adatok.tagok.filter(t => t.rablasok[hely] > 0).length;

            if(resztvevok > 0){

                let rablasOsszeg = adatok.osszegek[hely] || 0;
                let osztando = rablasOsszeg / 2;
                let egyResz = (osztando / resztvevok) * 0.82;

                osszes += egyResz * darab;
            }
        }

    });

    return osszes;
}

function novel(i, hely, ertek){
    adatok.tagok[i].rablasok[hely] =
        Math.max(0, adatok.tagok[i].rablasok[hely] + ertek);
    mentes();
}

function osszegValtozas(hely, ertek){
    adatok.osszegek[hely] = parseFloat(ertek) || 0;
    mentes();
}

function toggleFizetett(i){
    adatok.tagok[i].fizetett = !adatok.tagok[i].fizetett;
    mentes();
}

function mentes(){
    localStorage.setItem("hetiFizetesTrend", JSON.stringify(adatok));
    render();
}

function render(){

    let tagDiv = document.getElementById("tagok");
    tagDiv.innerHTML = "";

    let osszes = 0;
    let grafLabels = [];
    let grafData = [];

    // ÖSSZEG INPUTOK
    let osszegHTML = `<div class="card"><h3>Rablás összegek</h3>`;
    helyszinekLista.forEach(hely=>{
        osszegHTML += `
        ${hely.toUpperCase()} összeg:
        <input type="number"
        value="${adatok.osszegek[hely]}"
        onchange="osszegValtozas('${hely}',this.value)">
        <br><br>`;
    });
    osszegHTML += `</div>`;

    tagDiv.innerHTML += osszegHTML;

    adatok.tagok.forEach((tag,i)=>{

        let fizu = szamol(tag);
        osszes += fizu;

        grafLabels.push(tag.nev);
        grafData.push(fizu);

        tagDiv.innerHTML += `
        <div class="member">
        <b>${tag.nev}</b><br>

        Paleto:
        <button onclick="novel(${i},'paleto',-1)">-</button>
        ${tag.rablasok.paleto}
        <button onclick="novel(${i},'paleto',1)">+</button>

        Állami:
        <button onclick="novel(${i},'allami',-1)">-</button>
        ${tag.rablasok.allami}
        <button onclick="novel(${i},'allami',1)">+</button>

        Múzeum:
        <button onclick="novel(${i},'muzeum',-1)">-</button>
        ${tag.rablasok.muzeum}
        <button onclick="novel(${i},'muzeum',1)">+</button>

        Bobcat:
        <button onclick="novel(${i},'bobcat',-1)">-</button>
        ${tag.rablasok.bobcat}
        <button onclick="novel(${i},'bobcat',1)">+</button>

        Mosó:
        <button onclick="novel(${i},'moso',-1)">-</button>
        ${tag.rablasok.moso}
        <button onclick="novel(${i},'moso',1)">+</button>

        Craft:
        <button onclick="novel(${i},'craft',-1)">-</button>
        ${tag.rablasok.craft}
        <button onclick="novel(${i},'craft',1)">+</button>

        <br><br>
        Fizetés: $${fizu.toFixed(2)}<br>

        <button class="${tag.fizetett?'paid':'unpaid'}"
        onclick="toggleFizetett(${i})">
        ${tag.fizetett?'✅ Kifizetve':'❌ Nincs kifizetve'}
        </button>

        </div>
        `;
    });

    document.getElementById("statisztika").innerHTML =
        `<h3>Heti összes: $${osszes.toFixed(2)}</h3>`;

    if(chart) chart.destroy();

    let ctx = document.getElementById("grafikon").getContext("2d");
    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:grafLabels,
            datasets:[{
                label:'Fizetés ($)',
                data:grafData
            }]
        },
        options:{responsive:true, scales:{y:{beginAtZero:true}}}
    });
}

render();

</script>
