<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;margin:0}
.card{background:#1e293b;padding:15px;border-radius:14px;margin-bottom:15px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
button{padding:6px 10px;margin:3px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
input[type="number"]{width:120px;padding:6px;border-radius:8px;border:none}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
.moso{background:#9333ea;color:white}
.craft{background:#f59e0b;color:black}
label{font-size:13px;margin-right:8px;display:inline-block}
.topgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.summary{font-size:18px;font-weight:bold;margin-bottom:10px;color:#38bdf8}
.resetbtn{background:#334155;color:white}
#pdf-table{display:none;} /* alapból rejtve a PDF táblázat */
table, th, td{border:1px solid #000; border-collapse: collapse;}
th, td{padding:5px; text-align:center;}
</style>
</head>
<body>

<h2>💰 Heti Fizetés Számoló</h2>

<div class="card">
<div class="topgrid">
<div>Paletói $<br><input type="number" id="paleto"></div>
<div>Állami $<br><input type="number" id="allami"></div>
<div>Múzeum $<br><input type="number" id="muzeum"></div>
<div>Bobcat $<br><input type="number" id="bobcat"></div>
</div>
<br>
<button onclick="szamol()">Számol</button>
</div>

<div class="summary" id="summary"></div>
<div id="tagok"></div>
<button onclick="exportTablePDF()" class="craft">📄 PDF Mentés (Táblázatos)</button>

<!-- PDF táblázat a DOM-ban -->
<div id="pdf-table"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// Tagok listája
const nevek=[
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)","Daryl Dixon (Oroszlán)",
"Julian Alvarez (Szecska)","Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)","Mateo Tavares Valesco (Kolbi)",
"Carl Jesus (Faszos)","Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)","Wells Jordan (Stone)",
"Williams Jackson (Easy)","Jackson West (Kalap)","David Jackson (Kabát)"
];

let adatok=JSON.parse(localStorage.getItem("hetiFizetes"))||
nevek.map(n=>({
  nev:n,moso:0,craft:0,fizetett:false,osszeg:0,
  rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
}));

function save(){localStorage.setItem("hetiFizetes",JSON.stringify(adatok));}

// MOSÓ / CRAFT
function addMoso(i){adatok[i].moso++;save();render();}
function minusMoso(i){if(adatok[i].moso>0)adatok[i].moso--;save();render();}
function addCraft(i){adatok[i].craft++;save();render();}
function minusCraft(i){if(adatok[i].craft>0)adatok[i].craft--;save();render();}

// TOGGLES
function toggleRablas(i,t){adatok[i].rablas[t]=!adatok[i].rablas[t];save();render();}
function toggleFizetett(i){adatok[i].fizetett=!adatok[i].fizetett;save();render();}

// RESET
function resetTag(i){
  adatok[i].moso=0;adatok[i].craft=0;adatok[i].osszeg=0;
  adatok[i].rablas={paleto:false,allami:false,muzeum:false,bobcat:false};
  save();render();
}

// SZÁMOL – helyes logika: résztvevőnként osztva, utána 0.82
function szamol(){
  let paleto=+document.getElementById("paleto").value||0;
  let allami=+document.getElementById("allami").value||0;
  let muzeum=+document.getElementById("muzeum").value||0;
  let bobcat=+document.getElementById("bobcat").value||0;

  const cP = adatok.filter(x=>x.rablas.paleto).length || 1;
  const cA = adatok.filter(x=>x.rablas.allami).length || 1;
  const cM = adatok.filter(x=>x.rablas.muzeum).length || 1;
  const cB = adatok.filter(x=>x.rablas.bobcat).length || 1;

  adatok.forEach(t=>{
    let resz=0;
    if(t.rablas.paleto) resz += ((paleto/2)/cP) * 0.82;
    if(t.rablas.allami) resz += ((allami/2)/cA) * 0.82;
    if(t.rablas.muzeum) resz += ((muzeum/2)/cM) * 0.82;
    if(t.rablas.bobcat) resz += ((bobcat/2)/cB) * 0.82;

    t.osszeg = resz + t.moso*250 + t.craft*250;
  });

  save();render();
}

// RENDER
function render(){
  let total=0;
  adatok.forEach(t=>total+=t.osszeg);
  document.getElementById("summary").innerHTML=
  "💵 Összes kiosztva: "+total.toFixed(2)+" $";

  let html="";
  adatok.forEach((t,i)=>{
    html+=`
    <div class="card">
      <b>${t.nev}</b><br><br>
      <b>Rablások:</b><br>
      <label><input type="checkbox" ${t.rablas.paleto?'checked':''} onclick="toggleRablas(${i},'paleto')"> Paleto</label>
      <label><input type="checkbox" ${t.rablas.allami?'checked':''} onclick="toggleRablas(${i},'allami')"> Állami</label>
      <label><input type="checkbox" ${t.rablas.muzeum?'checked':''} onclick="toggleRablas(${i},'muzeum')"> Múzeum</label>
      <label><input type="checkbox" ${t.rablas.bobcat?'checked':''} onclick="toggleRablas(${i},'bobcat')"> Bobcat</label>
      <br><br>
      <button class="moso" onclick="minusMoso(${i})">−</button>
      <button class="moso" onclick="addMoso(${i})">Mosó +250</button> ${t.moso}
      <button class="craft" onclick="minusCraft(${i})">−</button>
      <button class="craft" onclick="addCraft(${i})">Craft +250</button> ${t.craft}
      <br><br>
      Összeg: <b>${t.osszeg.toFixed(2)} $</b><br><br>
      <button class="${t.fizetett?'green':'red'}" onclick="toggleFizetett(${i})">
        ${t.fizetett?'✅ Kifizetve':'❌ Nincs kifizetve'}
      </button>
      <br><br>
      <button class="resetbtn" onclick="resetTag(${i})">🔄 Reset</button>
    </div>
    `;
  });
  document.getElementById("tagok").innerHTML=html;
}

// PDF EXPORT – mindig látható
function exportTablePDF() {
  const pdfDiv = document.getElementById("pdf-table");
  pdfDiv.style.display="block"; // látható a canvas számára

  let html = `<table style="width:100%; border-collapse: collapse; text-align:center;">
    <tr style="background-color:#38bdf8; font-weight:bold;">
      <th>Név</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
      <th>Mosó</th><th>Craft</th><th>Összeg ($)</th><th>Kifizetve</th>
    </tr>`;
  adatok.forEach(t=>{
    html+=`<tr>
      <td>${t.nev}</td>
      <td>${t.rablas.paleto?'✅':''}</td>
      <td>${t.rablas.allami?'✅':''}</td>
      <td>${t.rablas.muzeum?'✅':''}</td>
      <td>${t.rablas.bobcat?'✅':''}</td>
      <td>${t.moso}</td>
      <td>${t.craft}</td>
      <td>${t.osszeg.toFixed(2)}</td>
      <td>${t.fizetett?'✅':'❌'}</td>
    </tr>`;
  });
  html+=`</table>`;
  pdfDiv.innerHTML = html;

  html2pdf().from(pdfDiv).set({
    margin:0.5,
    filename:'heti_fizetes_tabla.pdf',
    jsPDF:{unit:'in',format:'letter',orientation:'landscape'},
    html2canvas:{scale:2, backgroundColor:'#fff'}
  }).save();

  pdfDiv.style.display="none"; // visszaállítjuk rejtettnek
}

render();
</script>

</body>
</html>
