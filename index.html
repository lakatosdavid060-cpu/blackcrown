<head>

</div>

<div class="card">
<h3>📁 Heti Archívum</h3>

<script>
const bankok = ["Paletói Bank","Állami Bank","Múzeum","Bobcat","Mosó","Craft"];

const alapNevek = [
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)"
];

let adatok = JSON.parse(localStorage.getItem("hetiFizetesProfi")) || {
    resztvevok:1,
    hetKezdete:Date.now(),
    archivum:[],
    tagok: alapNevek.map(n=>({
        nev:n,
        bankok: bankok.map(b=>({nev:b, osszeg:0, db:0})),
        fizetett:false
    }))
};

let chart, trendChart;

function szamolTag(tag){
    let osszes=0;
    tag.bankok.forEach(b=>{
        if(b.osszeg>0 && b.db>0){
            let csalad=b.osszeg*0.5;
            let oszthato=b.osszeg*0.5;
            let egyFore=(oszthato/adatok.resztvevok)*0.82;
            osszes+=egyFore*b.db;
        }
    });
    return osszes;
}

function csaladiOsszes(){
    let total=0;
    adatok.tagok.forEach(t=>{
        t.bankok.forEach(b=> total+=b.osszeg*0.5*b.db);
    });
    return total;
}

function mentesGlobal(){
    adatok.resztvevok=parseInt(document.getElementById("resztvevok").value)||1;
    mentes();
}

function toggleFizetett(i){
    adatok.tagok[i].fizetett=!adatok.tagok[i].fizetett;
    mentes();
}

function novelDb(ti,bi,val){
    let b=adatok.tagok[ti].bankok[bi];
    b.db=Math.max(0,b.db+val);
    mentes();
}

function osszegValtozas(ti,bi,val){
    adatok.tagok[ti].bankok[bi].osszeg=parseFloat(val)||0;
    mentes();
}

function hetiLezaras(){
    let hetiAdat=adatok.tagok.map(t=>szamolTag(t));
    adatok.archivum.push({
        datum:new Date(adatok.hetKezdete).toLocaleDateString(),
        fizetes:hetiAdat,
        csaladi:csaladiOsszes()
    });
    adatok.tagok.forEach(t=>{
        t.bankok.forEach(b=>{b.osszeg=0;b.db=0;});
        t.fizetett=false;
    });
    adatok.hetKezdete=Date.now();
    mentes();
}

function mentes(){
    localStorage.setItem("hetiFizetesProfi",JSON.stringify(adatok));
    render();
}

function render(){
    document.getElementById("resztvevok").value=adatok.resztvevok;
    document.getElementById("hetInfo").innerHTML="Következő nullázás: "+new Date(adatok.hetKezdete+7*24*60*60*1000).toLocaleDateString();

    let html="";
    let osszes=0;
    adatok.tagok.forEach((tag,i)=>{
        let fizu=szamolTag(tag);
        osszes+=fizu;

        html+=`<div class="member"><b>${tag.nev}</b><br>`;
        tag.bankok.forEach((b,j)=>{
            html+=`
            <div class="bankRow">
            ${b.nev} 
            <input type="number" value="${b.osszeg}" onchange="osszegValtozas(${i},${j},this.value)"> $
            <button onclick="novelDb(${i},${j},-1)">-</button>
            ${b.db}
            <button onclick="novelDb(${i},${j},1)">+</button>
            </div>`;
        });
        html+=`Fizetés: $${fizu.toFixed(2)}<br>
        <button class="${tag.fizetett?'paid':'unpaid'}" onclick="toggleFizetett(${i})">
        ${tag.fizetett?'✅ Kifizetve':'❌ Nincs kifizetve'}
        </button></div>`;
    });

    html+=`<div class="card">
    <h3>🏦 Családi rész (50%)</h3>
    $${csaladiOsszes().toFixed(2)}<br><br>
    <button onclick="hetiLezaras()">📦 Heti lezárás</button>
    </div>`;
