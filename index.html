<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;margin:0;}
h2{color:#38bdf8;}
button{padding:4px 8px;margin:2px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
table{border-collapse:collapse;width:100%;color:white;margin-top:10px;}
th, td{border:1px solid #fff;padding:4px;text-align:center;font-size:14px;}
.helpContent{display:none;background:#334155;color:white;padding:12px;border-radius:6px;margin-top:5px;line-height:1.5;}
.icon-panel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.icon-panel button{flex:1;padding:6px;}
input[type="number"], input[type="password"]{width:120px;padding:4px;border-radius:6px;border:none;}
</style>
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#1e293b;padding:25px;border-radius:10px;text-align:center;width:300px;">
    <h3 style="margin-top:0;">🔐 Admin Bejelentkezés</h3>
    <input type="password" id="modalPass" placeholder="Jelszó" style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">
    <button onclick="modalLogin()" style="width:100%;padding:8px;background:#16a34a;color:white;border:none;border-radius:6px;font-weight:bold;">
    Belépés
    </button>
  </div>
</div>

<h2>💰 Heti Fizetés</h2>

<button onclick="logout()" style="background:#dc2626;color:white;padding:6px 12px;border:none;border-radius:6px;margin-bottom:10px;font-weight:bold;">
🚪 Kilépés
</button>

<div class="icon-panel">
  <button onclick="szamol()">🧮 Számol</button>
  <button onclick="mentNap()">💾 Naplóz</button>
  <button onclick="openPDF()">📄 PDF</button>
  <button onclick="toggleHelp()">ℹ️ Segítség</button>
  <button onclick="nullazHetiLog()">♻️ Heti nullázás</button>
  <button onclick="nullazFoMenu()">🧹 Főmenü nullázás</button>
</div>

<div id="helpContent" class="helpContent">
<b>Fél rablás / résztvevők × 0.82.</b><br>
Mosás +250$<br>
Craft +250$<br>
Naplóz = heti PDF adat.<br>
Heti nullázás = PDF törlés.<br>
Főmenü nullázás = aktuális nap törlés.
</div>

<div style="margin-bottom:10px;">
Paletói $ <input type="number" id="paleto">
Állami $ <input type="number" id="allami">
Múzeum $ <input type="number" id="muzeum">
Bobcat $ <input type="number" id="bobcat">
</div>

<div id="summary"></div>

<table>
<thead>
<tr>
<th>Tag</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
<th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th>
</tr>
</thead>
<tbody id="tagokTable"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const adatRef = ref(db, "aktualisAdatok");
const hetiRef = ref(db, "hetiOsszesites");

let admin=false;
const ADMIN_JELSZO="1234";

document.addEventListener("DOMContentLoaded",()=>{
if(localStorage.getItem("adminLogged")==="true"){
admin=true;
document.getElementById("loginModal").style.display="none";
}
});

window.modalLogin=function(){
const pass=document.getElementById("modalPass").value;
if(pass===ADMIN_JELSZO){
admin=true;
localStorage.setItem("adminLogged","true");
document.getElementById("loginModal").style.display="none";
}else{
alert("Hibás jelszó!");
}
};

window.logout=function(){
admin=false;
localStorage.removeItem("adminLogged");
document.getElementById("loginModal").style.display="flex";
};

function adminCheck(){
if(!admin){alert("Admin jogosultság szükséges!");return false;}
return true;
}

const nevek=[
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)","Daryl Dixon (Oroszlán)",
"Julian Alvarez (Szecska)","Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)","Mateo Tavares Valesco (Kolbi)",
"Carl Jesus (Faszos)","Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)","Wells Jordan (Stone)",
"Williams Jackson (Easy)","Jackson West (Kalap)","David Jackson (Kabát)",
"Henry Parker (Pufi)"
];

let adatok=[];
let hetiOsszesites={};

onValue(adatRef,s=>{
if(s.exists()) adatok=s.val();
else{
adatok=nevek.map(n=>({
nev:n,moso:0,craft:0,fizetett:false,osszeg:0,
rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}
}));
set(adatRef,adatok);
}
render();
});

onValue(hetiRef,s=>{
if(s.exists()) hetiOsszesites=s.val();
});

function mentes(){ set(adatRef,adatok); }

window.addMoso=i=>{if(!adminCheck())return;adatok[i].moso++;mentes();render();}
window.minusMoso=i=>{if(!adminCheck())return;if(adatok[i].moso>0)adatok[i].moso--;mentes();render();}
window.addCraft=i=>{if(!adminCheck())return;adatok[i].craft++;mentes();render();}
window.minusCraft=i=>{if(!adminCheck())return;if(adatok[i].craft>0)adatok[i].craft--;mentes();render();}
window.toggleRablas=(i,t)=>{if(!adminCheck())return;adatok[i].rablas[t]=!adatok[i].rablas[t];mentes();render();}
window.toggleFizetett=i=>{if(!adminCheck())return;adatok[i].fizetett=!adatok[i].fizetett;mentes();render();}

window.szamol=function(){
if(!adminCheck())return;

let paleto=+document.getElementById("paleto").value||0;
let allami=+document.getElementById("allami").value||0;
let muzeum=+document.getElementById("muzeum").value||0;
let bobcat=+document.getElementById("bobcat").value||0;

const cP=adatok.filter(x=>x.rablas.paleto).length||1;
const cA=adatok.filter(x=>x.rablas.allami).length||1;
const cM=adatok.filter(x=>x.rablas.muzeum).length||1;
const cB=adatok.filter(x=>x.rablas.bobcat).length||1;

adatok.forEach(t=>{
let resz=0;
if(t.rablas.paleto)resz+=((paleto/2)/cP)*0.82;
if(t.rablas.allami)resz+=((allami/2)/cA)*0.82;
if(t.rablas.muzeum)resz+=((muzeum/2)/cM)*0.82;
if(t.rablas.bobcat)resz+=((bobcat/2)/cB)*0.82;
t.osszeg=resz+t.moso*250+t.craft*250;
});
mentes();
render();
};

window.mentNap=function(){
if(!adminCheck())return;
adatok.forEach(t=>{
if(!hetiOsszesites[t.nev])hetiOsszesites[t.nev]={...t};
else{
hetiOsszesites[t.nev].moso+=t.moso;
hetiOsszesites[t.nev].craft+=t.craft;
hetiOsszesites[t.nev].osszeg+=t.osszeg;
}
});
set(hetiRef,hetiOsszesites);
alert("Naplózva.");
};

window.openPDF=function(){
localStorage.setItem("hetiLogPDF",JSON.stringify(hetiOsszesites));
window.open("pdf_kompakt.html","_blank");
};

window.nullazHetiLog=function(){
if(!adminCheck())return;
if(confirm("Biztos törlöd?")){
hetiOsszesites={};
set(hetiRef,{});
alert("Heti log törölve.");
}
};

window.nullazFoMenu=function(){
if(!adminCheck())return;
if(confirm("Biztos nullázod az aktuális főmenüt?")){
adatok.forEach(t=>{
t.moso=0;
t.craft=0;
t.osszeg=0;
t.fizetett=false;
t.rablas={paleto:false,allami:false,muzeum:false,bobcat:false};
});
mentes();
render();
alert("Főmenü nullázva.");
}
};

window.toggleHelp=function(){
const help=document.getElementById("helpContent");
help.style.display=help.style.display==="none"?"block":"none";
};

function render(){
let total=adatok.reduce((s,t)=>s+t.osszeg,0);
document.getElementById("summary").innerHTML="💵 Összes kiosztva: "+total.toFixed(2)+" $";

let html="";
adatok.forEach((t,i)=>{
html+=`<tr>
<td>${t.nev}</td>
<td><input type="checkbox" ${t.rablas.paleto?'checked':''} onclick="toggleRablas(${i},'paleto')"></td>
<td><input type="checkbox" ${t.rablas.allami?'checked':''} onclick="toggleRablas(${i},'allami')"></td>
<td><input type="checkbox" ${t.rablas.muzeum?'checked':''} onclick="toggleRablas(${i},'muzeum')"></td>
<td><input type="checkbox" ${t.rablas.bobcat?'checked':''} onclick="toggleRablas(${i},'bobcat')"></td>
<td><button onclick="minusMoso(${i})">−</button><button onclick="addMoso(${i})">+250</button> ${t.moso}</td>
<td><button onclick="minusCraft(${i})">−</button><button onclick="addCraft(${i})">+250</button> ${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td><button class="${t.fizetett?'green':'red'}" onclick="toggleFizetett(${i})">${t.fizetett?'✅':'❌'}</button></td>
</tr>`;
});
document.getElementById("tagokTable").innerHTML=html;
}

</script>
</body>
</html>
