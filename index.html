<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Gaming RP | FiveM GTA RP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;text-align:center;overflow-x:hidden;}
nav{position:fixed;width:100%;background:rgba(0,0,0,0.85);padding:15px;text-align:center;z-index:1000;backdrop-filter:blur(5px);border-bottom:1px solid #00ffff;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;transition:0.3s;}
nav a:hover{color:#00ffff;text-shadow:0 0 10px #00ffff;}
section{padding:80px 20px;}
h1,h2{color:#00ffff;margin-bottom:20px;}
input,textarea{width:80%;padding:10px;margin:10px;border:none;border-radius:10px;}
button{padding:12px 25px;border:none;border-radius:30px;background:#00ffff;color:black;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#ff0055;color:white;box-shadow:0 0 20px #ff0055;}
.hero{position:relative;height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;overflow:hidden;}
.hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;filter:brightness(30%);}
.btn{margin-top:15px;}
.card-container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:40px;}
.card{background:#111;padding:20px;width:260px;border-radius:15px;border:1px solid #00ffff;transition:0.3s;}
.card:hover{transform:translateY(-10px);box-shadow:0 0 20px #00ffff;}
.server-box{background:#111;padding:30px;border-radius:15px;border:1px solid #ff0055;display:inline-block;margin-top:20px;}
footer{background:#000;padding:20px;text-align:center;font-size:14px;}
audio{position:fixed;bottom:10px;right:10px;width:200px;border-radius:10px;}
@media(max-width:768px){.card-container{flex-direction:column;align-items:center;}.hero h1{font-size:2.2em;}}
</style>
</head>
<body>

<nav>
<a href="#home">Főoldal</a>
<a href="#server">Szerver</a>
<a href="#apply">Jelentkezés</a>
<a href="#" onclick="staffLogin()">Staff Panel</a>
</nav>

<!-- HERO SECTION -->
<div class="hero" id="home">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-driving-through-the-city-1573/1080p.mp4" type="video/mp4">
</video>
<div>
<h1>David Gaming RP</h1>
<p>Hardcore FiveM GTA Roleplay</p>
<button class="btn" onclick="window.location.href='https://discord.gg/4nspFjYC'">Discord Csatlakozás</button>
</div>
</div>

<!-- SERVER INFO -->
<section id="server">
<h2>Szerver Információ</h2>
<div class="server-box">

<button class="btn" onclick="copyIP()">IP Másolása</button>

</section>

<section id="apply">

<form id="applyForm">
<input type="text" id="character" placeholder="Karakter Név" required>
<input type="text" id="discord" placeholder="Discord Név" required>
<textarea id="message" placeholder="Miért szeretnél csatlakozni?" required></textarea>
<br>
<button type="submit">Jelentkezés Küldése</button>
</form>
<p id="status"></p>
</section>

<!-- ZENE -->
<audio autoplay loop controls>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- FOOTER -->
<footer>
© 2026 David Gaming RP
</footer>

<script>
// STAFF PANEL
function staffLogin(){
let pass = prompt("Add meg a staff jelszót:");
if(pass === "David2026"){window.location.href="staff.html";}
else{alert("❌ Helytelen jelszó!");}
}

// DISCORD WEBHOOK JELENTKEZÉS
const webhookURL = "https://discord.com/api/webhooks/1475997967206056036/OMT43V8manVOlFKacciEhb73vdYskubuRlQ18QZ6PZwwiJUi1A1_T9hwVdBwS1CuQTKg";
document.getElementById("applyForm").addEventListener("submit", function(e){
e.preventDefault();
const character = document.getElementById("character").value;
const discord = document.getElementById("discord").value;
const message = document.getElementById("message").value;
fetch(webhookURL, {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({content: `📥 **ÚJ JELENTKEZÉS - David Gaming RP**\n\n👤 Karakter: ${character}\n🎮 Discord: ${discord}\n\n📝 Üzenet:\n${message}`})
}).then(() => {document.getElementById("status").innerText="✅ Jelentkezés elküldve Discordra!";});
});

// FAKE PLAYER COUNTER (Később API-val)
let randomPlayers = Math.floor(Math.random()*120)+10;
document.getElementById("players").innerText = randomPlayers + " / 128";

// IP MÁSOLÁS
function copyIP(){navigator.clipboard.writeText("cfx.re/join/IDEIP");alert("IP kimásolva!");}
</script>

</body>
</html>
