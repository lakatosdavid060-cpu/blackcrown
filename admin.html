<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Turbo</title>
<style>
body {
  margin:0;
  padding:40px;
  font-family:'Orbitron', sans-serif;
  color:white;
  text-align:center;
  background: url('https://wallpapers.com/images/hd/skull-black-king-crown-z2sij0bg02ro5oao.jpg') no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
  backdrop-filter: brightness(0.7);
}

/* --- Táblázat stílus --- */
table {
  margin:auto;
  border-collapse:collapse;
  width:95%;
  transition:0.3s;
}
th, td {
  border:1px solid #fff;
  padding:12px;
  text-align:center;
  transition:0.3s;
}
th {
  background: rgba(0,0,0,0.7);
  font-size:1.1em;
  text-shadow:0 0 5px #f00;
}
tr:hover {
  background: rgba(255,255,255,0.1);
  transform:scale(1.02);
}
button {
  padding:8px 16px;
  margin:2px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition: all 0.3s;
}
button:hover {
  background:#00ffff;
  color:black;
  transform:scale(1.1);
}

/* --- Státusz színek animációval --- */
.status-accepted {
  color:#0f0;
  font-weight:bold;
  text-shadow:0 0 10px #0f0, 0 0 20px #0ff;
}
.status-rejected {
  color:#f00;
  font-weight:bold;
  text-shadow:0 0 10px #f00, 0 0 20px #ff0;
}
.status-pending {
  color:#ff0;
  font-weight:bold;
  text-shadow:0 0 10px #ff0, 0 0 20px #ff8800;
}

#logoutBtn{
  margin-top:20px;
  padding:12px 25px;
  font-size:1.1em;
  border-radius:12px;
  background: rgba(255,0,0,0.85);
  color:black;
  text-shadow:1px 1px 2px #000;
  transition:0.3s;
}
#logoutBtn:hover{
  background: rgba(0,255,255,0.85);
  transform:scale(1.1);
}

/* --- Animált sor betöltés --- */
tr{
  opacity:0;
  animation:fadeIn 0.8s forwards;
}
@keyframes fadeIn{
  0%{opacity:0; transform:translateY(-10px);}
  100%{opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<h1>Staff / Admin Panel</h1>

<table id="appTable">
<thead>
<tr>
<th>Név</th>
<th>Discord</th>
<th>Életkor</th>
<th>Státusz</th>
<th>Műveletek</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="logoutBtn" onclick="logoutAdmin()">Kijelentkezés</button>

<script>
// --- Betöltés ---
function loadApplications(){
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    const tbody=document.querySelector("#appTable tbody");
    tbody.innerHTML="";
    data.forEach((u,i)=>{
        const tr=document.createElement("tr");
        tr.style.animationDelay=(i*0.1)+'s';
        tr.innerHTML=`<td>${u.name}</td>
        <td>${u.discord}</td>
        <td>${u.age}</td>
        <td class="status-${u.status==='Elfogadva'?'accepted':u.status==='Elutasítva'?'rejected':'pending'}">${u.status}</td>
        <td>
        <button onclick="changeStatus(${i},'Elfogadva')">✅</button>
        <button onclick="changeStatus(${i},'Elutasítva')">❌</button>
        <button onclick="deleteUser(${i})">🗑️</button>
        </td>`;
        tbody.appendChild(tr);
    });
}

// --- Státusz módosítás ---
function changeStatus(index,status){
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data[index].status=status;
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    loadApplications();
    alert("✅ Státusz frissítve: "+status);
}

// --- Törlés ---
function deleteUser(index){
    if(!confirm("Biztos törlöd a jelentkezőt?")) return;
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data.splice(index,1);
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    loadApplications();
}

// --- Kijelentkezés ---
function logoutAdmin(){
    localStorage.removeItem("bc_admin_logged");
    window.location.href="index.html";
}

document.addEventListener("DOMContentLoaded", loadApplications);
</script>

</body>
</html>
