<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body {
  background: url('https://images.unsplash.com/photo-1530915362671-6d0e0e8c5b3d?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
  background-size: cover;
  color: white;
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}
table {margin:auto;border-collapse:collapse;width:90%; transition:0.3s;}
th, td {border:1px solid #fff;padding:10px; text-align:center;}
th {background:#222;}
tr:hover {background: rgba(255,255,255,0.1);}
button {padding:8px 15px;margin:2px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;transition:0.3s;}
button:hover {background:#00ffff;color:black;}
#logoutBtn {margin-top:20px;}
.status-accepted{color:#0f0;font-weight:bold;}
.status-rejected{color:#f00;font-weight:bold;}
.status-pending{color:#ff0;font-weight:bold;}
</style>
</head>
<body>

<h1>Staff / Admin Panel</h1>

<table id="appTable">
<thead>
<tr>
<th>Név</th>
<th>Discord</th>
<th>Életkor</th>
<th>Státusz</th>
<th>Műveletek</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="logoutBtn" onclick="logoutAdmin()">Kijelentkezés</button>

<script>
function loadApplications(){
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    const tbody=document.querySelector("#appTable tbody");
    tbody.innerHTML="";
    data.forEach((u,i)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${u.name}</td>
        <td>${u.discord}</td>
        <td>${u.age}</td>
        <td class="status-${u.status==='Elfogadva'?'accepted':u.status==='Elutasítva'?'rejected':'pending'}">${u.status}</td>
        <td>
        <button onclick="changeStatus(${i},'Elfogadva')">✅</button>
        <button onclick="changeStatus(${i},'Elutasítva')">❌</button>
        <button onclick="deleteUser(${i})">🗑️</button>
        </td>`;
        tbody.appendChild(tr);
    });
}

function changeStatus(index,status){
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data[index].status=status;
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    loadApplications();
    alert("✅ Státusz frissítve: "+status);
}

function deleteUser(index){
    if(!confirm("Biztos törlöd a jelentkezőt?")) return;
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data.splice(index,1);
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    loadApplications();
}

function logoutAdmin(){
    localStorage.removeItem("bc_admin_logged");
    window.location.href="index.html";
}

document.addEventListener("DOMContentLoaded", loadApplications);
</script>

</body>
</html>
