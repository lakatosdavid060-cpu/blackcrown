<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Black Crown Maffia</title>
<style>
body{
  margin:0;
  padding:50px;
  font-family:'Orbitron', sans-serif;
  color:white;
  text-align:center;
  background: url('https://wallpapers.com/images/hd/skull-black-king-crown-z2sij0bg02ro5oao.jpg') no-repeat center center fixed;
  background-size:cover;
  backdrop-filter: brightness(0.7);
}
h1{font-size:3em; text-shadow: 0 0 15px #f00,0 0 25px #0ff,0 0 35px #f0f; margin-bottom:20px;}
table{width:90%; margin:auto; border-collapse:collapse; background:rgba(0,0,0,0.85); border-radius:15px; overflow:hidden; box-shadow:0 0 30px #0ff inset;}
th,td{padding:12px; border-bottom:1px solid #00ffff; text-align:center; font-size:1em;}
th{background:rgba(255,0,0,0.85); color:black; text-shadow:1px 1px 2px #000;}
td button{padding:6px 14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; transition:0.3s;}
td button:hover{transform:scale(1.1); box-shadow:0 0 15px #0ff;}
#logoutBtn{margin:20px; padding:10px 20px; font-weight:bold; cursor:pointer; border:none; border-radius:12px; background:red; color:black; text-shadow:1px 1px 2px #000; transition:0.3s;}
#logoutBtn:hover{transform:scale(1.05); box-shadow:0 0 20px #0ff; background:cyan;}
.confetti-piece{position:fixed; width:12px;height:12px; pointer-events:none; opacity:0.95; animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(0px) rotate(0deg);}100%{transform:translateY(100vh) rotate(360deg);}}
</style>
</head>
<body>
<h1>Admin Panel - Black Crown Maffia</h1>
<button id="logoutBtn" onclick="logoutAdmin()">Kijelentkezés</button>
<table id="appTable">
  <thead>
    <tr>
      <th>IC Név</th>
      <th>IC Életkor</th>
      <th>RP Tapasztalat</th>
      <th>Lopáson kaptad?</th>
      <th>Státusz</th>
      <th>Műveletek</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const ADMIN_CREDENTIALS={user:"admin", pass:"admin"};
if(localStorage.getItem("bc_admin_logged")!=="true"){
    let u=prompt("Felhasználónév:");
    let p=prompt("Jelszó:");
    if(u!==ADMIN_CREDENTIALS.user || p!==ADMIN_CREDENTIALS.pass){alert("Hozzáférés megtagadva!");window.location.href="index.html";}
    else{localStorage.setItem("bc_admin_logged","true");}
}

function logoutAdmin(){localStorage.removeItem("bc_admin_logged");window.location.href="index.html";}

function loadApplications(){
    const data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    const tbody=document.querySelector("#appTable tbody");
    tbody.innerHTML="";
    data.forEach((u,index)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${u.icName}</td>
                      <td>${u.icAge}</td>
                      <td>${u.rpExp}</td>
                      <td>${u.scenario}</td>
                      <td id="status-${index}">${u.status}</td>
                      <td>
                        <button onclick="acceptApp(${index})" style="background:lime;">Elfogad</button>
                        <button onclick="rejectApp(${index})" style="background:red;">Elutasít</button>
                      </td>`;
        tbody.appendChild(tr);
    });
}

function acceptApp(index){
    let data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data[index].status="Elfogadva";
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    document.getElementById(`status-${index}`).innerText="Elfogadva";
    runConfetti();
    alert(`✅ ${data[index].icName} elfogadva!`);
}

function rejectApp(index){
    let data=JSON.parse(localStorage.getItem("jelentkezok")||"[]");
    data[index].status="Elutasítva";
    localStorage.setItem("jelentkezok",JSON.stringify(data));
    document.getElementById(`status-${index}`).innerText="Elutasítva";
    alert(`⛔ ${data[index].icName} elutasítva!`);
}

function runConfetti(){
    const colors=['#ff0','#0ff','#f0f','#ff8800','#00ff88','#ff0088'];
    for(let i=0;i<60;i++){
        const shapes=['●','★','♛','☠'];
        const c=document.createElement('div');
        c.classList.add('confetti-piece');
        c.innerText=shapes[Math.floor(Math.random()*shapes.length)];
        c.style.color=colors[Math.floor(Math.random()*colors.length)];
        c.style.left=Math.random()*100+'vw';
        c.style.fontSize=Math.random()*24+12+'px';
        c.style.animationDuration=(Math.random()*2+2)+'s';
        document.body.appendChild(c);
        setTimeout(()=>{c.remove();},3500);
    }
}

loadApplications();
</script>
</body>
</html>
