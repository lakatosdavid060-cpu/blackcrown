<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Crown Maffia - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:white;text-align:center;padding:20px;overflow-x:hidden;}
h1,h2{color:#ff0000;margin-bottom:20px;text-shadow:0 0 10px #ff0000;}
iframe{width:100%;height:500px;border:2px solid #ff0000;border-radius:15px;margin-top:20px;}
button{padding:8px 15px;margin:5px;border:none;border-radius:8px;background:#ff0000;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#00ffff;color:black;}
</style>
</head>
<body>

<h1>Black Crown Maffia - Admin Panel</h1>
<p>⚠️ Boss felhasználóval tudod módosítani a státuszt. UnderBoss csak megtekintheti.</p>

<div id="sheetContainer">
  <iframe id="sheetFrame" src="" frameborder="0"></iframe>
</div>

<script>
// Bejelentkezés
let felhasznalo = prompt("Felhasználónév (Boss / UnderBoss):");
let jelszo = prompt("Jelszó:");
if(jelszo !== "BlackCrown2026" || (felhasznalo !== "Boss" && felhasznalo !== "UnderBoss")){
  alert("❌ Helytelen felhasználónév vagy jelszó!");
  window.location.href="index.html";
} else {
  alert("✅ Beléptél mint " + felhasznalo);
}

// Google Sheet publikus HTML linkje
// FONTOS: cseréld ki a saját Sheet publikus HTML linkedre
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNPsSD9aVIqsNyQn7zEV1OT4TFRPcmKFniNkpSDBiejaaR_hmzY7CLBUAdabuMyOEaLFtrzYenj2Cr/pubhtml?widget=true&headers=false";

document.getElementById("sheetFrame").src = sheetURL;

// Boss felhasználó esetén státusz gombok hozzáadása lehetőségként
// Itt később lehet bővíteni, hogy Apps Script segítségével frissítse a Sheet-et
</script>

</body>
</html>
