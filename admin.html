<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Black Crown Maffia</title>
<style>
body{background:#000;color:white;font-family:sans-serif;text-align:center;padding:20px;}
h1{color:#ff0000;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ff0000;padding:10px;}
th{background:#111;}
td{background:#222;transition: background 0.5s;}
.status-Függőben{color:#ffff00;font-weight:bold;}
.status-Elfogadva{color:#00ff00;font-weight:bold;}
.status-Elutasítva{color:#ff0000;font-weight:bold;}
button{padding:5px 10px;margin:2px;border:none;border-radius:6px;background:#ff0000;color:white;cursor:pointer;}
button:hover{background:#00ffff;color:black;}
</style>
</head>
<body>

<h1>Admin Panel - Black Crown Maffia</h1>

<script>
// Persistent login
let user = localStorage.getItem("bc_user");
let pass = localStorage.getItem("bc_pass");
if(!user || !pass || pass!=="BlackCrown2026" || (user!=="Boss" && user!=="UnderBoss")){
    user = prompt("Felhasználónév (Boss / UnderBoss):");
    pass = prompt("Jelszó:");
    if(pass!=="BlackCrown2026" || (user!=="Boss" && user!=="UnderBoss")){
        alert("❌ Helytelen felhasználónév vagy jelszó!");
        window.location.href="index.html";
    }
    localStorage.setItem("bc_user", user);
    localStorage.setItem("bc_pass", pass);
}

function logout(){
    localStorage.removeItem("bc_user");
    localStorage.removeItem("bc_pass");
    location.reload();
}
document.write(`<button onclick="logout()">Kijelentkezés</button>`);

// Admin table
const table = document.createElement("table");
table.innerHTML = `<tr>
<th>Karakter Név</th>
<th>Discord Név</th>
<th>Üzenet</th>
<th>Dátum</th>
<th>Status</th>
<th>Művelet</th>
</tr>`;
document.body.appendChild(table);

// Betöltés localStorage-ból
function loadJelentkezesek(){
    table.innerHTML = `<tr>
<th>Karakter Név</th>
<th>Discord Név</th>
<th>Üzenet</th>
<th>Dátum</th>
<th>Status</th>
<th>Művelet</th>
</tr>`;
    let adatok = JSON.parse(localStorage.getItem("jelentkezok") || "[]");
    adatok.forEach(j => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td>${j.name}</td>
        <td>${j.discord}</td>
        <td>${j.message}</td>
        <td>${j.date}</td>
        <td id="status-${j.id}" class="status-${j.status}">${j.status}</td>
        <td>
            <button onclick="updateStatus(${j.id},'Elfogadva')">✅</button>
            <button onclick="updateStatus(${j.id},'Elutasítva')">❌</button>
        </td>
        `;
        table.appendChild(tr);
    });
}
loadJelentkezesek();

function updateStatus(id, newStatus){
    let adatok = JSON.parse(localStorage.getItem("jelentkezok") || "[]");
    adatok = adatok.map(j=>{
        if(j.id===id) j.status=newStatus;
        return j;
    });
    localStorage.setItem("jelentkezok", JSON.stringify(adatok));
    loadJelentkezesek();
}
</script>

</body>
</html>
