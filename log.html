<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Autókivétel log</title>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:15px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.orange{
background:#d97706;
color:white;
}

.red{
background:#dc2626;
color:white;
}

.blue{
background:#2563eb;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#0f172a;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

th{
background:#1e293b;
}

.info{
margin-top:10px;
color:#94a3b8;
font-size:13px;
}
</style>

</head>

<body>

<h2>🚗 Autókivétel log</h2>

<div class="toolbar">
  <button class="orange" onclick="cleanupLogs(3)">🧹 3 napnál régebbi törlése</button>
  <button class="orange" onclick="cleanupLogs(7)">🧹 7 napnál régebbi törlése</button>
  <button class="red" onclick="deleteAllLogs()">❌ Összes autó log törlése</button>
</div>

<div class="info">
Csak az autós műveletek jelennek meg. A törlés a Firebase <b>actionLog</b> útvonaláról történik.
</div>

<table>
<thead>
<tr>
<th>Idő</th>
<th>Művelet</th>
<th>Adat</th>
</tr>
</thead>

<tbody id="autoTabla"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const autoTabla = document.getElementById("autoTabla");
const autoLogRef = ref(db,"actionLog");

let autoLogs = [];

onValue(autoLogRef,(snapshot)=>{

  autoTabla.innerHTML="";
  autoLogs = [];

  if(!snapshot.exists()){
    autoTabla.innerHTML = "<tr><td colspan='3'>Nincs log</td></tr>";
    return;
  }

  snapshot.forEach(child=>{
    const data = child.val();
    const key = child.key;

    if(!data?.muvelet?.includes("Autó")) return;

    autoLogs.push({
      key,
      ...data
    });
  });

  autoLogs.sort((a,b)=>Number(b.key) - Number(a.key));

  if(autoLogs.length === 0){
    autoTabla.innerHTML = "<tr><td colspan='3'>Nincs autós log</td></tr>";
    return;
  }

  autoLogs.forEach(data=>{

    const sor = document.createElement("tr");

    sor.innerHTML = `
      <td>${data.ido || "-"}</td>
      <td>${data.muvelet || "-"}</td>
      <td>${data.adat || "-"}</td>
    `;

    autoTabla.appendChild(sor);
  });

});

window.cleanupLogs = async function(nap){
  if(!confirm(`Biztos törlöd a ${nap} napnál régebbi autó logokat?`)) return;

  const hatarido = Date.now() - (nap * 24 * 60 * 60 * 1000);

  let torolt = 0;

  for (const log of autoLogs) {
    const timestamp = Number(log.key);

    if (!isNaN(timestamp) && timestamp < hatarido) {
      await remove(ref(db, "actionLog/" + log.key));
      torolt++;
    }
  }

  alert(`Törölve: ${torolt} db ${nap} napnál régebbi autó log.`);
};

window.deleteAllLogs = async function(){
  if(!confirm("Biztos törlöd az összes autó logot?")) return;
  if(prompt("Írd be: TORLES") !== "TORLES") return;

  let torolt = 0;

  for (const log of autoLogs) {
    await remove(ref(db, "actionLog/" + log.key));
    torolt++;
  }

  alert(`Törölve: ${torolt} db autó log.`);
};

</script>

</body>
</html>
