<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Autókivétel log</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:20px;
  margin:0;
}

h2{
  margin-top:0;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:15px 0;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:0.45;
  cursor:not-allowed;
}

.orange{
  background:#d97706;
  color:white;
}

.red{
  background:#dc2626;
  color:white;
}

.green{
  background:#16a34a;
  color:white;
}

.gray{
  background:#475569;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:#0f172a;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{
  background:#1e293b;
}

.info{
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}

.status{
  margin-top:10px;
  font-size:14px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>🚗 Autókivétel log</h2>

<div class="toolbar">
  <button id="editModeBtn" class="gray" onclick="toggleEditMode()">🔐 Szerkesztő üzemmód: KI</button>
  <button id="btn3nap" class="orange" onclick="cleanupLogs(3)" disabled>🧹 3 napnál régebbi törlése</button>
  <button id="btn7nap" class="orange" onclick="cleanupLogs(7)" disabled>🧹 7 napnál régebbi törlése</button>
  <button id="btnTorolMindent" class="red" onclick="deleteAllLogs()" disabled>❌ Összes autó log törlése</button>
</div>

<div class="status" id="editStatus">Szerkesztő mód jelenleg: KI</div>

<div class="info">
  Csak az autós műveletek jelennek meg. A törlés a Firebase <b>actionLog</b> útvonaláról történik.
  A törlési műveletek csak szerkesztő üzemmódban használhatók.
</div>

<table>
<thead>
<tr>
  <th>Idő</th>
  <th>Művelet</th>
  <th>Adat</th>
</tr>
</thead>

<tbody id="autoTabla"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const autoTabla = document.getElementById("autoTabla");
const autoLogRef = ref(db, "actionLog");

const editModeBtn = document.getElementById("editModeBtn");
const editStatus = document.getElementById("editStatus");
const btn3nap = document.getElementById("btn3nap");
const btn7nap = document.getElementById("btn7nap");
const btnTorolMindent = document.getElementById("btnTorolMindent");

let autoLogs = [];
let editMode = false;

const EDIT_PASSWORD = "1234"; // <-- ezt írd át

function updateEditModeUI(){
  btn3nap.disabled = !editMode;
  btn7nap.disabled = !editMode;
  btnTorolMindent.disabled = !editMode;

  if(editMode){
    editModeBtn.textContent = "🔓 Szerkesztő üzemmód: BE";
    editModeBtn.className = "green";
    editStatus.textContent = "Szerkesztő mód jelenleg: BE";
    editStatus.style.color = "#4ade80";
  } else {
    editModeBtn.textContent = "🔐 Szerkesztő üzemmód: KI";
    editModeBtn.className = "gray";
    editStatus.textContent = "Szerkesztő mód jelenleg: KI";
    editStatus.style.color = "#f87171";
  }
}

window.toggleEditMode = function(){
  if(!editMode){
    const jelszo = prompt("Add meg a szerkesztő mód jelszavát:");
    if(jelszo !== EDIT_PASSWORD){
      alert("Hibás jelszó!");
      return;
    }
    editMode = true;
  } else {
    editMode = false;
  }

  updateEditModeUI();
};

onValue(autoLogRef, (snapshot)=>{

  autoTabla.innerHTML = "";
  autoLogs = [];

  if(!snapshot.exists()){
    autoTabla.innerHTML = "<tr><td colspan='3'>Nincs log</td></tr>";
    return;
  }

  snapshot.forEach(child=>{
    const data = child.val();
    const key = child.key;

    if(!data?.muvelet?.includes("Autó")) return;

    autoLogs.push({
      key,
      ...data
    });
  });

  autoLogs.sort((a,b)=>Number(b.key) - Number(a.key));

  if(autoLogs.length === 0){
    autoTabla.innerHTML = "<tr><td colspan='3'>Nincs autós log</td></tr>";
    return;
  }

  autoLogs.forEach(data=>{
    const sor = document.createElement("tr");

    sor.innerHTML = `
      <td>${data.ido || "-"}</td>
      <td>${data.muvelet || "-"}</td>
      <td>${data.adat || "-"}</td>
    `;

    autoTabla.appendChild(sor);
  });

});

window.cleanupLogs = async function(nap){
  if(!editMode){
    alert("A törlés csak szerkesztő üzemmódban engedélyezett.");
    return;
  }

  if(!confirm(`Biztos törlöd a ${nap} napnál régebbi autó logokat?`)) return;

  const hatarido = Date.now() - (nap * 24 * 60 * 60 * 1000);
  let torolt = 0;

  for (const log of autoLogs) {
    const timestamp = Number(log.key);

    if (!isNaN(timestamp) && timestamp < hatarido) {
      await remove(ref(db, "actionLog/" + log.key));
      torolt++;
    }
  }

  alert(`Törölve: ${torolt} db ${nap} napnál régebbi autó log.`);
};

window.deleteAllLogs = async function(){
  if(!editMode){
    alert("Az összes törlés csak szerkesztő üzemmódban engedélyezett.");
    return;
  }

  if(!confirm("Biztos törlöd az összes autó logot?")) return;
  if(prompt("Írd be: TORLES") !== "TORLES") return;

  let torolt = 0;

  for (const log of autoLogs) {
    await remove(ref(db, "actionLog/" + log.key));
    torolt++;
  }

  alert(`Törölve: ${torolt} db autó log.`);
};

updateEditModeUI();

</script>

</body>
</html>
