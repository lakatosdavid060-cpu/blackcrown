<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<title>Heti log</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

th{
background:#1e293b;
}

</style>

</head>

<body>

<h2>📊 Oldal műveleti log</h2>

<table>

<thead>
<tr>
<th>Idő</th>
<th>Művelet</th>
<th>Adat</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const tabla = document.getElementById("tabla");

const logRef = ref(db,"actionLog");

onValue(logRef,(snapshot)=>{

tabla.innerHTML="";

snapshot.forEach(child=>{

const data = child.val();

const sor = document.createElement("tr");

sor.innerHTML = `
<td>${data.ido}</td>
<td>${data.muvelet}</td>
<td>${data.adat}</td>
`;

tabla.appendChild(sor);

});

});

</script>

</body>
</html>
