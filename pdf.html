<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés PDF</title>
<style>
body{font-family:Arial;color:#0f172a;padding:15px;margin:0;background:white;}
h2{color:#0f172a;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
th, td{border:1px solid #000;padding:6px;text-align:center;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
</style>
</head>
<body>

<h2>💰 Heti Fizetés – PDF</h2>

<table>
<thead>
<tr>
<th>Tag</th><th>Paleto</th><th>Állami</th><th>Múzeum</th><th>Bobcat</th>
<th>Mosó</th><th>Craft</th><th>Összeg</th><th>Kifizetve</th>
</tr>
</thead>
<tbody id="pdfTable"></tbody>
</table>

<script>
const hetiLog = JSON.parse(localStorage.getItem("hetiLogPDF"))||[];
const tbody=document.getElementById("pdfTable");

const osszesites={};
hetiLog.forEach(entry=>{
entry.adatok.forEach(t=>{
if(!osszesites[t.nev]){
osszesites[t.nev]={nev:t.nev, moso:0, craft:0, osszeg:0, fizetett:false, rablas:{paleto:false,allami:false,muzeum:false,bobcat:false}};
}
osszesites[t.nev].moso+=t.moso;
osszesites[t.nev].craft+=t.craft;
osszesites[t.nev].osszeg+=t.osszeg;
osszesites[t.nev].fizetett=osszesites[t.nev].fizetett || t.fizetett;
Object.keys(t.rablas).forEach(k=>osszesites[t.nev].rablas[k]=osszesites[t.nev].rablas[k]||t.rablas[k]);
});
});

Object.values(osszesites).forEach(t=>{
let html=`<tr>
<td>${t.nev}</td>
<td>${t.rablas.paleto?1:0}</td>
<td>${t.rablas.allami?1:0}</td>
<td>${t.rablas.muzeum?1:0}</td>
<td>${t.rablas.bobcat?1:0}</td>
<td>${t.moso}</td>
<td>${t.craft}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td class="${t.fizetett?'green':'red'}">${t.fizetett?'✅':'❌'}</td>
</tr>`;
tbody.innerHTML+=html;
});
</script>
</body>
</html>
