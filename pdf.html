<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Összesítés – Kompakt PDF</title>
<style>
body{font-family:Arial;background:white;color:black;padding:15px;margin:0;}
h2{color:#1e293b;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
th, td{border:1px solid #333;padding:6px;text-align:center;font-size:14px;}
button{padding:6px 12px;margin:10px 0;border:none;border-radius:6px;background:#38bdf8;color:white;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>

<h2>💰 Heti Összesített Fizetés – Kompakt</h2>

<button onclick="let opt={filename:'Heti_Kompakt_Osszesites.pdf'};html2pdf().set(opt).from(document.body).save();">
📄 Letöltés PDF
</button>

<table>
<thead>
<tr>
<th>Tag</th>
<th>Heti Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>
<tbody id="pdfTable"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// Betöltjük a main.html-ben naplózott heti összesítést
let hetiOsszites = JSON.parse(localStorage.getItem("hetiOsszesites")) || {};

// Ha nincs adat, jelezzük
if(Object.keys(hetiOsszites).length===0){
  document.getElementById("pdfTable").innerHTML = "<tr><td colspan='3'>Nincs naplózott adat a héten.</td></tr>";
} else {
  let html="";
  Object.values(hetiOsszites).forEach(t=>{
    html+=`<tr>
<td>${t.nev}</td>
<td>${t.osszeg.toFixed(2)}</td>
<td>${t.fizetett ? "✅":"❌"}</td>
</tr>`;
  });
  document.getElementById("pdfTable").innerHTML = html;
}
</script>

</body>
</html>
