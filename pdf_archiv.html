<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Archív heti fizetés</title>

<style>
body{
font-family:Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid black;
padding:8px;
text-align:center;
}

th{
background:#eee;
}

.info{
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<h2>📁 Archív heti fizetés</h2>

<div class="info" id="hetKezdet"></div>
<div class="info" id="hetZaras"></div>

<table>

<thead>
<tr>
<th>Név</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const crew = localStorage.getItem("crew") || "ordogok";

const data = JSON.parse(
localStorage.getItem("hetiLogPDF_"+crew)
);

if(!data){
alert("Nincs archiv adat!");
}

// hét kezdete
document.getElementById("hetKezdet").innerText =
"📅 Hét kezdete: " + (data.kezdet || "-");

// hét zárása
document.getElementById("hetZaras").innerText =
"🔒 Hét lezárva: " + (data.zaras || "-");

const tabla = document.getElementById("tabla");

// tagok
for(const nev in data.adatok){

const sor = document.createElement("tr");

sor.innerHTML = `
<td>${nev}</td>
<td>${data.adatok[nev].moso}</td>
<td>${data.adatok[nev].craft}</td>
<td>${data.adatok[nev].osszeg}</td>
<td>${data.adatok[nev].fizetett ? "Igen" : "Nem"}</td>
`;

tabla.appendChild(sor);

}

</script>

</body>
</html>
