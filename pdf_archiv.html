<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Archív heti fizetés</title>

<style>
body{
font-family:Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:8px;
text-align:center;
}

th{
background:#eee;
}
</style>

</head>

<body>

<h2>📁 Archív heti fizetés</h2>

<table>

<thead>
<tr>
<th>Név</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const data = JSON.parse(localStorage.getItem("hetiLogPDF"));

if(!data){
alert("Nincs archiv adat!");
}

const tabla = document.getElementById("tabla");

for(const nev in data){

const sor = document.createElement("tr");

sor.innerHTML = `
<td>${nev}</td>
<td>${data[nev].moso}</td>
<td>${data[nev].craft}</td>
<td>${data[nev].osszeg}</td>
<td>${data[nev].kifizetve ? "Igen" : "Nem"}</td>
`;

tabla.appendChild(sor);

}

</script>

</body>
</html>
