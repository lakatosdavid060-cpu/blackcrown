<table>
<thead>
<tr>
<th>Név</th>
<th>Rablás</th>
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
<th>Törlés</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBxFpe6RbhtOFOeUUZye0W7DSpH8EXchIM",
authDomain: "fizetes-cf7b9.firebaseapp.com",
projectId: "fizetes-cf7b9",
storageBucket: "fizetes-cf7b9.firebasestorage.app",
messagingSenderId: "645762765776",
appId: "1:645762765776:web:0e55802957ce13f3fd5fd5"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth();
const db = getFirestore();

let uid=null

window.register=()=>{

createUserWithEmailAndPassword(
auth,
email.value,
password.value
).catch(e=>alert(e.message))

}

window.login=()=>{

signInWithEmailAndPassword(
auth,
email.value,
password.value
).catch(e=>alert(e.message))

}

window.logout=()=>{

signOut(auth)

}

onAuthStateChanged(auth,(user)=>{

if(user){

uid=user.uid

loginBox.style.display="none"
app.style.display="block"

loadMembers()

}else{

loginBox.style.display="block"
app.style.display="none"

}

})

window.addMember=async()=>{

let total = Number(rob.value)+Number(moso.value)+Number(craft.value)

await addDoc(collection(db,"users",uid,"members"),{

name:name.value,
rob:Number(rob.value),
moso:Number(moso.value),
craft:Number(craft.value),
total,
paid:false

})

loadMembers()

}

window.calc=()=>{

alert("Összeg automatikusan számolva hozzáadáskor")

}

window.resetWeek=async()=>{

if(!confirm("Biztos törlöd a hetet?"))return

const snap=await getDocs(collection(db,"users",uid,"members"))

for(const d of snap.docs){

await deleteDoc(doc(db,"users",uid,"members",d.id))

}

loadMembers()

}

window.togglePaid=async(id,current)=>{

await updateDoc(doc(db,"users",uid,"members",id),{

paid:!current

})

loadMembers()

}

window.remove=async(id)=>{

await deleteDoc(doc(db,"users",uid,"members",id))

loadMembers()

}

window.loadMembers=async()=>{

table.innerHTML=""

let searchText=search.value?.toLowerCase()||""

const snap=await getDocs(collection(db,"users",uid,"members"))

snap.forEach(d=>{

let data=d.data()

if(!data.name.toLowerCase().includes(searchText))return

table.innerHTML+=`

<tr>

<td>${data.name}</td>
<td>${data.rob}</td>
<td>${data.moso}</td>
<td>${data.craft}</td>
<td>${data.total}</td>

<td>
<button onclick="togglePaid('${d.id}',${data.paid})"
class="${data.paid?'green':'red'}">
${data.paid?'✔':'❌'}
</button>
</td>

<td>
<button onclick="remove('${d.id}')" class="red">❌</button>
</td>

</tr>

`

})

}

</script>
</body>
</html>
