<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mega AI</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
}

#chat{
padding:15px;
height:70vh;
overflow:auto;
}

.user{
background:#2563eb;
padding:10px;
border-radius:10px;
margin:10px;
max-width:70%;
margin-left:auto;
}

.ai{
background:#334155;
padding:10px;
border-radius:10px;
margin:10px;
max-width:70%;
}

.inputBox{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
padding:10px;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
}

button{
margin-left:10px;
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div class="header">
🤖 Mega AI
<button onclick="clearChat()">Chat törlés</button>
</div>

<div id="chat"></div>

<div class="inputBox">

<input id="input" placeholder="Írj valamit...">

<button onclick="sendMessage()">Küld</button>

</div>

<script src="ai.js"></script>

<script>

function clearChat(){
document.getElementById("chat").innerHTML="";
}

</script>

</body>
</html>
