<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Assistant ULTRA</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

#chat{
height:420px;
overflow:auto;
background:#020617;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
padding:10px;
margin:10px 0;
border-radius:10px;
}

.user{
background:#2563eb;
text-align:right;
}

.ai{
background:#374151;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:60%;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
margin:3px;
}

button:hover{
background:#1d4ed8;
}

#image{
max-width:100%;
margin-top:20px;
border-radius:10px;
}

.light{
background:#f1f5f9;
color:black;
}

.light #chat{
background:white;
}

</style>

</head>

<body>

<header>AI Assistant ULTRA</header>

<div class="container">

<div id="chat"></div>

<input id="text" placeholder="Írj üzenetet...">

<button onclick="send()">Küldés</button>
<button onclick="voice()">🎤</button>
<button onclick="theme()">🌙</button>

<br><br>

<button onclick="generateImage()">Kép generálás</button>
<button onclick="speakLast()">🔊 Felolvasás</button>
<button onclick="clearChat()">Chat törlés</button>

<br><br>

<input type="file" id="file">

<img id="image">

</div>

<script>

const chat = document.getElementById("chat")

function add(text,cls){

let div=document.createElement("div")

div.className="msg "+cls

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

save()

}

async function send(){

let input=document.getElementById("text")

let msg=input.value

if(!msg)return

add(msg,"user")

input.value=""

add("AI gondolkodik...","ai")

try{

let r = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer API_KEY"
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})

})

let data=await r.json()

let reply=data.choices[0].message.content

chat.lastChild.remove()

add(reply,"ai")

}catch{

chat.lastChild.innerText="AI hiba"

}

}

function generateImage(){

let prompt=document.getElementById("text").value

if(!prompt)return

document.getElementById("image").src=
"https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)

}

function voice(){

let rec=new webkitSpeechRecognition()

rec.lang="hu-HU"

rec.start()

rec.onresult=function(e){

document.getElementById("text").value=e.results[0][0].transcript

}

}

function speakLast(){

let msgs=document.querySelectorAll(".ai")

if(!msgs.length)return

let text=msgs[msgs.length-1].innerText

let speech=new SpeechSynthesisUtterance(text)

speech.lang="hu-HU"

speechSynthesis.speak(speech)

}

function theme(){

document.body.classList.toggle("light")

}

function save(){

localStorage.setItem("chat",chat.innerHTML)

}

function load(){

chat.innerHTML=localStorage.getItem("chat")||""

}

function clearChat(){

chat.innerHTML=""

save()

}

document.getElementById("file").addEventListener("change",function(){

let file=this.files[0]

if(!file)return

add("Feltöltve: "+file.name,"user")

})

load()

</script>

</body>

</html>
