<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A mi történetünk ❤️</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, sans-serif;
      color:white;
      overflow-x:hidden;
      background:
        linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.28)),
        linear-gradient(135deg,#ff6b9a,#ffc1d6);
    }

    .page{
      width:100%;
      max-width:1100px;
      margin:0 auto;
      padding:20px 14px 40px;
      position:relative;
      z-index:2;
    }

    .card{
      background:rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.22);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-radius:28px;
      padding:24px 18px;
      box-shadow:0 18px 50px rgba(0,0,0,0.22);
      margin-bottom:18px;
    }

    h1,h2,p{
      margin:0;
    }

    .center{
      text-align:center;
    }

    .title{
      font-size:36px;
      margin-bottom:10px;
    }

    .sub{
      font-size:17px;
      opacity:0.96;
      margin-bottom:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:18px;
    }

    .box{
      background:rgba(255,255,255,0.14);
      border-radius:20px;
      padding:18px 10px;
      text-align:center;
    }

    .num{
      font-size:34px;
      font-weight:bold;
      display:block;
      margin-bottom:6px;
    }

    .label{
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .message{
      margin-top:22px;
      font-size:23px;
      font-weight:bold;
      line-height:1.45;
      text-align:center;
    }

    .next-anniversary{
      margin-top:16px;
      font-size:17px;
      text-align:center;
      line-height:1.5;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    button, input{
      border:none;
      border-radius:999px;
      padding:12px 16px;
      font-size:15px;
    }

    button{
      background:white;
      color:#ff4f84;
      font-weight:bold;
      cursor:pointer;
    }

    button:active{
      transform:scale(0.97);
    }

    input{
      background:rgba(255,255,255,0.95);
      color:#222;
      width:100%;
      max-width:240px;
    }

    .big-heart{
      margin-top:16px;
      text-align:center;
      font-size:58px;
      cursor:pointer;
      user-select:none;
      transition:transform .2s;
    }

    .big-heart:hover{
      transform:scale(1.08);
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-bottom:16px;
    }

    .draw-wrap{
      background:white;
      border-radius:22px;
      padding:10px;
      overflow:hidden;
    }

    canvas{
      width:100%;
      height:420px;
      display:block;
      background:white;
      border-radius:16px;
      touch-action:none;
    }

    .info{
      margin-top:12px;
      text-align:center;
      font-size:14px;
      opacity:0.95;
      line-height:1.5;
    }

    .footer{
      text-align:center;
      margin-top:14px;
      font-size:13px;
      opacity:0.9;
    }

    .heart{
      position:fixed;
      top:-10vh;
      z-index:1;
      pointer-events:none;
      animation:fall linear forwards;
      text-shadow:0 3px 8px rgba(0,0,0,0.25);
    }

    @keyframes fall{
      to{
        transform:translateY(120vh) rotate(360deg);
      }
    }

    .flash{
      animation:flashAnim .5s ease;
    }

    @keyframes flashAnim{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.05); }
      100%{ transform:scale(1); }
    }

    @media(min-width:760px){
      .grid{
        grid-template-columns:repeat(4,1fr);
      }
    }

  #loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff6b9a,#ffc1d6);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
transition:opacity .8s;
}

.loader-box{
text-align:center;
color:white;
}

.loader-heart{
font-size:70px;
animation:heartBeat 1.2s infinite;
}

@keyframes heartBeat{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

.loader-bar{
width:220px;
height:10px;
background:rgba(255,255,255,0.4);
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.loader-progress{
height:100%;
width:0%;
background:white;
animation:loadBar 2s forwards;
}

@keyframes loadBar{
0%{width:0;}
100%{width:100%;}
}

.loader-heart-fall{
position:fixed;
top:-20px;
font-size:20px;
animation:heartFall linear forwards;
}

@keyframes heartFall{
to{
transform:translateY(110vh);
}
}
  </style>
</head>
<body>
  <div id="loader">

  <div class="loader-box">

    <div class="loader-heart">❤️</div>

    <h2>A mi történetünk</h2>

    <p>Betöltés...</p>

    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>

  </div>

</div>
  
  <div class="page">

    <div class="card">
      <div class="center">
        <h1 class="title">❤️ A mi történetünk ❤️</h1>
        <p class="sub">2023.12.28 óta együtt</p>
      </div>

      <div class="grid">
        <div class="box">
          <span class="num" id="days">0</span>
          <span class="label">nap</span>
        </div>
        <div class="box">
          <span class="num" id="hours">0</span>
          <span class="label">óra</span>
        </div>
        <div class="box">
          <span class="num" id="minutes">0</span>
          <span class="label">perc</span>
        </div>
        <div class="box">
          <span class="num" id="seconds">0</span>
          <span class="label">másodperc</span>
        </div>
      </div>

      <div class="message" id="loveMessage">Szeretlek mindennél jobban ❤️</div>
      <div class="next-anniversary" id="anniversaryText"></div>

      <div class="big-heart" onclick="heartClick()">💖</div>

      <div class="buttons">
        <button onclick="nextMessage()">💌 Új üzenet</button>
      </div>

      <div class="footer">Készítve szeretetből ❤️</div>
    </div>

    <div class="card">
      <div class="center">
        <h2 style="margin-bottom:12px;">🎨 Közös rajzolás élőben</h2>
      </div>

      <div class="topbar">
        <input id="roomId" value="mi-szobank" placeholder="Szoba neve">
        <button id="joinBtn">Csatlakozás</button>
        <button id="clearBtn">Törlés</button>
        <button id="saveBtn">Mentés</button>
      </div>

      <div class="draw-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <div class="info">
        Ugyanazzal a szobanévvel megnyitva mindkettőtöknél ugyanaz a rajz fog látszani élőben. 💖
      </div>
    </div>

  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    set,
    onChildAdded,
    onValue,
    remove,
    off
  } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
    authDomain: "ordog-fizetes.firebaseapp.com",
    databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ordog-fizetes",
    storageBucket: "ordog-fizetes.firebasestorage.app",
    messagingSenderId: "672089263660",
    appId: "1:672089263660:web:70086de26402ceb3464b89"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const startDate = new Date("2023-12-28T00:00:00");

  const messages = [
    "Szeretlek mindennél jobban ❤️",
    "Veled minden nap a kedvenc napom 💖",
    "Te vagy a legszebb része az életemnek ✨",
    "Melletted még az idő is szebben telik 🥰",
    "Te vagy az én kedvenc történetem 💌",
    "Bárhol is vagy, ott van az otthonom ❤️"
  ];

  let msgIndex = 0;

  function updateTimer() {
    const now = new Date();
    let diff = now - startDate;

    if (diff < 0) diff = 0;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    updateAnniversary(now);
  }

  function updateAnniversary(now) {
    let next = new Date(now.getFullYear(), 11, 28, 0, 0, 0);

    if (now > next) {
      next = new Date(now.getFullYear() + 1, 11, 28, 0, 0, 0);
    }

    const diff = next - now;
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    const yearCount = next.getFullYear() - 2023;

    document.getElementById("anniversaryText").innerHTML =
      `A következő, <b>${yearCount}. évfordulóig</b> még ${d} nap, ${h} óra, ${m} perc és ${s} másodperc van.`;
  }

  window.nextMessage = function () {
    msgIndex++;
    if (msgIndex >= messages.length) {
      msgIndex = 0;
    }

    const el = document.getElementById("loveMessage");
    el.textContent = messages[msgIndex];
    el.classList.remove("flash");
    void el.offsetWidth;
    el.classList.add("flash");
  };

  function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = Math.random() > 0.5 ? "❤️" : "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (16 + Math.random() * 24) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 8500);
  }

  window.heartClick = function () {
    for (let i = 0; i < 16; i++) {
      setTimeout(createHeart, i * 70);
    }
    window.nextMessage();
  };

  setInterval(createHeart, 350);
  updateTimer();
  setInterval(updateTimer, 1000);

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const roomInput = document.getElementById("roomId");
  const joinBtn = document.getElementById("joinBtn");
  const clearBtn = document.getElementById("clearBtn");

  const clientId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());

  let currentRoom = roomInput.value.trim() || "mi-szobank";
  let segmentsRef = null;
  let metaRef = null;

  let drawing = false;
  let lastPoint = null;

  let childAddedCb = null;
  let metaCb = null;

  function setupCanvas() {
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#ff4f84";

    clearLocalCanvas();
  }

  function clearLocalCanvas() {
    const rect = canvas.getBoundingClientRect();
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, rect.width, rect.height);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top
    };
  }

  function drawSegment(seg) {
    if (!seg) return;

    ctx.strokeStyle = seg.color || "#ff4f84";
    ctx.lineWidth = seg.width || 3;
    ctx.beginPath();
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
    ctx.stroke();
  }

  async function redrawAll() {
    if (!segmentsRef) return;

    clearLocalCanvas();

    const snapshot = await new Promise((resolve) => {
      onValue(segmentsRef, resolve, { onlyOnce: true });
    });

    const data = snapshot.val();
    if (!data) return;

    Object.values(data).forEach(drawSegment);
  }

  function detachRoomListeners() {
    if (segmentsRef && childAddedCb) {
      off(segmentsRef, "child_added", childAddedCb);
    }
    if (metaRef && metaCb) {
      off(metaRef, "value", metaCb);
    }
    childAddedCb = null;
    metaCb = null;
  }

  async function joinRoom() {
    currentRoom = roomInput.value.trim() || "mi-szobank";

    detachRoomListeners();

    segmentsRef = ref(db, "liveDrawRooms/" + currentRoom + "/segments");
    metaRef = ref(db, "liveDrawRooms/" + currentRoom + "/meta");

    await redrawAll();

    childAddedCb = (snapshot) => {
      const seg = snapshot.val();
      drawSegment(seg);
    };

    metaCb = (snapshot) => {
      const meta = snapshot.val();
      if (meta && meta.clearedAt) {
        redrawAll();
      }
    };

    onChildAdded(segmentsRef, childAddedCb);
    onValue(metaRef, metaCb);
  }

  async function sendSegment(from, to) {
    if (!segmentsRef) return;

    const segRef = push(segmentsRef);
    await set(segRef, {
      x1: from.x,
      y1: from.y,
      x2: to.x,
      y2: to.y,
      color: "#ff4f84",
      width: 3,
      by: clientId,
      createdAt: Date.now()
    });
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    lastPoint = getPos(e);
  }

  async function moveDraw(e) {
    if (!drawing) return;
    e.preventDefault();

    const newPoint = getPos(e);

    drawSegment({
      x1: lastPoint.x,
      y1: lastPoint.y,
      x2: newPoint.x,
      y2: newPoint.y,
      color: "#ff4f84",
      width: 3
    });

    await sendSegment(lastPoint, newPoint);

    lastPoint = newPoint;
  }

  function endDraw() {
    drawing = false;
    lastPoint = null;
  }

  async function clearCanvasForEveryone() {
    if (!segmentsRef || !metaRef) return;

    await remove(segmentsRef);
    await set(metaRef, {
      clearedAt: Date.now(),
      by: clientId
    });

    clearLocalCanvas();
  }

  canvas.addEventListener("mousedown", startDraw);
  canvas.addEventListener("mousemove", moveDraw);
  canvas.addEventListener("mouseup", endDraw);
  canvas.addEventListener("mouseleave", endDraw);

  canvas.addEventListener("touchstart", startDraw, { passive: false });
  canvas.addEventListener("touchmove", moveDraw, { passive: false });
  canvas.addEventListener("touchend", endDraw);

  joinBtn.addEventListener("click", joinRoom);
  clearBtn.addEventListener("click", clearCanvasForEveryone);

  window.addEventListener("resize", async () => {
    setupCanvas();
    await redrawAll();
  });

  setupCanvas();
  joinRoom();

  // loader eltűnés
window.addEventListener("load",()=>{

setTimeout(()=>{

const loader=document.getElementById("loader");

loader.style.opacity="0";

setTimeout(()=>{
loader.style.display="none";
},800);

},2200);

});

// hulló szívek loader alatt

function loaderHeart(){

const heart=document.createElement("div");

heart.className="loader-heart-fall";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*15+15)+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(loaderHeart,250);
</script>
</body>
</html>
