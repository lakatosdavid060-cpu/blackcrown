<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini GTA Engine v2</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#controls{
position:fixed;
bottom:20px;
left:20px;
}

.btn{
width:60px;
height:60px;
background:rgba(255,255,255,0.25);
border-radius:10px;
margin:5px;
display:inline-block;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hud">
💰 <span id="money">0</span><br>
⭐ Wanted: <span id="wanted">0</span>
</div>

<div id="controls">
<div class="btn" id="up"></div>
<div class="btn" id="left"></div>
<div class="btn" id="right"></div>
<div class="btn" id="down"></div>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function mobile(id,key){
document.getElementById(id).ontouchstart=()=>keys[key]=true
document.getElementById(id).ontouchend=()=>keys[key]=false
}

mobile("up","w")
mobile("down","s")
mobile("left","a")
mobile("right","d")

let worldSize=9000

let camera={x:0,y:0}

let player={
x:4500,
y:4500,
speed:3,
inCar:false,
car:null
}

let cars=[]
let npcs=[]
let police=[]
let bullets=[]
let explosions=[]
let buildings=[]
let roads=[]
let shops=[]
let missions=[]

let money=0
let wanted=0

function hud(){
document.getElementById("money").innerText=money
document.getElementById("wanted").innerText=wanted
}

for(let i=0;i<100;i++){

cars.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
speed:Math.random()*2,
dir:Math.random()*Math.PI*2
})

}

for(let i=0;i<400;i++){

npcs.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize
})

}

for(let i=0;i<400;i++){

buildings.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
w:80+Math.random()*120,
h:80+Math.random()*120
})

}

for(let i=0;i<80;i++){

roads.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
w:800,
h:40
})

}

for(let i=0;i<10;i++){

shops.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize
})

}

for(let i=0;i<5;i++){

missions.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize
})

}

function shoot(){

bullets.push({
x:player.x,
y:player.y,
dx:Math.random()*8-4,
dy:Math.random()*8-4
})

}

document.addEventListener("click",shoot)

function updateBullets(){

bullets.forEach(b=>{
b.x+=b.dx
b.y+=b.dy

cars.forEach(car=>{
let d=Math.hypot(car.x-b.x,car.y-b.y)

if(d<20){

explosions.push({x:car.x,y:car.y,time:20})
wanted=2

}

})

})

}

function updateExplosions(){

explosions.forEach(e=>{
e.time--
})

explosions=explosions.filter(e=>e.time>0)

}

function updatePlayer(){

if(player.inCar){

let car=player.car

if(keys["w"]) car.speed+=0.2
if(keys["s"]) car.speed-=0.2
if(keys["a"]) car.dir-=0.05
if(keys["d"]) car.dir+=0.05

car.x+=Math.cos(car.dir)*car.speed
car.y+=Math.sin(car.dir)*car.speed

player.x=car.x
player.y=car.y

return
}

if(keys["w"]) player.y-=player.speed
if(keys["s"]) player.y+=player.speed
if(keys["a"]) player.x-=player.speed
if(keys["d"]) player.x+=player.speed

}

document.addEventListener("keydown",e=>{

if(e.key==="e"){

cars.forEach(car=>{

let d=Math.hypot(player.x-car.x,player.y-car.y)

if(d<40){

player.inCar=true
player.car=car

}

})

}

})

function updateCars(){

cars.forEach(car=>{

if(player.car===car) return

car.x+=Math.cos(car.dir)*car.speed
car.y+=Math.sin(car.dir)*car.speed

if(Math.random()<0.01) car.dir+=Math.random()-0.5

})

}

function updateNPC(){

npcs.forEach(n=>{

if(Math.random()<0.02){

n.x+=Math.random()*10-5
n.y+=Math.random()*10-5

}

})

}

function updatePolice(){

if(wanted>0){

if(police.length<wanted*4){

police.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize
})

}

}

police.forEach(p=>{

let dx=player.x-p.x
let dy=player.y-p.y
let dist=Math.hypot(dx,dy)

if(dist<800){

p.x+=dx*0.03
p.y+=dy*0.03

}

})

}

function updateShops(){

shops.forEach(s=>{

let d=Math.hypot(player.x-s.x,player.y-s.y)

if(d<40){

money+=1

}

})

}

function updateMissions(){

missions.forEach(m=>{

let d=Math.hypot(player.x,m.x,player.y,m.y)

if(d<40){

money+=100

}

})

}

let weather="sun"

function updateWeather(){

if(Math.random()<0.0005){
weather=weather==="sun"?"rain":"sun"
}

}

let time=0

function updateTime(){
time+=0.001
}

function cameraUpdate(){

camera.x=player.x-canvas.width/2
camera.y=player.y-canvas.height/2

}

function drawWorld(){

ctx.fillStyle="#2e8b57"
ctx.fillRect(-camera.x,-camera.y,worldSize,worldSize)

}

function drawRoads(){

ctx.fillStyle="#555"

roads.forEach(r=>{
ctx.fillRect(r.x-camera.x,r.y-camera.y,r.w,r.h)
})

}

function drawBuildings(){

ctx.fillStyle="#999"

buildings.forEach(b=>{
ctx.fillRect(b.x-camera.x,b.y-camera.y,b.w,b.h)
})

}

function drawCars(){

ctx.fillStyle="blue"

cars.forEach(c=>{
ctx.fillRect(c.x-camera.x,c.y-camera.y,30,15)
})

}

function drawNPC(){

ctx.fillStyle="yellow"

npcs.forEach(n=>{
ctx.fillRect(n.x-camera.x,n.y-camera.y,12,12)
})

}

function drawPolice(){

ctx.fillStyle="white"

police.forEach(p=>{
ctx.fillRect(p.x-camera.x,p.y-camera.y,18,18)
})

}

function drawPlayer(){

if(player.inCar) return

ctx.fillStyle="red"
ctx.fillRect(player.x-camera.x,player.y-camera.y,18,18)

}

function drawBullets(){

ctx.fillStyle="orange"

bullets.forEach(b=>{
ctx.fillRect(b.x-camera.x,b.y-camera.y,4,4)
})

}

function drawExplosions(){

ctx.fillStyle="orange"

explosions.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x-camera.x,e.y-camera.y,30,0,Math.PI*2)
ctx.fill()
})

}

function drawShops(){

ctx.fillStyle="green"

shops.forEach(s=>{
ctx.fillRect(s.x-camera.x,s.y-camera.y,20,20)
})

}

function drawMissions(){

ctx.fillStyle="purple"

missions.forEach(m=>{
ctx.fillRect(m.x-camera.x,m.y-camera.y,20,20)
})

}

function drawWeather(){

if(weather==="rain"){

ctx.fillStyle="rgba(0,0,255,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

}

}

function drawNight(){

let dark=(Math.sin(time)+1)/2

ctx.fillStyle="rgba(0,0,0,"+(dark*0.6)+")"
ctx.fillRect(0,0,canvas.width,canvas.height)

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

updatePlayer()
updateCars()
updateNPC()
updatePolice()
updateBullets()
updateExplosions()
updateShops()
updateMissions()
updateWeather()
updateTime()
cameraUpdate()
hud()

drawWorld()
drawRoads()
drawBuildings()
drawCars()
drawNPC()
drawPolice()
drawBullets()
drawExplosions()
drawShops()
drawMissions()
drawPlayer()
drawWeather()
drawNight()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
