<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GTA RP Rablás Panel</title>

<style>
body{
  font-family:Arial;
  background:#0e0e0e;
  color:white;
  padding:20px;
}
h1{
  text-align:center;
  color:#00ff88;
}
.container{
  max-width:1100px;
  margin:auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}
select,input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}
button{
  cursor:pointer;
  font-weight:bold;
}
.admin-btn{background:#ff4444;color:white;}
.join{background:#007bff;color:white;}
.leave{background:#666;color:white;}
.activate{background:orange;}
.card{
  background:#2b2b2b;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border-left:5px solid #00ff88;
}
.active-card{
  border-left:5px solid red;
}
.members{
  font-size:14px;
  margin-top:6px;
  color:#ccc;
}
.hidden{display:none;}
.section{margin-top:25px;}
.member-item{
  background:#2b2b2b;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
}
hr{margin:20px 0;border:1px solid #333;}
</style>
</head>

<body>

<h1>💰 GTA RP Rablás Rendszer</h1>

<div class="container">

<button onclick="adminLogin()">👑 Admin</button>

<div id="adminPanel" class="hidden">

<h3>ADMIN PANEL</h3>

<input type="text" id="newMemberName" placeholder="Új tag neve">
<button class="admin-btn" onclick="addMember()">Tag hozzáadása</button>

<h4>Tag törlés</h4>
<select id="deleteMemberSelect"></select>
<button class="admin-btn" onclick="deleteMember()">Tag törlése</button>

<h4>📋 Jelenlegi tagok</h4>
<div id="memberList"></div>

</div>

<hr>

<h3>👤 Aktuális játékos</h3>
<select id="currentUser"></select>

<h3>🏦 Új rablás létrehozása</h3>
<select id="location">
<option>Állami Bank</option>
<option>Paleto Bank</option>
<option>Múzeum</option>
<option>Bobcat</option>
<option>Maffia Ház</option>
<option>Híresség Ház</option>
</select>

<input type="time" id="time">
<button onclick="createRoom()">Szoba létrehozása</button>

<div class="section">
<h3>🔴 Aktív rablások</h3>
<div id="activeRooms"></div>
</div>

<div class="section">
<h3>📋 Tervezett rablások</h3>
<div id="rooms"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  doc,
  arrayUnion,
  arrayRemove
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* 🔥 A TE FIREBASE PROJEKTED */
const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  projectId: "ordog-fizetes",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userSelect = document.getElementById("currentUser");
const deleteMemberSelect = document.getElementById("deleteMemberSelect");

let isAdmin = false;

/* ================= ADMIN ================= */

window.adminLogin = ()=>{
  const pass = prompt("Admin jelszó:");
  if(pass === "rpadmin123"){
    isAdmin = true;
    document.getElementById("adminPanel").classList.remove("hidden");
    alert("Admin mód aktiválva");
  }else{
    alert("Hibás jelszó");
  }
};

/* ================= TAGOK ================= */

onSnapshot(collection(db,"members"), snapshot=>{
  userSelect.innerHTML = "";
  deleteMemberSelect.innerHTML = "";
  document.getElementById("memberList").innerHTML = "";

  snapshot.forEach(docSnap=>{
    const name = docSnap.data().name;

    const opt = document.createElement("option");
    opt.value = name;
    opt.innerText = name;
    userSelect.appendChild(opt);

    const opt2 = document.createElement("option");
    opt2.value = docSnap.id;
    opt2.innerText = name;
    deleteMemberSelect.appendChild(opt2);

    const div = document.createElement("div");
    div.className="member-item";
    div.innerText=name;
    document.getElementById("memberList").appendChild(div);
  });
});

window.addMember = async ()=>{
  if(!isAdmin) return alert("Nem vagy admin!");
  const name = document.getElementById("newMemberName").value;
  if(!name) return alert("Adj meg nevet!");
  await addDoc(collection(db,"members"),{ name });
  document.getElementById("newMemberName").value="";
};

window.deleteMember = async ()=>{
  if(!isAdmin) return alert("Nem vagy admin!");
  const id = deleteMemberSelect.value;
  await deleteDoc(doc(db,"members",id));
};

/* ================= SZOBÁK ================= */

window.createRoom = async ()=>{
  const leader = userSelect.value;
  const location = document.getElementById("location").value;
  const time = document.getElementById("time").value;

  if(!leader) return alert("Válassz játékost!");

  await addDoc(collection(db,"rooms"),{
    leader,
    location,
    time,
    members:[leader],
    active:false
  });
};

onSnapshot(collection(db,"rooms"), snapshot=>{
  const activeContainer = document.getElementById("activeRooms");
  const container = document.getElementById("rooms");

  activeContainer.innerHTML="";
  container.innerHTML="";

  snapshot.forEach(docSnap=>{
    const room = docSnap.data();
    const id = docSnap.id;
    const currentUser = userSelect.value;

    const div = document.createElement("div");
    div.className = room.active ? "card active-card":"card";

    div.innerHTML = `
      <strong>Vezető: ${room.leader}</strong><br>
      📍 ${room.location}<br>
      🕒 ${room.time || "nincs idő"}<br>
      <div class="members">👥 ${room.members.join(", ")}</div>
    `;

    if(!room.members.includes(currentUser)){
      const joinBtn=document.createElement("button");
      joinBtn.className="join";
      joinBtn.innerText="Csatlakozom";
      joinBtn.onclick=()=>joinRoom(id,currentUser);
      div.appendChild(joinBtn);
    }

    if(room.members.includes(currentUser) && currentUser!==room.leader){
      const leaveBtn=document.createElement("button");
      leaveBtn.className="leave";
      leaveBtn.innerText="Kilépés";
      leaveBtn.onclick=()=>leaveRoom(id,currentUser);
      div.appendChild(leaveBtn);
    }

    if(currentUser===room.leader){
      const activateBtn=document.createElement("button");
      activateBtn.className="activate";
      activateBtn.innerText="Aktívra tesz";
      activateBtn.onclick=()=>activateRoom(id);
      div.appendChild(activateBtn);
    }

    if(currentUser===room.leader || isAdmin){
      const delBtn=document.createElement("button");
      delBtn.className="admin-btn";
      delBtn.innerText="Törlés";
      delBtn.onclick=()=>deleteRoom(id);
      div.appendChild(delBtn);
    }

    if(room.active){
      activeContainer.appendChild(div);
    } else {
      container.appendChild(div);
    }

  });
});

window.joinRoom = async(id,user)=>{
  await updateDoc(doc(db,"rooms",id),{
    members:arrayUnion(user)
  });
};

window.leaveRoom = async(id,user)=>{
  await updateDoc(doc(db,"rooms",id),{
    members:arrayRemove(user)
  });
};

window.activateRoom = async(id)=>{
  await updateDoc(doc(db,"rooms",id),{
    active:true
  });
};

window.deleteRoom = async(id)=>{
  await deleteDoc(doc(db,"rooms",id));
};

</script>

</body>
</html>
