<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heti Fizetés</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;margin:0;}
h2{color:#38bdf8;}
button{padding:4px 8px;margin:2px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
table{border-collapse:collapse;width:100%;color:white;margin-top:10px;}
th, td{border:1px solid #fff;padding:4px;text-align:center;font-size:14px;}
.helpContent{display:none;background:#334155;color:white;padding:12px;border-radius:6px;margin-top:5px;line-height:1.5;}
.icon-panel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.icon-panel button{flex:1;padding:6px;}
input[type="number"], input[type="password"], input[type="text"]{width:120px;padding:4px;border-radius:6px;border:none;}
</style>
</head>
<body>

<div id="loginModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#1e293b;padding:25px;border-radius:10px;text-align:center;width:300px;">
    <h3 style="margin-top:0;">🔐 Admin Bejelentkezés</h3>
    <input type="password" id="modalPass" placeholder="Jelszó" style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">
    <button onclick="modalLogin()" style="width:100%;padding:8px;background:#16a34a;color:white;border:none;border-radius:6px;font-weight:bold;">Belépés</button>
  </div>
</div>

<h2>💰 Heti Fizetés</h2>

<button onclick="logout()" style="background:#dc2626;color:white;padding:6px 12px;border:none;border-radius:6px;margin-bottom:10px;font-weight:bold;">🚪 Kilépés</button>

<div style="margin-bottom:10px;">
<input type="text" id="ujTagNev" placeholder="Új tag neve" style="width:180px;">
<button onclick="ujTag()" class="green">➕ Hozzáadás</button>
</div>

<div class="icon-panel">
  <button onclick="szamol()">🧮 Számol</button>
  <button onclick="mentNap()">💾 Naplóz</button>
  <button onclick="openPDF()">📄 PDF</button>
  <button onclick="nullazHetiLog()">♻️ Heti nullázás</button>
  <button onclick="nullazFoMenu()">🧹 Főmenü nullázás</button>
</div>

<!-- DINAMIKUS RABLÁS INPUTOK -->
<div id="rablasInputs" style="margin-bottom:10px;"></div>

<div id="summary"></div>

<table>
<thead>
<tr id="tableHeadRow">
<th>Tag</th>
</tr>
</thead>
<tbody id="tagokTable"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:70086de26402ceb3464b89"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const adatRef = ref(db, "aktualisAdatok");
const hetiRef = ref(db, "hetiOsszesites");

let admin=false;
const ADMIN_JELSZO="1234";

document.addEventListener("DOMContentLoaded",()=>{
if(localStorage.getItem("adminLogged")==="true"){
admin=true;
document.getElementById("loginModal").style.display="none";
}
});

window.modalLogin=function(){
const pass=document.getElementById("modalPass").value;
if(pass===ADMIN_JELSZO){
admin=true;
localStorage.setItem("adminLogged","true");
document.getElementById("loginModal").style.display="none";
}else alert("Hibás jelszó!");
};

window.logout=function(){
admin=false;
localStorage.removeItem("adminLogged");
location.reload();
};

function adminCheck(){
if(!admin){alert("Admin jogosultság szükséges!");return false;}
return true;
}

/* ===== DINAMIKUS RABLÁS DEFINÍCIÓ ===== */
const RABLÁSOK = [
  { id:"paleto", label:"Paleto" },
  { id:"allami", label:"Állami" },
  { id:"muzeum", label:"Múzeum" },
  { id:"bobcat", label:"Bobcat" },
  { id:"maffia", label:"Maffia ház" },
  { id:"kaszino", label:"Kaszino" },
  { id:"hiresseghaz", label:"Híresség ház" }
];

/* ===== INPUTOK GENERÁLÁSA ===== */
const inputContainer = document.getElementById("rablasInputs");
RABLÁSOK.forEach(r=>{
  inputContainer.innerHTML += `${r.label} $ <input type="number" id="${r.id}"> `;
});

/* ===== TÁBLÁZAT FEJLÉC ===== */
const headRow = document.getElementById("tableHeadRow");
RABLÁSOK.forEach(r=>{
  headRow.innerHTML += `<th>${r.label}</th>`;
});
headRow.innerHTML += `
<th>Mosó</th>
<th>Craft</th>
<th>Összeg</th>
<th>Kifizetve</th>
<th>Törlés</th>
`;

let adatok=[];
let hetiOsszesites={};

function ujRablasObj(){
  let obj = {};
  RABLÁSOK.forEach(r=>{
    obj[r.id] = false;
  });
  return obj;
}

function ujTag(){
  if(!adminCheck()) return;
  const nev = document.getElementById("ujTagNev").value.trim();
  if(!nev) return;

  adatok.push({
    nev,
    moso:0,
    craft:0,
    fizetett:false,
    osszeg:0,
    rablas:ujRablasObj()
  });

  document.getElementById("ujTagNev").value="";
  mentes();
  render();
}

window.toggleRablas=(i,id)=>{
  if(!adminCheck()) return;
  adatok[i].rablas[id]=!adatok[i].rablas[id];
  mentes();
  render();
};

window.addMoso=i=>{
  if(!adminCheck()) return;
  adatok[i].moso++;
  mentes();
  render();
};

window.minusMoso=i=>{
  if(!adminCheck()) return;
  if(adatok[i].moso>0) adatok[i].moso--;
  mentes();
  render();
};

window.addCraft=i=>{
  if(!adminCheck()) return;
  adatok[i].craft++;
  mentes();
  render();
};

window.minusCraft=i=>{
  if(!adminCheck()) return;
  if(adatok[i].craft>0) adatok[i].craft--;
  mentes();
  render();
};

window.toggleFizetett=i=>{
  if(!adminCheck()) return;
  adatok[i].fizetett=!adatok[i].fizetett;
  mentes();
  render();
};

window.torolTag=i=>{
  if(!adminCheck()) return;
  adatok.splice(i,1);
  mentes();
  render();
};

window.szamol=function(){

  let osszegek={};
  RABLÁSOK.forEach(r=>{
    osszegek[r.id] = +document.getElementById(r.id).value || 0;
  });

  let resztvevok={};
  RABLÁSOK.forEach(r=>{
    resztvevok[r.id] = adatok.filter(t=>t.rablas[r.id]).length;
  });

  adatok.forEach(t=>{
    let resz=0;

    RABLÁSOK.forEach(r=>{
      if(resztvevok[r.id] > 0 && t.rablas[r.id]){
        resz += ((osszegek[r.id]/2)/resztvevok[r.id])*0.82;
      }
    });

    t.osszeg = resz + t.moso*250 + t.craft*250;
  });

  mentes();
  render();
};

/* ===== FIREBASE ===== */

function mentes(){
  set(adatRef, adatok);
}

onValue(adatRef, snapshot=>{
  const data = snapshot.val();
  if(data){
    adatok=data;
    render();
  }
}); /* ===== RENDER ===== */

function render(){

  let total=adatok.reduce((s,t)=>s+(t.osszeg||0),0);
  document.getElementById("summary").innerHTML="💵 Összes kiosztva: "+total.toFixed(2)+" $";

  let html="";

  adatok.forEach((t,i)=>{
    html+=`<tr>
<td>${t.nev}</td>`;

    RABLÁSOK.forEach(r=>{
      if(!t.rablas) t.rablas=ujRablasObj();
      html+=`<td>
      <input type="checkbox"
      ${t.rablas[r.id]?'checked':''}
      onclick="toggleRablas(${i},'${r.id}')">
      </td>`;
    });

    html+=`
<td>
<button onclick="minusMoso(${i})">−</button>
<button onclick="addMoso(${i})">+250</button>
${t.moso||0}
</td>

<td>
<button onclick="minusCraft(${i})">−</button>
<button onclick="addCraft(${i})">+250</button>
${t.craft||0}
</td>

<td>${(t.osszeg||0).toFixed(2)}</td>

<td>
<button class="${t.fizetett?'green':'red'}"
onclick="toggleFizetett(${i})">
${t.fizetett?'✅':'❌'}
</button>
</td>

<td>
<button class="red" onclick="torolTag(${i})">❌</button>
</td>

</tr>`;
  });

  document.getElementById("tagokTable").innerHTML=html;
}

/* ===== HETI NAPLÓ ===== */

window.mentNap=function(){
  if(!adminCheck()) return;

  const osszes = adatok.reduce((s,t)=>s+(t.osszeg||0),0);

  hetiOsszesites = {
    datum: new Date().toLocaleString(),
    osszes,
    lista: adatok
  };

  set(hetiRef, hetiOsszesites);
  alert("Heti napló elmentve!");
};

/* ===== NULLÁZÁS ===== */

window.nullazHetiLog=function(){
  if(!adminCheck()) return;

  adatok.forEach(t=>{
    t.osszeg=0;
    t.moso=0;
    t.craft=0;
    t.fizetett=false;
    t.rablas=ujRablasObj();
  });

  mentes();
  render();
};

window.nullazFoMenu=function(){
  if(!adminCheck()) return;

  adatok=[];
  mentes();
  render();
};

/* ===== PDF ===== */

window.openPDF=function(){

  let html=`
  <html>
  <head>
  <title>PDF</title>
  <style>
  body{font-family:Arial}
  table{border-collapse:collapse;width:100%}
  th,td{border:1px solid #000;padding:4px;text-align:center}
  </style>
  </head>
  <body>
  <h2>Heti Fizetés</h2>
  <table>
  <tr>
  <th>Név</th>
  <th>Összeg</th>
  </tr>
  `;

  adatok.forEach(t=>{
    html+=`<tr>
    <td>${t.nev}</td>
    <td>${(t.osszeg||0).toFixed(2)} $</td>
    </tr>`;
  });

  html+=`</table></body></html>`;

  const win=window.open("","","width=900,height=700");
  win.document.write(html);
  win.document.close();
  win.print();
};

render();

</script>
</body>
</html>
