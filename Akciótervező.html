<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStream PRO X</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Segoe UI, sans-serif;
    background:#0f0f0f;
    color:white;
}

/* LOGIN */
#auth{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#auth input{
    margin:10px;
    padding:10px;
    border-radius:5px;
    border:none;
}
#auth button{
    padding:10px 20px;
    background:#e50914;
    border:none;
    color:white;
    cursor:pointer;
}

/* NAV */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#111;
}
header h1{color:#e50914}
.profile{
    display:flex;
    align-items:center;
    gap:10px;
}
.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}
header button{
    background:#e50914;
    border:none;
    padding:5px 10px;
    color:white;
    cursor:pointer;
}

/* SECTIONS */
.section{padding:20px}
.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
}
.movie{
    min-width:180px;
    position:relative;
}
.movie img{
    width:100%;
    border-radius:8px;
}
.movie button{
    position:absolute;
    bottom:10px;
    left:10px;
    background:#e50914;
    border:none;
    padding:5px;
    color:white;
    cursor:pointer;
}

/* ADMIN */
#admin{
    background:#111;
    padding:20px;
}
#admin input{
    margin:5px;
    padding:5px;
}

/* PLAYER */
#player{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
video{
    width:80%;
}
#close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="auth">
    <h2>MyStream PRO Login</h2>
    <input type="text" id="username" placeholder="Felhasználónév">
    <input type="file" id="avatar">
    <button onclick="login()">Belépés</button>
</div>

<div id="app" style="display:none">

<header>
    <h1>MyStream PRO X</h1>
    <div class="profile">
        <img id="profilePic">
        <span id="userDisplay"></span>
        <button onclick="logout()">Kilépés</button>
    </div>
</header>

<div class="section">
    <input type="text" id="search" placeholder="Keresés..." onkeyup="renderMovies()">
</div>

<div class="section">
    <h2>🎬 Filmek</h2>
    <div class="row" id="movies"></div>
</div>

<div class="section">
    <h2>⭐ Kedvencek</h2>
    <div class="row" id="favorites"></div>
</div>

<div id="admin">
    <h3>ADMIN PANEL – Film hozzáadás</h3>
    <input type="text" id="newTitle" placeholder="Cím">
    <input type="text" id="newVideo" placeholder="Videó fájl (pl video4.mp4)">
    <input type="text" id="newImg" placeholder="Kép URL">
    <button onclick="addMovie()">Hozzáadás</button>
</div>

</div>

<div id="player">
    <span id="close" onclick="closePlayer()">✖</span>
    <video id="videoPlayer" controls autoplay></video>
</div>

<script>

let currentUser=null;

function login(){
    let user=document.getElementById("username").value;
    let file=document.getElementById("avatar").files[0];

    if(user){
        currentUser=user;
        localStorage.setItem("currentUser",user);

        if(file){
            let reader=new FileReader();
            reader.onload=function(e){
                localStorage.setItem(user+"_avatar",e.target.result);
                startApp();
            }
            reader.readAsDataURL(file);
        }else{
            startApp();
        }
    }
}

function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

function startApp(){
    currentUser=localStorage.getItem("currentUser");
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userDisplay").innerText=currentUser;

    let avatar=localStorage.getItem(currentUser+"_avatar");
    if(avatar) document.getElementById("profilePic").src=avatar;

    renderMovies();
}

let movies=JSON.parse(localStorage.getItem("movies"))||[
{title:"Akció 1",video:"video1.mp4",img:"https://picsum.photos/200/300?1"},
{title:"Horror 1",video:"video2.mp4",img:"https://picsum.photos/200/300?2"}
];

function renderMovies(){
    let q=document.getElementById("search").value?.toLowerCase()||"";
    let container=document.getElementById("movies");
    container.innerHTML="";
    movies.filter(m=>m.title.toLowerCase().includes(q))
    .forEach((m,i)=>{
        container.innerHTML+=`
        <div class="movie">
            <img src="${m.img}" onclick="playMovie('${m.video}')">
            <button onclick="addFavorite(${i})">❤</button>
        </div>`;
    });
    renderFavorites();
}

function addFavorite(index){
    let fav=JSON.parse(localStorage.getItem(currentUser+"_fav")||"[]");
    fav.push(movies[index]);
    localStorage.setItem(currentUser+"_fav",JSON.stringify(fav));
    renderFavorites();
}

function renderFavorites(){
    let fav=JSON.parse(localStorage.getItem(currentUser+"_fav")||"[]");
    let container=document.getElementById("favorites");
    container.innerHTML="";
    fav.forEach(m=>{
        container.innerHTML+=`
        <div class="movie">
            <img src="${m.img}" onclick="playMovie('${m.video}')">
        </div>`;
    });
}

function addMovie(){
    let title=document.getElementById("newTitle").value;
    let video=document.getElementById("newVideo").value;
    let img=document.getElementById("newImg").value;

    if(title && video && img){
        movies.push({title,video,img});
        localStorage.setItem("movies",JSON.stringify(movies));
        renderMovies();
    }
}

function playMovie(src){
    document.getElementById("player").style.display="flex";
    document.getElementById("videoPlayer").src=src;
}
function closePlayer(){
    document.getElementById("player").style.display="none";
    document.getElementById("videoPlayer").pause();
}

if(localStorage.getItem("currentUser")){
    startApp();
}

</script>

</body>
</html>
