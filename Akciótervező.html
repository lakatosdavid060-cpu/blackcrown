<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rablás Rögzítés</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;margin:0;}
h2{color:#38bdf8;margin-bottom:10px;}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:20px;}
select,input{padding:6px;border-radius:6px;border:none;margin:5px 0;width:220px;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:10px;}
.green{background:#16a34a;color:white;}
.list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.member{background:#334155;padding:6px 10px;border-radius:6px;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
th,td{border:1px solid #fff;padding:5px;text-align:center;font-size:13px;}
th{background:#334155;}
</style>
</head>
<body>

<h2>💰 Új Rablás</h2>

<div class="card">
<label>Rablás típusa</label><br>
<select id="tipus">
  <option value="Paleto Bank">Paleto Bank</option>
  <option value="Állami Bank">Állami Bank</option>
  <option value="Boltrablás">Boltrablás</option>
  <option value="Egyéb">Egyéb</option>
</select>
<br>

<label>Teljes bevétel ($)</label><br>
<input type="number" id="osszeg" placeholder="Pl: 130000">
<br>

<label>Résztvevők</label>
<div class="list" id="tagLista"></div>

<button class="green" onclick="mentRablas()">Rablás Mentése</button>
</div>

<h2>📜 Heti Rablás Napló</h2>

<table>
<thead>
<tr>
<th>Dátum</th>
<th>Típus</th>
<th>Bevétel</th>
<th>Résztvevők</th>
</tr>
</thead>
<tbody id="naploTabla"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  databaseURL: "https://ordog-fizetes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ordog-fizetes"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const adatRef = ref(db,"aktualisAdatok");
const naploRef = ref(db,"hetiRablasNaplo");

let adatok=[];

const tagLista=document.getElementById("tagLista");
const naploTabla=document.getElementById("naploTabla");


// TAGOK BETÖLTÉSE
onValue(adatRef,snapshot=>{
  if(snapshot.exists()){
    adatok=snapshot.val();
    renderTagok();
  }
});

// NAPLÓ BETÖLTÉSE
onValue(naploRef,snapshot=>{
  naploTabla.innerHTML="";
  if(snapshot.exists()){
    const data=snapshot.val();
    Object.values(data).forEach(r=>{
      naploTabla.innerHTML+=`
      <tr>
        <td>${r.datum}</td>
        <td>${r.tipus}</td>
        <td>${r.osszeg.toLocaleString('hu-HU')} $</td>
        <td>${r.resztvevok.join(", ")}</td>
      </tr>`;
    });
  }
});


function renderTagok(){
  tagLista.innerHTML="";
  adatok.forEach((t,i)=>{
    tagLista.innerHTML+=`
      <label class="member">
        <input type="checkbox" value="${i}">
        ${t.nev}
      </label>
    `;
  });
}


window.mentRablas=function(){

  const tipus=document.getElementById("tipus").value;
  const osszeg=Number(document.getElementById("osszeg").value);

  if(!osszeg) return alert("Adj meg összeget!");

  const checked=document.querySelectorAll("#tagLista input:checked");
  if(checked.length===0) return alert("Válassz résztvevőket!");

  const resztvevok=[];
  const egyFoResz=((osszeg/2)/checked.length)*0.82;

  checked.forEach(cb=>{
    const index=cb.value;
    adatok[index].osszeg=(adatok[index].osszeg||0)+egyFoResz;
    resztvevok.push(adatok[index].nev);
  });

  // Heti összeg frissítése
  set(adatRef,adatok);

  // Napló mentése
  const today=new Date().toLocaleDateString('hu-HU');

  push(naploRef,{
    datum:today,
    tipus:tipus,
    osszeg:osszeg,
    resztvevok:resztvevok
  });

  alert("Rablás mentve!");

  document.getElementById("osszeg").value="";
  document.querySelectorAll("#tagLista input").forEach(cb=>cb.checked=false);
}

</script>

</body>
</html>
