<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Oldal</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}

#lejatszo {
    margin: 20px;
    text-align: center;
}
iframe {
    width: 90%;
    height: 400px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎬 Film Oldal</h1>

<div class="container">

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/q719jXXEzOoYaps6babgKnONONX.jpg">
<div class="card-content">
<h3>A sötét lovag</h3>
<button onclick="indit('EXeTwQWrcwY')">Trailer indítása</button>
</div>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
<div class="card-content">
<h3>Eredet</h3>
<button onclick="indit('YoHD9XEInc0')">Trailer indítása</button>
</div>
</div>

</div>

<div id="lejatszo"></div>

<script>
function indit(videoID) {
    document.getElementById("lejatszo").innerHTML =
    `<iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}
</script>

</body>
</html>
