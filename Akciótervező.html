<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GTA RP Akció Terem</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0e0e0e;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    color:#00ff88;
}

.section-title{
    margin-top:25px;
    font-size:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
}

select,input,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}

button{
    background:#00aa55;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.card{
    background:#2b2b2b;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border-left:5px solid #00ff88;
}

.active-card{
    background:#3b0000;
    border-left:5px solid red;
}

.delete{
    background:darkred;
    margin-top:6px;
}

.activate{
    background:orange;
    margin-top:6px;
}
</style>
</head>

<body>

<h1>💰 GTA RP Akció Terem</h1>

<div class="container">

<select id="name">
<option>Ugaros Turul (Bobi)</option>
<option>Yukito Osano (Neon)</option>
<option>Emily Mitsuko (Biskota)</option>
<option>Vladimir Iwanow (Majom)</option>
<option>Todor Zsombor (Recsi)</option>
<option>Daryl Dixon (Oroszlán)</option>
<option>Julian Alvarez (Szecska)</option>
<option>Adam Taylor (Young)</option>
<option>Nemeth Andras (arpi)</option>
<option>Enrico Martello (Apu)</option>
<option>Ádám Benjamin (Cowboy)</option>
<option>Mateo Tavares Valesco (Kolbi)</option>
<option>Carl Jesus (Faszos)</option>
<option>Noah Knight (Roberts)</option>
<option>David Smith (Szike)</option>
<option>Nico Alvarez (Milka)</option>
<option>Miguel Alvarez (Raszta)</option>
<option>Wells Jordan (Stone)</option>
<option>Williams Jackson (Easy)</option>
<option>Jackson West (Kalap)</option>
<option>David Jackson (Kabát)</option>
</select>

<select id="location">
<option>Állami Bank</option>
<option>Paleto Bank</option>
<option>Múzeum</option>
<option>Bobcat</option>
<option>Maffia Ház</option>
<option>Híresség Ház</option>
</select>

<input type="time" id="time">

<button onclick="addPlan()">Hozzáadás</button>

<div class="section-title">🔴 MOST AKTÍV RABLÁS</div>
<div id="activePlans"></div>

<div class="section-title">📋 TERVEZETT</div>
<div id="plans"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  projectId: "ordog-fizetes",
  storageBucket: "ordog-fizetes.firebasestorage.app",
  messagingSenderId: "672089263660",
  appId: "1:672089263660:web:58091123de7a1b08464b89",
  measurementId: "G-7V5S02EDKP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ➕ Új rablás hozzáadása
window.addPlan = async () => {

  const name = document.getElementById("name").value;
  const location = document.getElementById("location").value;
  const time = document.getElementById("time").value;

  await addDoc(collection(db,"plans"),{
      name,
      location,
      time,
      active:false,
      created: serverTimestamp()
  });

};


// 🔴 Élő frissítés
onSnapshot(collection(db,"plans"), snapshot => {

  const activeContainer=document.getElementById("activePlans");
  const container=document.getElementById("plans");

  activeContainer.innerHTML="";
  container.innerHTML="";

  snapshot.forEach(item=>{
    const data=item.data();
    const div=document.createElement("div");

    div.className=data.active ? "card active-card" : "card";

    div.innerHTML=`
      <strong>${data.name}</strong><br>
      📍 ${data.location}<br>
      🕒 ${data.time || "nincs idő"}<br>
      ${!data.active ? `<button class="activate"
      onclick="activatePlan('${item.id}')">Aktívra tesz</button>` : ""}
      <button class="delete"
      onclick="deletePlan('${item.id}')">Törlés</button>
    `;

    if(data.active){
      activeContainer.appendChild(div);
    } else {
      container.appendChild(div);
    }

  });

});


// 🔥 Aktívra tesz
window.activatePlan = async(id)=>{
  await updateDoc(doc(db,"plans",id),{
    active:true
  });
};


// ❌ Törlés
window.deletePlan = async(id)=>{
  await deleteDoc(doc(db,"plans",id));
};

</script>

</body>
</html>
