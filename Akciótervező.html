<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GTA RP Akció Terem</title>

<style>
body{font-family:Arial;background:#0e0e0e;color:white;padding:20px;}
h1{text-align:center;color:#00ff88;}
.container{max-width:900px;margin:auto;background:#1c1c1c;padding:20px;border-radius:12px;}
select,input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none;}
button{cursor:pointer;font-weight:bold;}
.add{background:#00aa55;color:white;}
.join{background:#007bff;color:white;margin-top:5px;}
.leave{background:#666;color:white;margin-top:5px;}
.activate{background:orange;margin-top:5px;}
.delete{background:darkred;margin-top:5px;color:white;}
.card{background:#2b2b2b;padding:12px;margin-top:10px;border-radius:8px;border-left:5px solid #00ff88;}
.active-card{background:#3b0000;border-left:5px solid red;}
.members{font-size:14px;margin-top:6px;color:#ccc;}
.section-title{margin-top:25px;font-size:20px;}
</style>
</head>

<body>

<h1>💰 GTA RP Akció Terem</h1>

<div class="container">

<select id="currentUser"></select>

<select id="location">
<option>Állami Bank</option>
<option>Paleto Bank</option>
<option>Múzeum</option>
<option>Bobcat</option>
<option>Maffia Ház</option>
<option>Híresség Ház</option>
</select>

<input type="time" id="time">

<button class="add" onclick="createRoom()">Szoba létrehozása</button>

<div class="section-title">🔴 AKTÍV SZOBA</div>
<div id="activeRooms"></div>

<div class="section-title">📋 TERVEZETT</div>
<div id="rooms"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  doc,
  arrayUnion,
  arrayRemove,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgbixws2rf6VdqjQATVwZsKg0lgiqy0xI",
  authDomain: "ordog-fizetes.firebaseapp.com",
  projectId: "ordog-fizetes",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const names = [
"Ugaros Turul (Bobi)","Yukito Osano (Neon)","Emily Mitsuko (Biskota)",
"Vladimir Iwanow (Majom)","Todor Zsombor (Recsi)","Daryl Dixon (Oroszlán)",
"Julian Alvarez (Szecska)","Adam Taylor (Young)","Nemeth Andras (arpi)",
"Enrico Martello (Apu)","Ádám Benjamin (Cowboy)","Mateo Tavares Valesco (Kolbi)",
"Carl Jesus (Faszos)","Noah Knight (Roberts)","David Smith (Szike)",
"Nico Alvarez (Milka)","Miguel Alvarez (Raszta)","Wells Jordan (Stone)",
"Williams Jackson (Easy)","Jackson West (Kalap)","David Jackson (Kabát)"
];

const userSelect=document.getElementById("currentUser");
names.forEach(n=>{
  const opt=document.createElement("option");
  opt.value=n;
  opt.innerText=n;
  userSelect.appendChild(opt);
});

let allRooms=[];

userSelect.addEventListener("change", renderRooms);

window.createRoom = async () => {
  const user = userSelect.value;
  const location = document.getElementById("location").value;
  const time = document.getElementById("time").value;

  await addDoc(collection(db,"rooms"),{
      leader:user,
      location,
      time,
      active:false,
      members:[user],
      created: serverTimestamp()
  });
};

onSnapshot(collection(db,"rooms"), snapshot => {
  allRooms=[];
  snapshot.forEach(doc=>allRooms.push({id:doc.id,...doc.data()}));
  renderRooms();
});

function renderRooms(){
  const activeContainer=document.getElementById("activeRooms");
  const container=document.getElementById("rooms");
  activeContainer.innerHTML="";
  container.innerHTML="";
  const currentUser=userSelect.value;

  allRooms.forEach(room=>{
    const div=document.createElement("div");
    div.className=room.active ? "card active-card":"card";

    div.innerHTML=`
      <strong>Vezető: ${room.leader}</strong><br>
      📍 ${room.location}<br>
      🕒 ${room.time || "nincs idő"}<br>
      <div class="members">👥 ${room.members.join(", ")}</div>
    `;

    if(!room.members.includes(currentUser)){
      const joinBtn=document.createElement("button");
      joinBtn.className="join";
      joinBtn.innerText=`Csatlakozom (${currentUser})`;
      joinBtn.onclick=()=>joinRoom(room.id,currentUser);
      div.appendChild(joinBtn);
    }

    if(room.members.includes(currentUser) && currentUser!==room.leader){
      const leaveBtn=document.createElement("button");
      leaveBtn.className="leave";
      leaveBtn.innerText="Kilépés";
      leaveBtn.onclick=()=>leaveRoom(room.id,currentUser);
      div.appendChild(leaveBtn);
    }

    if(currentUser===room.leader && !room.active){
      const actBtn=document.createElement("button");
      actBtn.className="activate";
      actBtn.innerText="Aktívra tesz";
      actBtn.onclick=()=>activateRoom(room.id);
      div.appendChild(actBtn);
    }

    if(currentUser===room.leader){
      const delBtn=document.createElement("button");
      delBtn.className="delete";
      delBtn.innerText="Törlés";
      delBtn.onclick=()=>deleteRoom(room.id);
      div.appendChild(delBtn);
    }

    if(room.active){
      activeContainer.appendChild(div);
    } else {
      container.appendChild(div);
    }
  });
}

window.joinRoom = async(id,user)=>{
  await updateDoc(doc(db,"rooms",id),{
    members: arrayUnion(user)
  });
};

window.leaveRoom = async(id,user)=>{
  await updateDoc(doc(db,"rooms",id),{
    members: arrayRemove(user)
  });
};

window.activateRoom = async(id)=>{
  await updateDoc(doc(db,"rooms",id),{
    active:true
  });
};

window.deleteRoom = async(id)=>{
  await deleteDoc(doc(db,"rooms",id));
};

</script>

</body>
</html>
