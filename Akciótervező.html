<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kő Papír Olló - Mobil Edition</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #141E30, #243B55);
    color: white;
}

h1 {
    margin-top: 20px;
    font-size: 28px;
}

.gombok {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 40px;
}

button {
    flex: 1;
    max-width: 120px;
    font-size: 28px;
    padding: 20px;
    border-radius: 20px;
    border: none;
    background: #00c6ff;
    color: black;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

button:active {
    transform: scale(0.95);
}

#eredmeny {
    margin-top: 30px;
    font-size: 22px;
    min-height: 60px;
}

#pontok {
    margin-top: 20px;
    font-size: 20px;
}

#gyoztes {
    margin-top: 20px;
    font-size: 24px;
    color: yellow;
}
</style>
</head>

<body>

<h1>🪨📄✂️</h1>

<div class="gombok">
    <button onclick="jatek('ko')">🪨</button>
    <button onclick="jatek('papir')">📄</button>
    <button onclick="jatek('ollo')">✂️</button>
</div>

<div id="eredmeny"></div>
<div id="pontok">Te: 0 | Gép: 0</div>
<div id="gyoztes"></div>

<script>
let tePont = 0;
let gepPont = 0;
let jatekVege = false;

const emoji = { ko: "🪨", papir: "📄", ollo: "✂️" };

function jatek(valasztas) {

    if (jatekVege) return;

    const lehetosegek = ['ko', 'papir', 'ollo'];
    const gep = lehetosegek[Math.floor(Math.random() * 3)];

    let eredmeny = "";

    if (valasztas === gep) {
        eredmeny = "🤝 Döntetlen!";
    } 
    else if (
        (valasztas === 'ko' && gep === 'ollo') ||
        (valasztas === 'papir' && gep === 'ko') ||
        (valasztas === 'ollo' && gep === 'papir')
    ) {
        eredmeny = "🎉 Nyertél!";
        tePont++;
    } 
    else {
        eredmeny = "😢 Vesztettél!";
        gepPont++;
    }

    document.getElementById("eredmeny").innerHTML =
        "Te: " + emoji[valasztas] +
        " | Gép: " + emoji[gep] +
        "<br>" + eredmeny;

    document.getElementById("pontok").innerHTML =
        "Te: " + tePont + " | Gép: " + gepPont;

    if (tePont === 5) {
        document.getElementById("gyoztes").innerHTML = "🏆 Te nyertél!";
        jatekVege = true;
    }

    if (gepPont === 5) {
        document.getElementById("gyoztes").innerHTML = "🤖 A gép nyert!";
        jatekVege = true;
    }
}
</script>

</body>
</html>
