<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Telefon OSINT kereső</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 30px;
  background: #f4f4f4;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  display: inline-block;
}

input {
  padding: 12px;
  width: 300px;
  font-size: 16px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
  border: none;
  background: #222;
  color: white;
  border-radius: 6px;
}

button:hover {
  background: #444;
}
</style>

</head>
<body>

<div class="container">
<h2>📱 Telefonszám nyilvános kereső</h2>

<input type="text" id="phone" placeholder="+36301234567"><br><br>

<button onclick="searchAll()">🔎 Teljes keresés</button><br>

<h3>Keresők</h3>
<button onclick="google()">Google</button>
<button onclick="bing()">Bing</button>
<button onclick="duck()">DuckDuckGo</button>

<h3>Speciális</h3>
<button onclick="truecaller()">Truecaller</button>
<button onclick="numlookup()">NumLookup</button>

<h3>Chat app próbák</h3>
<button onclick="whatsapp()">WhatsApp</button>

</div>

<script>
function formats(phone) {
  return [
    phone,
    phone.replace("+36", "06"),
    phone.replace("+36", "36"),
    phone.replace(/\s+/g, "")
  ];
}

function openMultiple(urlBase, phoneFormats) {
  phoneFormats.forEach(p => {
    window.open(urlBase + encodeURIComponent(p), "_blank");
  });
}

function google() {
  let f = formats(get());
  openMultiple("https://www.google.com/search?q=", f);
}

function bing() {
  let f = formats(get());
  openMultiple("https://www.bing.com/search?q=", f);
}

function duck() {
  let f = formats(get());
  openMultiple("https://duckduckgo.com/?q=", f);
}

function truecaller() {
  let p = get();
  window.open("https://www.truecaller.com/search/all/" + p, "_blank");
}

function numlookup() {
  let p = get();
  window.open("https://www.numlookup.com/" + p, "_blank");
}

function whatsapp() {
  let p = get();
  window.open("https://wa.me/" + p, "_blank");
}

function searchAll() {
  google();
  bing();
  duck();
  truecaller();
  numlookup();
  whatsapp();
}

function get() {
  return document.getElementById("phone").value;
}
</script>

</body>
</html>
