<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>RP Fizetés Rendszer</title>

<style>
  body {
    margin: 0;
    background: #0f172a;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    color: white;
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  input, select {
    background: #334155;
    color: white;
  }

  button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #16a34a;
  }

  .output {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<div class="card">
  <h2>💼 RP Fizetés Rendszer</h2>

  <input type="text" id="name" placeholder="Játékos neve">

  <select id="job">
    <option>Autórablás</option>
    <option>Házrablás</option>
    <option>Konténerrablás</option>
    <option>Bobcat Heist</option>
    <option>Állami Bank</option>
    <option>Paleto Bank</option>
    <option>Hirességház</option>
    <option>Maffiaház</option>
    <option>Csomagautomata rablás (Craft)</option>
  </select>

  <input type="number" id="amount" placeholder="Összeg ($)">

  <input type="number" id="bonus" placeholder="Bonusz ($)">

  <button onclick="sendSalary()">💰 Küldés Discordra</button>

  <div class="output" id="output"></div>
</div>

<script>
const webhookURL = "IDE_ÍRD_A_WEBHOOKOD";

function sendSalary() {
  const name = document.getElementById("name").value;
  const job = document.getElementById("job").value;
  const amount = parseInt(document.getElementById("amount").value) || 0;
  const bonus = parseInt(document.getElementById("bonus").value) || 0;

  const total = amount + bonus;

  document.getElementById("output").innerText =
    `${name} fizetése: $${total}`;

  fetch(webhookURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      embeds: [
        {
          title: "💼 Fizetés Kifizetés",
          color: 0x22c55e,
          fields: [
            {
              name: "👤 Játékos",
              value: name || "Nincs megadva",
              inline: true
            },
            {
              name: "📌 Tevékenység",
              value: job,
              inline: true
            },
            {
              name: "💰 Alap összeg",
              value: `$${amount}`,
              inline: true
            },
            {
              name: "🎁 Bonusz",
              value: `$${bonus}`,
              inline: true
            },
            {
              name: "💵 Végösszeg",
              value: `**$${total}**`,
              inline: false
            }
          ],
          footer: {
            text: "RP Fizetési Rendszer"
          },
          timestamp: new Date().toISOString()
        }
      ]
    })
  });
}
</script>

</body>
</html>
