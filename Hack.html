<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RP Hack</title>
  <style>
    body {
      margin: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      width: 400px;
      background: #111;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .header {
      padding: 10px;
      color: #facc15;
      font-size: 13px;
      border-bottom: 1px solid #222;
      background: #0d0d0d;
    }

    .content {
      text-align: center;
      padding: 20px;
    }

    .progress {
      color: #cfcfcf;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .timer {
      color: #facc15;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .timer.low {
      color: #ff6b6b;
    }

    .word {
      font-size: 32px;
      margin: 15px 0;
      min-height: 38px;
    }

    .buttons {
      display: flex;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      background: #e8db58;
      color: #111;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:first-child {
      border-right: 1px solid #000;
    }

    button:hover:not(:disabled) {
      filter: brightness(0.96);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .keys {
      text-align: center;
      font-size: 14px;
      color: #ccc;
      padding: 10px;
      border-top: 1px solid #1d1d1d;
      background: #101010;
    }

    .status {
      text-align: center;
      padding: 12px;
      font-weight: bold;
      min-height: 24px;
    }

    .good {
      color: #58d68d;
    }

    .bad {
      color: #ff6b6b;
    }

    .restart-wrap {
      text-align: center;
      padding: 0 0 14px;
    }

    .restart {
      background: #2a2a2a;
      color: white;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 10px 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">Szavak minijáték</div>

    <div class="content">
      <div class="progress" id="progress">1/20</div>
      <div class="timer" id="timer">15</div>
      <div class="word" id="word">...</div>
    </div>

    <div class="buttons">
      <button id="seenBtn" onclick="answer(true)">Láttad</button>
      <button id="newBtn" onclick="answer(false)">Új</button>
    </div>

    <div class="keys">
      A = Láttad &nbsp;&nbsp;|&nbsp;&nbsp; D = Új
    </div>

    <div class="status" id="status"></div>

    <div class="restart-wrap">
      <button class="restart" onclick="start()">Újraindítás</button>
    </div>
  </div>

  <script>
    const WORDS = [
      "Csendes",
      "Tiszta",
      "Zavarodott",
      "Terhes",
      "Pompás",
      "Zord",
      "Éles",
      "Ferde",
      "Háromszög",
      "Szivacsos",
      "Nedves",
      "Fokoz",
      "Viharos"
    ];

    const MAX_ROUNDS = 20;
    const START_TIME = 15;

    let shown = [];
    let current = "";
    let round = 1;
    let time = START_TIME;
    let timer = null;
    let gameOver = false;

    const progressEl = document.getElementById("progress");
    const timerEl = document.getElementById("timer");
    const wordEl = document.getElementById("word");
    const statusEl = document.getElementById("status");
    const seenBtn = document.getElementById("seenBtn");
    const newBtn = document.getElementById("newBtn");

    function beep(type) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === "good") {
        osc.frequency.value = 900;
        gain.gain.value = 0.05;
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      } else if (type === "bad") {
        osc.frequency.value = 200;
        gain.gain.value = 0.06;
        osc.start();
        osc.stop(ctx.currentTime + 0.16);
      } else if (type === "tick") {
        osc.frequency.value = 650;
        gain.gain.value = 0.03;
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      }
    }

    function setButtonsDisabled(disabled) {
      seenBtn.disabled = disabled;
      newBtn.disabled = disabled;
    }

    function updateTimerUI() {
      timerEl.textContent = time;
      if (time <= 5) {
        timerEl.classList.add("low");
      } else {
        timerEl.classList.remove("low");
      }
    }

    function getWord() {
      if (shown.length > 2 && Math.random() < 0.4) {
        return shown[Math.floor(Math.random() * shown.length)];
      }
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function nextWord() {
      current = getWord();
      wordEl.textContent = current;
      progressEl.textContent = round + "/" + MAX_ROUNDS;
    }

    function end(win, message = "") {
      gameOver = true;
      clearInterval(timer);
      setButtonsDisabled(true);

      if (win) {
        statusEl.textContent = message || "SIKERES HACK!";
        statusEl.className = "status good";
        beep("good");
      } else {
        statusEl.textContent = message || "ELBUKTAD!";
        statusEl.className = "status bad";
        beep("bad");
      }
    }

    function answer(seen) {
      if (gameOver) return;

      const wasSeen = shown.includes(current);

      if (seen === wasSeen) {
        beep("good");

        time = START_TIME;
        updateTimerUI();

        statusEl.textContent = "✔️ Jó";
        statusEl.className = "status good";

        shown.push(current);
        round++;

        if (round > MAX_ROUNDS) {
          end(true, "SIKERES HACK!");
          return;
        }

        setTimeout(() => {
          if (!gameOver) {
            statusEl.textContent = "";
            statusEl.className = "status";
            nextWord();
          }
        }, 250);
      } else {
        end(false, "Hibás válasz — ELBUKTAD!");
      }
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => {
        if (gameOver) return;

        time--;
        updateTimerUI();

        if (time > 0 && time <= 5) {
          beep("tick");
        }

        if (time <= 0) {
          end(false, "Lejárt az idő — ELBUKTAD!");
        }
      }, 1000);
    }

    function start() {
      shown = [];
      current = "";
      round = 1;
      time = START_TIME;
      gameOver = false;

      statusEl.textContent = "";
      statusEl.className = "status";
      setButtonsDisabled(false);

      updateTimerUI();
      nextWord();
      startTimer();
    }

    document.addEventListener("keydown", (e) => {
      if (gameOver) return;

      const key = e.key.toLowerCase();

      if (key === "a") {
        answer(true);
      } else if (key === "d") {
        answer(false);
      }
    });

    start();
  </script>
</body>
</html>
