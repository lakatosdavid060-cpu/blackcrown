<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelentkezés - Black Crown Maffia</title>
<style>
body{background:#000;color:white;font-family:sans-serif;text-align:center;padding:20px;}
h1{color:#ff0000;margin-bottom:20px;}
input,textarea,button{padding:10px;margin:10px;width:80%;border-radius:8px;border:none;font-size:1em;}
button{background:#ff0000;color:black;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#00ffff;color:black;}
#status{margin-top:10px;font-weight:bold;}
</style>
</head>
<body>

<h1>Jelentkezési Űrlap</h1>

<form id="applyForm">
  <input type="text" id="name" placeholder="Karakter Név" required><br>
  <input type="text" id="discord" placeholder="Discord Név" required><br>
  <input type="number" id="age" placeholder="Kor" required><br>
  <textarea id="message" placeholder="Üzenet" required></textarea><br>
  <button type="submit">Jelentkezés Küldése</button>
</form>

<p id="status"></p>
<button onclick="goBack()">🏠 Vissza a főoldalra</button>

<script>
// Jelentkezés localStorage-be
const form = document.getElementById("applyForm");
const statusMsg = document.getElementById("status");

form.addEventListener("submit", e=>{
    e.preventDefault();
    const jelentkezes = {
        id: Date.now(),
        name: document.getElementById("name").value.trim(),
        discord: document.getElementById("discord").value.trim(),
        age: document.getElementById("age").value.trim(),
        message: document.getElementById("message").value.trim(),
        status: "Függőben"
    };
    if(!jelentkezes.name || !jelentkezes.discord || !jelentkezes.age || !jelentkezes.message){
        statusMsg.innerText = "❌ Kérlek töltsd ki az összes mezőt!";
        return;
    }
    let adatok = JSON.parse(localStorage.getItem("jelentkezok") || "[]");
    adatok.push(jelentkezes);
    localStorage.setItem("jelentkezok", JSON.stringify(adatok));
    statusMsg.innerText = "✅ Sikeres jelentkezés!";
    form.reset();
});

function goBack(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
