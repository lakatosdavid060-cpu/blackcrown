<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fájl feltöltés és letöltés</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    .upload-box {
      margin: 20px 0;
      padding: 24px;
      border: 2px dashed #94a3b8;
      border-radius: 14px;
      text-align: center;
      background: #f8fafc;
      transition: 0.2s ease;
    }
    .upload-box.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }
    input[type="file"] {
      margin-top: 12px;
      width: 100%;
    }
    .file-info {
      margin: 16px 0;
      padding: 14px;
      border-radius: 12px;
      background: #f1f5f9;
      display: none;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .note {
      margin-top: 14px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fájl feltöltés és letöltés</h1>
    <p>Válassz ki egy fájlt, majd töltsd le ugyanazt a fájlt egy gombnyomással.</p>

    <div class="upload-box" id="uploadBox">
      <strong>Húzd ide a fájlt</strong>
      <div>vagy</div>
      <input type="file" id="fileInput" />
    </div>

    <div class="file-info" id="fileInfo"></div>

    <button class="btn btn-primary" id="downloadBtn" disabled>Fájl letöltése</button>

    <div class="note">Ez a példa böngészőn belül működik, szerver nélkül.</div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBox = document.getElementById('uploadBox');

    let selectedFile = null;

    function setFile(file) {
      selectedFile = file;

      if (selectedFile) {
        fileInfo.style.display = 'block';
        fileInfo.innerHTML = `
          <strong>Fájlnév:</strong> ${selectedFile.name}<br>
          <strong>Méret:</strong> ${(selectedFile.size / 1024).toFixed(2)} KB<br>
          <strong>Típus:</strong> ${selectedFile.type || 'ismeretlen'}
        `;
        downloadBtn.disabled = false;
      } else {
        fileInfo.style.display = 'none';
        fileInfo.innerHTML = '';
        downloadBtn.disabled = true;
      }
    }

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) setFile(file);
    });

    uploadBox.addEventListener('dragover', (event) => {
      event.preventDefault();
      uploadBox.classList.add('dragover');
    });

    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragover');
    });

    uploadBox.addEventListener('drop', (event) => {
      event.preventDefault();
      uploadBox.classList.remove('dragover');
      const file = event.dataTransfer.files[0];
      if (file) {
        setFile(file);
        fileInput.files = event.dataTransfer.files;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      const url = URL.createObjectURL(selectedFile);
      const a = document.createElement('a');
      a.href = url;
      a.download = selectedFile.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
