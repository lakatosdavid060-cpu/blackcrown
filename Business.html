<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business SaaS Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:26px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input{
width:95%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

.result{
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<header>
🚀 Business SaaS Ultimate
</header>



<div id="pay" class="container">

<div class="box">

<h2>🔒 Premium hozzáférés</h2>

<p><b>9€ / hó</b></p>

<p>Utalás:</p>

<p><b>IBAN:</b> DE28 1001 0178 3816 9232 89</p>

<input id="code" placeholder="Hozzáférési kulcs">

<button onclick="login()">Belépés</button>

</div>

</div>



<div id="app" style="display:none" class="container">


<div class="box">

<h2>👤 Profil</h2>

<input id="username" placeholder="Neved">

<button onclick="saveUser()">Mentés</button>

<div id="welcome"></div>
<div id="expiry"></div>

</div>



<div class="box">

<h2>💰 Profit kalkulátor</h2>

<input id="price" placeholder="Termék ár">
<input id="cost" placeholder="Költség">
<input id="sales" placeholder="Eladás / hó">

<button onclick="profitCalc()">Számol</button>

<div class="result" id="profitResult"></div>

</div>



<div class="box">

<h2>📈 ROI kalkulátor</h2>

<input id="investment" placeholder="Befektetés">
<input id="return" placeholder="Bevétel">

<button onclick="roiCalc()">Számol</button>

<div class="result" id="roiResult"></div>

</div>



<div class="box">

<h2>📊 Break-even</h2>

<input id="fixed" placeholder="Fix költség">
<input id="margin" placeholder="Profit / termék">

<button onclick="breakCalc()">Számol</button>

<div class="result" id="breakResult"></div>

</div>



<div class="box">

<h2>💸 Cashflow</h2>

<input id="income" placeholder="Bevétel">
<input id="expense" placeholder="Költség">

<button onclick="cashCalc()">Számol</button>

<div class="result" id="cashResult"></div>

</div>



<div class="box">

<h2>📅 Éves profit</h2>

<input id="monthlyProfit" placeholder="Havi profit">

<button onclick="yearCalc()">Számol</button>

<div class="result" id="yearResult"></div>

</div>



<div class="box">

<h2>💵 Ár kalkulátor</h2>

<input id="targetProfit" placeholder="Cél profit">
<input id="units" placeholder="Eladás darab">

<button onclick="priceCalc()">Számol</button>

<div class="result" id="priceResult"></div>

</div>



<div class="box">

<h2>📣 Marketing ROI</h2>

<input id="adSpend" placeholder="Hirdetés költség">
<input id="adRevenue" placeholder="Hirdetés bevétel">

<button onclick="marketingCalc()">Számol</button>

<div class="result" id="marketingResult"></div>

</div>



<div class="box">

<h2>📊 Dashboard</h2>

<canvas id="chart"></canvas>

</div>



<div class="box">

<h2>📥 Report export</h2>

<button onclick="exportData()">Report letöltés</button>

</div>



<div class="box">

<h2>🔑 Admin kulcs generátor</h2>

<button onclick="generateKey()">Kulcs generálás</button>

<div id="newKey"></div>

</div>

</div>



<script>

let codes=["PRO100","SAAS777","BUSINESS999","PREMIUM2026"]



function login(){

let code=document.getElementById("code").value.trim()

if(codes.includes(code)){

let expiry=Date.now()+30*24*60*60*1000

localStorage.setItem("access","true")
localStorage.setItem("expiry",expiry)

document.getElementById("pay").style.display="none"
document.getElementById("app").style.display="block"

loadUser()

}else{

alert("Érvénytelen kulcs")

}

}



function checkExpiry(){

let expiry=localStorage.getItem("expiry")

if(expiry && Date.now()>expiry){

localStorage.clear()

alert("Előfizetés lejárt")

location.reload()

}

}

checkExpiry()



if(localStorage.getItem("access")==="true"){

document.getElementById("pay").style.display="none"
document.getElementById("app").style.display="block"

loadUser()

}



function saveUser(){

let name=document.getElementById("username").value

localStorage.setItem("user",name)

document.getElementById("welcome").innerHTML="Üdv "+name

}



function loadUser(){

let user=localStorage.getItem("user")

if(user){
document.getElementById("welcome").innerHTML="Üdv "+user
}

let expiry=localStorage.getItem("expiry")

if(expiry){

let date=new Date(Number(expiry))

document.getElementById("expiry").innerHTML="Előfizetés lejár: "+date.toLocaleDateString()

}

}



function profitCalc(){

let price=Number(price.value)
let cost=Number(cost.value)
let sales=Number(sales.value)

let profit=(price-cost)*sales

profitResult.innerHTML="Profit: € "+profit

drawChart(price*sales,cost*sales,profit)

}



function roiCalc(){

let inv=Number(investment.value)
let ret=Number(return.value)

let roi=((ret-inv)/inv)*100

roiResult.innerHTML="ROI: "+roi.toFixed(1)+"%"

}



function breakCalc(){

let units=fixed.value/margin.value

breakResult.innerHTML="Eladás szükséges: "+Math.ceil(units)

}



function cashCalc(){

let cash=income.value-expense.value

cashResult.innerHTML="Cashflow: € "+cash

}



function yearCalc(){

yearResult.innerHTML="Éves profit: € "+(monthlyProfit.value*12)

}



function priceCalc(){

let price=targetProfit.value/units.value

priceResult.innerHTML="Ajánlott ár: € "+price.toFixed(2)

}



function marketingCalc(){

let roi=((adRevenue.value-adSpend.value)/adSpend.value)*100

marketingResult.innerHTML="Marketing ROI: "+roi.toFixed(1)+"%"

}



let chart

function drawChart(rev,cost,profit){

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Bevétel","Költség","Profit"],
datasets:[{
data:[rev,cost,profit]
}]
}
})

}



function exportData(){

let text="Business SaaS Report"

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="report.txt"

a.click()

}



function generateKey(){

let key="KEY-"+Math.random().toString(36).substring(2,10).toUpperCase()

codes.push(key)

newKey.innerHTML="Új kulcs: "+key

}

</script>

</body>
</html>
