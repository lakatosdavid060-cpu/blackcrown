<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTRA++ iOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow:hidden;
}

.phone{
width:360px;
height:720px;
background:black;
border-radius:60px;
padding:12px;
box-shadow:0 0 80px black;
overflow:hidden;
}

.screen{
width:100%;
height:100%;
border-radius:50px;
overflow:hidden;
position:relative;
background:url("https://picsum.photos/600/1200") center/cover;
color:white;
}

.status{
height:30px;
display:flex;
justify-content:space-between;
padding:0 15px;
align-items:center;
font-size:13px;
background:rgba(0,0,0,0.3);
}

.home-wrapper{
position:absolute;
top:30px;
width:200%;
height:calc(100% - 30px);
display:flex;
transition:0.4s;
}

.page{
width:50%;
padding:40px 20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.app{
text-align:center;
font-size:12px;
cursor:grab;
user-select:none;
}

.icon{
width:65px;
height:65px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
margin:auto;
margin-bottom:5px;
}

.yt{background:red;}
.sf{background:#007aff;}
.msg{background:#34c759;}
.game{background:#ff9500;}

.folder{
background:rgba(255,255,255,0.2);
border-radius:20px;
padding:10px;
text-align:center;
}

.appscreen{
position:absolute;
width:100%;
height:100%;
background:white;
color:black;
top:0;
left:0;
transform:scale(0);
transition:0.3s;
display:flex;
flex-direction:column;
z-index:5;
}

.appscreen.active{transform:scale(1);}

.topbar{
height:40px;
background:#f2f2f2;
display:flex;
align-items:center;
padding:0 10px;
font-weight:bold;
}

.back{
margin-right:10px;
color:#007aff;
cursor:pointer;
}
</style>
</head>
<body>

<div class="phone">
<div class="screen" id="screen">

<div class="status">
<span id="time"></span>
<span>ULTRA++ 🔋<span id="bat">100</span>%</span>
</div>

<div class="home-wrapper" id="homeWrapper">

<div class="page" id="page1">
<div class="app" draggable="true"><div class="icon yt">▶</div>YouTube</div>
<div class="app" draggable="true"><div class="icon sf">🌐</div>Safari</div>
<div class="app" draggable="true"><div class="icon msg">💬</div>Chat</div>
<div class="app" draggable="true"><div class="icon game">🎮</div>Game</div>
</div>

<div class="page" id="page2">
<div class="app folder">📁 Folder</div>
</div>

</div>

<!-- GAME APP -->
<div class="appscreen" id="gameApp">
<div class="topbar"><span class="back" onclick="closeApp()">◀</span>Mini Game</div>
<div style="padding:20px;">
<button onclick="score++">Click Me</button>
<p>Score: <span id="score">0</span></p>
</div>
</div>

</div>
</div>

<script>
let battery=100;
let score=0;
let currentPage=0;

function updateTime(){
let now=new Date();
let h=now.getHours();
let m=String(now.getMinutes()).padStart(2,"0");
document.getElementById("time").innerText=h+":"+m;
}
setInterval(updateTime,1000);
updateTime();

setInterval(()=>{
if(battery>0) battery--;
document.getElementById("bat").innerText=battery;
},4000);

document.querySelectorAll(".app").forEach(app=>{
app.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text/plain",null);
window.dragged=app;
});
});

document.querySelectorAll(".page").forEach(page=>{
page.addEventListener("dragover",e=>e.preventDefault());
page.addEventListener("drop",e=>{
page.appendChild(window.dragged);
saveLayout();
});
});

function saveLayout(){
localStorage.setItem("layout",document.getElementById("homeWrapper").innerHTML);
}

if(localStorage.getItem("layout")){
document.getElementById("homeWrapper").innerHTML=localStorage.getItem("layout");
}

document.getElementById("screen").addEventListener("wheel",e=>{
if(e.deltaY>0 && currentPage===0){
currentPage=1;
document.getElementById("homeWrapper").style.transform="translateX(-50%)";
}
else if(e.deltaY<0 && currentPage===1){
currentPage=0;
document.getElementById("homeWrapper").style.transform="translateX(0)";
}
});

document.querySelectorAll(".app").forEach(app=>{
app.addEventListener("dblclick",()=>{
if(app.innerText.includes("Game")){
document.getElementById("gameApp").classList.add("active");
}
});
});

function closeApp(){
document.querySelectorAll(".appscreen").forEach(a=>a.classList.remove("active"));
}

setInterval(()=>{
document.getElementById("score").innerText=score;
},200);
</script>

</body>
</html>
